function dayKey() {
  const d = new Date();

  return "ultimate_survival_daily_" +
    d.getFullYear() + "-" +
    String(d.getMonth() + 1).padStart(2, "0") + "-" +
    String(d.getDate()).padStart(2, "0");
}

function deepClone(obj) {
  return JSON.parse(JSON.stringify(obj));
}

function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);

    if (!raw) {
      return deepClone(fallback);
    }

    return Object.assign(deepClone(fallback), JSON.parse(raw));
  } catch (e) {
    return deepClone(fallback);
  }
}

function saveJSON(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

function clamp(v, a, b) {
  return Math.max(a, Math.min(b, v));
}

function dist(x1, y1, x2, y2) {
  return Math.hypot(x1 - x2, y1 - y2);
}

function rand(a, b) {
  return a + Math.random() * (b - a);
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function shuffle(arr) {
  const a = arr.slice();

  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }

  return a;
}

function fmtTime(sec) {
  sec = Math.floor(sec);

  const h = Math.floor(sec / 3600);
  const m = Math.floor(sec % 3600 / 60);
  const s = sec % 60;

  if (h > 0) {
    return h + ":" +
      String(m).padStart(2, "0") + ":" +
      String(s).padStart(2, "0");
  }

  return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
}

function getAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      audioCtx = null;
    }
  }

  if (audioCtx && audioCtx.state === "suspended") {
    audioCtx.resume();
  }

  return audioCtx;
}

function tone(freq, dur, type = "sine", vol = 0.035, delay = 0) {
  if (!save.soundOn && vol > 0.025) {
    return;
  }

  const ac = getAudio();

  if (!ac) {
    return;
  }

  const o = ac.createOscillator();
  const g = ac.createGain();

  o.type = type;
  o.frequency.value = freq;

  o.connect(g);
  g.connect(ac.destination);

  const t = ac.currentTime + delay;

  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);

  o.start(t);
  o.stop(t + dur + 0.02);
}

function sfx(type) {

  const table = {

    dodge: [920, 0.08, "sine"],
    legend: [880, 0.18, "triangle"],

    click: [440, 0.05, "sine"]
  };

  const v = table[type] || [440, 0.1, "sine"];

  tone(v[0], v[1], v[2], 0.045);
}

const bgmPatterns = {
  early: [220, 0, 330, 0, 247, 0, 392, 0],
  danger: [196, 247, 294, 247, 196, 330, 247, 370],

};

function updateBgm(dt) {
  if (
    !save.bgmOn ||
    !game ||
    game.paused ||
    game.cardOpen ||
    game.penaltyOpen ||
    game.rewardOpen ||
    game.comboOpen ||
    game.survivor ||
    game.bossIntro ||
    game.gameOver
  ) {
    return;
  }

  const ac = getAudio();

  if (!ac) {
    return;
  }

  let mode = "early";

  if (game.bossActive) {
    mode = "boss";
  } else if (game.time >= 540) {
    mode = "gold";
  } else if (game.hp / game.maxHp < 0.35) {
    mode = "danger";
  }

  if (bgm.mode !== mode) {
    bgm.mode = mode;
    bgm.step = 0;
    bgm.next = 0;
  }

  bgm.timer += dt;

  if (bgm.timer >= bgm.next) {
    bgm.timer = 0;
    bgm.next = mode === "boss" ? 0.22 : 0.32;

    const p = bgmPatterns[mode];
    const f = p[bgm.step % p.length];

    bgm.step++;

    if (f > 0) {
      tone(
        f,
        0.1,
        mode === "boss" ? "sawtooth" : "triangle",
        0.012
      );
    }
  }
}

    return;
  }

  save.totalPlayTime += Math.floor(game.sessionTime);
  game.committed = true;

    return;
  }

  game.achievements.add(id);
  saveAchievements();

  notice(["업적 달성", name], "#FFD700");

  if (id === "survivor") {
    save.survivorUnlocked = true;

    if (save.survivorSkin == null) {
      save.survivorSkin = true;
    }

    saveGlobal();
  }
}

function addMaxHp(v) {
  game.maxHp = Math.max(50, game.maxHp + v);

  if (v > 0) {
    game.hp += v;
  }

  game.hp = Math.min(game.hp, game.maxHp);
  game.displayHp = Math.min(game.displayHp, game.maxHp);
}

function capStat(stat, amount, limit) {
  const after = game[stat] + amount;

  if (after <= limit) {
    game[stat] = Math.max(0, after);
  } else {
    game[stat] = limit;
    addMaxHp(Math.round((after - limit) * 100) * 3);
  }
}

function addDodge(v) {
  capStat("dodge", v, 0.45);
}

function addDamageReduce(v) {
  capStat("damageReduce", v, 0.45);
}

function addSpecialReduce(v) {
  capStat("specialReduce", v, 0.55);
}

function totalDodge() {
  let v = game.dodge;

  if (game.hp / game.maxHp <= 0.30) {
    v += game.lowHpDodge;
  }

  if (game.unyielding && game.hp / game.maxHp <= 0.25) {
    v += 0.10;
  }

  return Math.min(0.45, v);
}

function totalDamageReduce() {
  let v = game.damageReduce;

  if (game.unyielding && game.hp / game.maxHp <= 0.25) {
    v += 0.10;
  }

  return Math.min(0.45, v);
}

function timeSpeedBonus() {
  if (game.time >= 480) return 0.25;
  if (game.time >= 360) return 0.20;
  if (game.time >= 240) return 0.15;
  if (game.time >= 120) return 0.10;
  if (game.time >= 60) return 0.05;

  return 0;
}

function bulletSpeedMul() {
  return Math.max(
    0.25,
    1 + game.bulletBonus - game.bulletSlow + timeSpeedBonus()
  );
}

function bossDamageBonus() {
  return game.bossActive
    ? 3 + Math.min(8, Math.floor(game.time / 120) * 2)
    : 0;
}

function normalDamage() {
  return CFG.normalDamage + game.normalBonus + (game.bossActive ? 3 : 0);
}

function specialDamage() {
  return CFG.specialDamage + game.specialBonus + bossDamageBonus();
}

function createBullet(o) {
  const type = o.type || "normal";

  game.bullets.push({
    x: o.x,
    y: o.y,
    vx: o.vx || 0,
    vy: o.vy || 0,
    r: o.r || (type === "special" ? 11 : 7),
    damage: o.damage || (type === "special" ? specialDamage() : normalDamage()),
    type,
    color: o.color || (type === "special" ? "#ff3333" : "#ffcc33"),
    life: o.life ?? null,
    age: 0,

    homing: o.homing || false,
    turn: o.turn || 0,
    speed: o.speed || 0,

    wave: o.wave || false,
    waveAmp: o.waveAmp || 0,
    waveFreq: o.waveFreq || 0,

    baseX: o.x,
    baseY: o.y
  });

  while (game.bullets.length > CFG.maxBullets) {
    game.bullets.shift();
  }
}

function shootAngle(x, y, angle, speed, type = "normal", r = 7, color = null) {
  createBullet({
    x,
    y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    type,
    r,
    color
  });
}

function shootAt(x, y, tx, ty, speed, type = "normal", r = 7, color = null) {
  const a = Math.atan2(ty - y, tx - x);

  shootAngle(x, y, a, speed, type, r, color);
}

function addWarning(type, o) {
  game.warnings.push({
    type,
    ...o,
    life: o.life || 1.2,
    max: o.life || 1.2
  });
}

function addObject(o) {
  game.objects.push(o);
}

function addDelay(time, fn) {
  game.delayed.push({
    time,
    fn
  });
}

function burstParticles(x, y, color, count = 16, speed = 130) {
  for (let i = 0; i < count; i++) {
    const a = Math.PI * 2 * i / count + Math.random() * 0.15;

    game.particles.push({
      x,
      y,
      vx: Math.cos(a) * rand(speed * 0.4, speed),
      vy: Math.sin(a) * rand(speed * 0.4, speed),
      r: rand(2, 4),
      color,
      life: 1,
      max: 1
    });
  }
}

function takeDamage(amount, ignoreDodge = false, special = false) {
  if (game.gameOver || game.invincible > 0) {
    return;
  }

  if (game.shield > 0) {
    game.shield--;

    game.stats.shieldBlocks++;
    save.totalShieldBlocks++;

    achieve("shield_block", "보호막으로 탄 막기");

    addText("보호막!", player.x, player.y - 23, "#66ccff", 0.7);
    sfx("shield");
    saveGlobal();

    return;
  }

  if (!ignoreDodge) {
    if (Math.random() < totalDodge()) {
      game.dodgeFlash = 0.15;

      game.stats.dodges++;
      save.totalDodges++;

      addText("회피", player.x + 18, player.y - 18, "#fff", 0.55);
      sfx("dodge");

      return;
    }

    amount *= 1 - totalDamageReduce();

    if (special) {
      amount *= 1 - Math.min(0.55, game.specialReduce);
    }
  }

  game.hp -= amount;

  game.stats.damageTaken += amount;
  game.stats.hits++;
  save.totalHits++;

  if (game.bossActive) {
    game.bossNoHit = false;
  }

  sfx("hit");

  if (game.hp <= 0) {
    death();
  }
}

function death() {
  if (game.revive && !game.reviveUsed) {
    game.reviveUsed = true;
    game.revive = false;

    game.hp = game.maxHp * 0.6;
    game.invincible = 2;

    sfx("revive");
    achieve("revive", "부활 사용");

    return;
  }

  game.gameOver = true;

  save.totalDeaths++;
  save.totalBossClears += game.stats.bossClears;
  save.totalCards += game.stats.cards;
  save.totalLegendary += game.stats.legendary;
  save.totalPenalties += game.stats.penalties;

  commitPlayTime();

  if (game.time > game.best) {
    game.best = game.time;
    game.newRecord = true;
    localStorage.setItem("ultimate_survival_best", String(game.best));
  }

  if (game.time > game.today) {
    game.today = game.time;
    game.newDaily = true;
    localStorage.setItem(dayKey(), String(game.today));
  }

  saveGlobal();
}

function removeAllPenalties() {
  for (const p of game.activePenalties) {
    if (p.undo) {
      p.undo();
    }
  }

  game.activePenalties = [];
  game.ownedPenalties.clear();

  addText("정화", player.x, player.y - 36, "#FFD700", 1.2);
}

function applyCard(card) {
  if (game.ownedCards.has(card.id)) {
    return;
  }

  game.ownedCards.add(card.id);
  game.runCards.push(card);

  game.stats.cards++;

  if (card.rarity === "legendary") {
    game.stats.legendary++;
  }

  if (!save.cardTypes.includes(card.id)) {
    save.cardTypes.push(card.id);
  }

  card.apply();
  checkCombos();

  sfx(card.rarity === "legendary" ? "legend" : "card");

  saveGlobal();
}

function applyPenalty(p) {
  if (game.ownedPenalties.has(p.id)) {
    return;
  }

  game.ownedPenalties.add(p.id);
  game.runPenalties.push(p);

  game.stats.penalties++;

  if (!save.penaltyTypes.includes(p.id)) {
    save.penaltyTypes.push(p.id);
  }

  const undo = p.apply();

  game.activePenalties.push({
    id: p.id,
    undo
  });

  game.penaltyText =
    penaltyGradeName(p.grade) + "\n" +
    p.name + "\n" +
    p.desc;

  game.penaltyOpen = true;
  game.penaltyTimer = 0;

  sfx("penalty");
  saveGlobal();
}

function checkCombos() {
  const has = id => game.ownedCards.has(id);

  function combo(id, name, fn) {
    if (game.ownedCards.has("COMBO_" + id)) {
      return;
    }

    game.ownedCards.add("COMBO_" + id);

    fn();

    game.comboOpen = true;
    game.comboTimer = 0;
    game.comboName = name;

    sfx("legend");
  }

  if (has("E2") && has("L2")) {
    combo("regen", "재생+", () => game.regen += 0.005);
  }

  if (has("C6") && has("R4") && has("E4")) {
    combo("def", "방어+", () => addDamageReduce(0.05));
  }

  if (has("C5") && has("R3") && has("E3")) {
    combo("dodge", "회피+", () => addDodge(0.05));
  }

  if (has("C8") && has("R6") && has("E5")) {
    combo("sdef", "특방+", () => addSpecialReduce(0.06));
  }
}function weightedCardRarity() {
  const r = Math.random() * 100;

  if (r < 55) return "common";
  if (r < 82) return "rare";
  if (r < 94) return "epic";

  return "legendary";
}

function weightedPenaltyGrade() {
  const r = Math.random() * 100;

  if (r < 65) return "weak";
  if (r < 90) return "mid";

  return "strong";
}

function getRandomCardChoices() {
  const choices = [];
  const available = cardData.filter(c => !game.ownedCards.has(c.id));

  if (available.length === 0) {
    return [];
  }

  let guard = 0;

  while (choices.length < 3 && guard < 100) {
    guard++;

    let rarity = weightedCardRarity();
    let pool = available.filter(c =>
      c.rarity === rarity &&
      !choices.includes(c)
    );

    if (pool.length === 0) {
      pool = available.filter(c => !choices.includes(c));
    }

    if (pool.length === 0) {
      break;
    }

    choices.push(pick(pool));
  }

  return choices;
}

function getRandomPenalty() {
  let available = penaltyData.filter(p => !game.ownedPenalties.has(p.id));

  if (available.length === 0) {
    return null;
  }

  let grade = weightedPenaltyGrade();
  let pool = available.filter(p => p.grade === grade);

  if (pool.length === 0) {
    pool = available;
  }

  return pick(pool);
}

function openCardEvent() {
  if (
    game.cardOpen ||
    game.penaltyOpen ||
    game.rewardOpen ||
    game.comboOpen ||
    game.bossActive ||
    game.bossIntro
  ) {
    return;
  }

  const canPenalty = game.penaltyCooldown <= 0;

  if (canPenalty && Math.random() < 0.07) {
    const p = getRandomPenalty();

    if (p) {
      game.penaltyCooldown = 2;
      game.nextCardTime += CFG.cardInterval;
      applyPenalty(p);
      return;
    }
  }

  if (game.penaltyCooldown > 0) {
    game.penaltyCooldown--;
  }

  const choices = getRandomCardChoices();

  if (choices.length === 0) {
    addMaxHp(30);
    game.hp = Math.min(game.maxHp, game.hp + game.maxHp * 0.5);
    notice(["카드 모두 획득", "최대 HP +30 / HP 50% 회복"], "#FFD700");
    game.nextCardTime += CFG.cardInterval;
    return;
  }

  game.cardChoices = choices;
  game.cardOpen = true;
  game.cardTimer = 0;
  game.cardAnim = 0;

  stopDrag();
}

function chooseCard(index) {
  const c = game.cardChoices[index];

  if (!c) {
    return;
  }

  applyCard(c);

  game.cardOpen = false;
  game.cardChoices = [];
  game.nextCardTime += CFG.cardInterval;
}

function cardTimeout() {
  game.cardOpen = false;
  game.cardChoices = [];
  game.nextCardTime += CFG.cardInterval;

  game.stats.cardTimeouts++;
  save.totalCardTimeouts++;

  achieve("card_timeout", "카드 선택 시간 초과");

  const p = getRandomPenalty();

  if (p) {
    applyPenalty(p);
  }

  saveGlobal();
}

function buildAttackBag() {
  game.attackBag = [];

  for (let i = 1; i <= 25; i++) {
    game.attackBag.push("A" + i);
  }

  game.attackBag = shuffle(game.attackBag);
}

function getNextAttackId() {
  if (game.attackBag.length === 0) {
    buildAttackBag();
  }

  return game.attackBag.pop();
}

function addActiveAttack() {
  let id = getNextAttackId();
  let guard = 0;

  while (game.activeAttacks.includes(id) && guard < 30) {
    id = getNextAttackId();
    guard++;
  }

  game.activeAttacks.push(id);
  game.attackTimers[id] = 999;

  if (game.activeAttacks.length > 5) {
    const removed = game.activeAttacks.shift();

    delete game.attackTimers[removed];

    game.swapCount++;

    const step = Math.floor((game.swapCount - 1) / 5);

    game.normalBonus = 2 + step * 2;
    game.specialBonus = 4 + step * 2;

    addMaxHp(10);

    if (game.swapCount % 2 === 0) {
      game.specialInterval = Math.max(
        CFG.specialMinInterval,
        game.specialInterval - 1
      );
    }

    notice(["공격 교체", "탄막 강화 / 최대 HP +10"], "#ffcc33");
  }
}

function randomNearPlayer(minD = 100, maxD = 230, marginX = 35, marginY = 45) {
  for (let i = 0; i < 60; i++) {
    const a = rand(0, Math.PI * 2);
    const r = rand(minD, maxD);

    const x = clamp(
      player.x + Math.cos(a) * r,
      left() + marginX,
      right() - marginX
    );

    const y = clamp(
      player.y + Math.sin(a) * r,
      topY() + marginY,
      bottomY() - marginY
    );

    if (dist(x, y, player.x, player.y) > minD * 0.7) {
      return { x, y };
    }
  }

  return {
    x: arena.x,
    y: arena.y
  };
}

function weightedSpecialPick() {
  const ids = Object.keys(specialAttacks).filter(id => id !== game.lastSpecial);

  let total = 0;

  for (const id of ids) {
    total += game.specialWeights[id] || 100;
  }

  let roll = Math.random() * total;

  for (const id of ids) {
    const w = game.specialWeights[id] || 100;

    if (roll < w) {
      return id;
    }

    roll -= w;
  }

  return ids[0];
}

const bossAttacks = makeBossAttacks();

for (const b of bossList) {
  b.attacks = bossAttacks[b.id] || [];
}

function bossColor(b) {
  return b ? b.color : "#ff3333";
}

function warnCircle(x, y, r, life, color) {
  addWarning("circle", { x, y, r, life, color });
}

function warnLine(x, y, a, life, color) {
  addWarning("line", { x, y, a, life, color });
}

function bossBullet(b, o) {
  createBullet({
    ...o,
    type: "special",
    color: b.color
  });
}

function patternFan(b, o) {
  const x = o.x;
  const y = o.y;

  warnCircle(x, y, 48, o.warn || 1.1, b.color);

  addDelay(o.warn || 1.1, () => {
    const gap = Math.floor(rand(1, o.count - 1));

    for (let i = 0; i < o.count; i++) {
      if (Math.abs(i - gap) <= (o.gap || 2) / 2) continue;

      const a = Math.PI / 2 - o.spread / 2 + i * (o.spread / (o.count - 1));

      bossBullet(b, {
        x,
        y,
        vx: Math.cos(a) * o.speed,
        vy: Math.sin(a) * o.speed,
        r: 8
      });
    }

    burstParticles(x, y, b.color, 12, 100);
  });
}

function patternFanWaves(b, o) {
  const x = arena.x;
  const y = topY() + 58;

  warnCircle(x, y, 50, o.delay, b.color);

  addDelay(o.delay, () => {
    for (let w = 0; w < o.waves; w++) {
      addDelay(w * 0.35, () => {
        for (let i = 0; i < o.count; i++) {
          const a =
            Math.PI / 2 -
            o.spread / 2 +
            i * (o.spread / Math.max(1, o.count - 1)) +
            (w - 0.5) * 0.08;

          bossBullet(b, {
            x,
            y,
            vx: Math.cos(a) * o.speed,
            vy: Math.sin(a) * o.speed,
            r: 8
          });
        }
      });
    }
  });
}

function patternVerticalLanes(b, o) {
  const lanes = o.lanes;
  const safeStart = Math.floor(rand(0, lanes - o.safe));

  for (let i = 0; i < lanes; i++) {
    if (i >= safeStart && i < safeStart + o.safe) continue;

    const x = left() + 30 + i * ((arena.w - 60) / (lanes - 1));

    warnLine(x, arena.y, Math.PI / 2, o.delay, b.color);

    addDelay(o.delay + i * 0.025, () => {
      bossBullet(b, {
        x,
        y: topY() - 35,
        vx: 0,
        vy: o.speed,
        r: o.r || 9,
        wave: o.wave,
        waveAmp: o.wave ? 18 : 0,
        waveFreq: 4
      });
    });
  }
}

function patternHorizontalLanes(b, o) {
  const lanes = o.lanes;
  const safeStart = Math.floor(rand(0, lanes - o.safe));
  const fromLeft = Math.random() < 0.5;

  for (let i = 0; i < lanes; i++) {
    if (i >= safeStart && i < safeStart + o.safe) continue;

    const y = topY() + 60 + i * ((arena.h - 120) / (lanes - 1));

    warnLine(arena.x, y, 0, o.delay, b.color);

    addDelay(o.delay + i * 0.04, () => {
      bossBullet(b, {
        x: fromLeft ? left() - 35 : right() + 35,
        y,
        vx: fromLeft ? o.speed : -o.speed,
        vy: o.alternate ? (i % 2 ? 45 : -45) : 0,
        r: o.r || 9
      });
    });
  }
}

function patternTargetBursts(b, o) {
  const pts = [];

  for (let i = 0; i < o.points; i++) {
    const p = o.avoidPlayer
      ? {
          x: rand(left() + 40, right() - 40),
          y: rand(topY() + 70, bottomY() - 70)
        }
      : randomNearPlayer(100, 230, 45, 60);

    pts.push(p);

    warnCircle(p.x, p.y, o.radius, o.delay, b.color);
  }

  addDelay(o.delay, () => {
    for (const p of pts) {
      const base = Math.atan2(player.y - p.y, player.x - p.x);

      for (let j = 0; j < o.shots; j++) {
        const a =
          o.shots <= 4
            ? Math.PI * 2 * j / o.shots
            : base + (j - (o.shots - 1) / 2) * 0.35;

        bossBullet(b, {
          x: p.x,
          y: p.y,
          vx: Math.cos(a) * o.speed,
          vy: Math.sin(a) * o.speed,
          r: 8
        });
      }

      burstParticles(p.x, p.y, b.color, 8, 80);
    }
  });
}

function patternSideWave(b, o) {
  const fromLeft = Math.random() < 0.5;

  for (let i = 0; i < o.rows; i++) {
    const y = topY() + 70 + i * ((arena.h - 140) / (o.rows - 1));

    warnLine(arena.x, y, 0, o.delay, b.color);

    addDelay(o.delay + i * 0.05, () => {
      bossBullet(b, {
        x: fromLeft ? left() - 30 : right() + 30,
        y,
        vx: fromLeft ? o.speed : -o.speed,
        vy: i % 2 ? 40 : -40,
        r: 9,
        wave: true,
        waveAmp: o.amp,
        waveFreq: o.freq
      });
    });
  }
}

function patternHalfRing(b, o) {
  const cx = arena.x;
  const cy = arena.y;

  warnCircle(cx, cy, 65, o.delay, b.color);

  addDelay(o.delay, () => {
    for (let w = 0; w < o.waves; w++) {
      addDelay(w * 0.35, () => {
        const gap = rand(0, Math.PI * 2);

        for (let i = 0; i < o.count; i++) {
          const a = Math.PI * 2 * i / o.count + w * 0.18;

          const diff = Math.abs(Math.atan2(
            Math.sin(a - gap),
            Math.cos(a - gap)
          ));

          if (diff < o.gap) continue;

          bossBullet(b, {
            x: cx,
            y: cy,
            vx: Math.cos(a) * o.speed,
            vy: Math.sin(a) * o.speed,
            r: 8
          });
        }
      });
    }
  });
}

function patternCoreGapRing(b, o) {
  const cx = arena.x;
  const cy = arena.y;

  addWarning("ring", {
    x: cx,
    y: cy,
    r: 80,
    life: o.delay,
    color: b.color
  });

  addDelay(o.delay, () => {
    for (let w = 0; w < o.waves; w++) {
      addDelay(w * 0.4, () => {
        const gap = rand(0, Math.PI * 2);

        for (let i = 0; i < o.count; i++) {
          const a = Math.PI * 2 * i / o.count + w * 0.2;

          const diff = Math.abs(Math.atan2(
            Math.sin(a - gap),
            Math.cos(a - gap)
          ));

          if (diff < o.gapSize) continue;

          if (o.inward) {
            bossBullet(b, {
              x: cx + Math.cos(a) * 220,
              y: cy + Math.sin(a) * 310,
              vx: -Math.cos(a) * o.speed,
              vy: -Math.sin(a) * o.speed,
              r: 8
            });
          } else {
            bossBullet(b, {
              x: cx,
              y: cy,
              vx: Math.cos(a) * o.speed,
              vy: Math.sin(a) * o.speed,
              r: 8
            });
          }
        }

        burstParticles(cx, cy, b.color, 10, 90);
      });
    }
  });
}

function patternArcRain(b, o) {
  const cx = arena.x;
  const cy = topY() + 65;

  warnCircle(cx, cy, 55, o.delay, b.color);

  addDelay(o.delay, () => {
    const gap = Math.floor(rand(2, o.count - 2));

    for (let i = 0; i < o.count; i++) {
      if (Math.abs(i - gap) <= 1) continue;

      const a = Math.PI / 2 - 1.45 + i * (2.9 / (o.count - 1));

      bossBullet(b, {
        x: cx,
        y: cy,
        vx: Math.cos(a) * o.speed,
        vy: Math.sin(a) * o.speed,
        r: 8
      });
    }
  });
}

function patternTwinStreams(b, o) {
  const y1 = topY() + 100;
  const y2 = bottomY() - 100;

  warnLine(arena.x, y1, 0, o.delay, b.color);
  warnLine(arena.x, y2, 0, o.delay, b.color);

  addDelay(o.delay, () => {
    for (let i = 0; i < 4; i++) {
      addDelay(i * 0.18, () => {
        bossBullet(b, {
          x: left() - 30,
          y: y1 + i * 12,
          vx: o.speed,
          vy: o.wave ? 35 : 0,
          r: 8,
          wave: o.wave,
          waveAmp: o.wave ? 22 : 0,
          waveFreq: 4
        });

        bossBullet(b, {
          x: right() + 30,
          y: y2 - i * 12,
          vx: -o.speed,
          vy: o.wave ? -35 : 0,
          r: 8,
          wave: o.wave,
          waveAmp: o.wave ? 22 : 0,
          waveFreq: 4
        });
      });
    }
  });
}

  let total = 0;

  for (const b of bossList) {
    total += save.bossWeights[b.id] ?? 100;
  }

  let roll = Math.random() * total;

  for (const b of bossList) {
    const w = save.bossWeights[b.id] ?? 100;

    if (roll < w) return b;

    roll -= w;
  }

  return bossList[0];
}

function updateBossWeights(selectedBoss) {
  for (const b of bossList) {
    const current = save.bossWeights[b.id] ?? 100;

    if (b.id === selectedBoss.id) {
      save.bossWeights[b.id] = Math.max(30, current - 30);
    } else {
      save.bossWeights[b.id] = Math.min(150, current + 10);
    }
  }

  saveGlobal();
}

function recordBossSeen(boss) {
  save.bossSeen[boss.id] = true;
  saveGlobal();

  achieve("boss_first_seen", "첫 보스 조우");
}

function recordBossAttackSeen(bossId, attackId) {
  if (!save.bossAttackSeen[bossId]) {
    save.bossAttackSeen[bossId] = [];
  }

  if (!save.bossAttackSeen[bossId].includes(attackId)) {
    save.bossAttackSeen[bossId].push(attackId);
    saveGlobal();
  }
}

function startBossIntro() {
  game.currentBoss = pickBoss();

  updateBossWeights(game.currentBoss);
  recordBossSeen(game.currentBoss);

  game.bossIntro = true;
  game.bossIntroTimer = 0;
  game.bossAttackTimer = 0;
  game.bossAttackIndex = 0;
  game.bossAttackDeck = [];
  game.bossFlash = 0;
  game.bossNoHit = true;

  stopDrag();
  sfx("boss");

  addText(game.currentBoss.name, W / 2, 170, game.currentBoss.color, 1.4);
}

function startBoss() {
  game.bossIntro = false;
  game.bossActive = true;
  game.bossTimer = 0;

  game.specialTimer = 0;
  game.specialLock = 0;

  game.bossAttackTimer = 0;
  game.bossAttackIndex = 0;
  game.bossAttackDeck = shuffle(game.currentBoss.attacks);
  game.bossFlash = 0;
  game.bossScreenPulse = 0.4;
}

function finishBoss() {
  const b = game.currentBoss;

  game.bossActive = false;
  game.bossTimer = 0;
  game.nextBossTime += CFG.bossEvery;

  game.stats.bossClears++;

  save.bossClear[b.id] = (save.bossClear[b.id] || 0) + 1;

  game.stats.sameBossMax = Math.max(
    game.stats.sameBossMax,
    save.bossClear[b.id]
  );

  achieve("boss_first_clear", "첫 보스 클리어");

  if (game.stats.bossClears >= 3) {
    achieve("boss_clear_3", "보스 3회 클리어");
  }

  if (game.stats.bossClears >= 10) {
    achieve("boss_clear_10", "보스 10회 클리어");
  }

  if (game.stats.bossClears >= 30) {
    achieve("boss_clear_30", "보스 30회 클리어");
  }

  if (save.bossClear[b.id] >= 3) {
    achieve("same_boss_3", "같은 보스 3회 클리어");
  }

  if (game.bossNoHit) {
    achieve("boss_nohit", "보스전 중 피격 없이 생존");
  }

  saveGlobal();

  openBossReward();
}

function bossSpecialAttack() {
  const b = game.currentBoss;

  if (!b) return;

  if (game.bossAttackDeck.length === 0) {
    game.bossAttackDeck = shuffle(b.attacks);
  }

  const atk = game.bossAttackDeck.shift();

  if (!atk) return;

  recordBossAttackSeen(b.id, atk.id);

  game.bossAttackIndex++;
  game.bossFlash = 0.4;
  game.bossScreenPulse = 0.25;

  sfx("boss");

  atk.run(b);
}

function openBossReward() {
  const all = cardData.filter(c => !game.ownedCards.has(c.id));

  let reward = null;

  if (all.length > 0) {
    if (Math.random() < 0.18) {
      reward = all.find(c => c.id === "L5") || null;
    }

    if (!reward) {
      reward = pick(all);
    }
  }

  game.rewardCard = reward;
  game.rewardOpen = true;
  game.rewardTimer = 0;

  stopDrag();
}

function chooseBossReward() {
  if (!game.rewardCard) {
    game.rewardOpen = false;
    return;
  }

  applyCard(game.rewardCard);

  game.rewardCard = null;
  game.rewardOpen = false;
}function updateBoss(dt) {
  if (
    !game.bossActive &&
    !game.bossIntro &&
    !game.cardOpen &&
    !game.penaltyOpen &&
    !game.rewardOpen &&
    !game.comboOpen &&
    game.time >= game.nextBossTime
  ) {
    startBossIntro();
  }

  if (game.bossIntro) {
    game.bossIntroTimer += dt;

    if (game.bossIntroTimer >= 2.0) {
      startBoss();
    }
  }

  if (game.bossActive) {
    game.bossTimer += dt;

    if (game.bossTimer >= CFG.bossDuration) {
      finishBoss();
    }
  }
}

function updateBossAttacks(dt) {
  if (!game.bossActive) return;

  const b = game.currentBoss || bossList[0];

  game.bossAttackTimer += dt;

  const target =
    game.bossAttackIndex === 0
      ? b.firstAttack
      : b.attackInterval;

  if (game.bossAttackTimer >= target) {
    game.bossAttackTimer = 0;
    bossSpecialAttack();
  }
}

function updateAttacks(dt) {
  if (game.time >= game.nextAttackAdd) {
    addActiveAttack();

    game.nextAttackAddStep++;
    game.nextAttackAdd = 2 + game.nextAttackAddStep * 30;
  }

  const slow = game.bossActive ? CFG.bossNormalSlow : 1;

  for (const id of game.activeAttacks) {
    game.attackTimers[id] = (game.attackTimers[id] || 0) + dt;

    const cd = (attackCooldown[id] || 2.5) * slow;

    if (game.attackTimers[id] >= cd) {
      game.attackTimers[id] = 0;

      if (normalAttacks[id]) {
        normalAttacks[id]();
      }
    }
  }
}

function updateSpecials(dt) {
  if (game.bossActive) return;

  if (game.specialLock > 0) {
    game.specialLock -= dt;
    return;
  }

  game.specialTimer += dt;

  if (game.specialTimer >= game.specialInterval) {
    game.specialTimer = 0;

    const id = weightedSpecialPick();

    game.lastSpecial = id;

    game.specialWeights[id] = Math.max(
      30,
      (game.specialWeights[id] || 100) - 15
    );

    specialAttacks[id]();

    game.specialLock = specialLockTime[id] || 2.5;
  }
}

function updateBullets(dt) {
  const speedMul = bulletSpeedMul();

  for (const b of game.bullets) {
    b.age += dt;

    if (b.homing) {
      const target = Math.atan2(player.y - b.y, player.x - b.x);
      const current = Math.atan2(b.vy, b.vx);

      let diff = Math.atan2(
        Math.sin(target - current),
        Math.cos(target - current)
      );

      const maxTurn = (b.turn || 1) * dt;

      diff = clamp(diff, -maxTurn, maxTurn);

      const angle = current + diff;
      const sp = b.speed || Math.hypot(b.vx, b.vy);

      b.vx = Math.cos(angle) * sp;
      b.vy = Math.sin(angle) * sp;
    }

    let vx = b.vx * speedMul;
    let vy = b.vy * speedMul;

    if (b.wave) {
      const side = Math.sin(b.age * (b.waveFreq || 4)) *
        (b.waveAmp || 18);

      const len = Math.hypot(vx, vy) || 1;
      const nx = -vy / len;
      const ny = vx / len;

      b.x += nx * side * dt * 0.7;
      b.y += ny * side * dt * 0.7;
    }

    b.x += vx * dt;
    b.y += vy * dt;

    if (b.life != null) {
      b.life -= dt;
    }
  }

  game.bullets = game.bullets.filter(b =>
    b.x > left() - 140 &&
    b.x < right() + 140 &&
    b.y > topY() - 160 &&
    b.y < bottomY() + 160 &&
    (b.life == null || b.life > 0)
  );

  const pr = player.r * (1 + game.sizeBonus);

  for (let i = game.bullets.length - 1; i >= 0; i--) {
    const b = game.bullets[i];

    if (dist(player.x, player.y, b.x, b.y) < pr + b.r) {
      takeDamage(b.damage, false, b.type === "special");
      game.bullets.splice(i, 1);
    }
  }
}

function updateObjects(dt) {
  for (const o of game.objects) {
    o.life -= dt;

    if (o.type === "blackhole") {
      const d = dist(player.x, player.y, o.x, o.y);

      if (d < 150 && d > 1) {
        const p = (150 - d) / 150;
        const a = Math.atan2(o.y - player.y, o.x - player.x);

        player.x += Math.cos(a) * p * 45 * dt;
        player.y += Math.sin(a) * p * 45 * dt;
      }
    }

    if (o.type === "softGravity") {
      const d = dist(player.x, player.y, o.x, o.y);

      if (d < o.r && d > 1) {
        const p = (o.r - d) / o.r;
        const a = Math.atan2(o.y - player.y, o.x - player.x);

        player.x += Math.cos(a) * p * o.pull * dt;
        player.y += Math.sin(a) * p * o.pull * dt;
      }
    }
  }

  game.objects = game.objects.filter(o => o.life > 0);
}

function updateWarnings(dt) {
  for (const w of game.warnings) {
    w.life -= dt;
  }

  game.warnings = game.warnings.filter(w => w.life > 0);
}

function updateEffects(dt) {
  for (const p of game.particles) {
    p.life -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  }

  game.particles = game.particles.filter(p => p.life > 0);

  for (const t of game.texts) {
    t.life -= dt;
    t.y -= 22 * dt;
  }

  game.texts = game.texts.filter(t => t.life > 0);

  for (const n of game.notices) {
    n.life -= dt;
  }

  game.notices = game.notices.filter(n => n.life > 0);

  for (const d of game.delayed) {
    d.time -= dt;
  }

  const ready = game.delayed.filter(d => d.time <= 0);

  game.delayed = game.delayed.filter(d => d.time > 0);

  for (const d of ready) {
    d.fn();
  }

  if (game.dodgeFlash > 0) {
    game.dodgeFlash -= dt;
  }

  if (game.invincible > 0) {
    game.invincible -= dt;
  }

  if (game.bossFlash > 0) {
    game.bossFlash -= dt;
  }

  if (game.bossScreenPulse > 0) {
    game.bossScreenPulse -= dt;
  }

  if (save.survivorUnlocked && save.survivorSkin) {
    game.trails.push({
      x: player.x,
      y: player.y,
      r: player.r,
      life: 0.35,
      max: 0.35
    });

    if (Math.random() < 0.35) {
      const a = rand(0, Math.PI * 2);

      game.particles.push({
        x: player.x + Math.cos(a) * 18,
        y: player.y + Math.sin(a) * 18,
        vx: Math.cos(a) * rand(20, 55),
        vy: Math.sin(a) * rand(20, 55),
        r: rand(1.5, 3),
        color: Math.random() < 0.65 ? "#FFD700" : "#eeeeee",
        life: 0.7,
        max: 0.7
      });
    }
  }

  for (const tr of game.trails) {
    tr.life -= dt;
  }

  game.trails = game.trails.filter(tr => tr.life > 0);
}

function updatePlayer(dt) {
  const speed = player.speed * dt;

  let dx = 0;
  let dy = 0;

  if (keys["ArrowLeft"] || keys["a"] || keys["A"]) dx -= 1;
  if (keys["ArrowRight"] || keys["d"] || keys["D"]) dx += 1;
  if (keys["ArrowUp"] || keys["w"] || keys["W"]) dy -= 1;
  if (keys["ArrowDown"] || keys["s"] || keys["S"]) dy += 1;

  if (dx || dy) {
    const len = Math.hypot(dx, dy);

    player.x += dx / len * speed;
    player.y += dy / len * speed;
  }

  const r = player.r * (1 + game.sizeBonus);

  let touchingWall = false;

  if (player.x < left() + r) {
    player.x = left() + r;
    touchingWall = true;
  }

  if (player.x > right() - r) {
    player.x = right() - r;
    touchingWall = true;
  }

  if (player.y < topY() + r) {
    player.y = topY() + r;
    touchingWall = true;
  }

  if (player.y > bottomY() - r) {
    player.y = bottomY() - r;
    touchingWall = true;
  }

  if (touchingWall) {
    game.wallHurtTimer += dt;

    if (game.wallHurtTimer >= 0.25) {
      game.wallHurtTimer = 0;
      takeDamage(2.5, true, false);
    }
  } else {
    game.wallHurtTimer = 0;
  }
}

function updateAchievements(dt) {
  if (game.regen > 0 && !game.gameOver) {
    game.hp = Math.min(
      game.maxHp,
      game.hp + game.maxHp * game.regen * dt
    );
  }

  game.displayHp += (game.hp - game.displayHp) * Math.min(1, dt * 8);

  if (game.hp / game.maxHp <= 0.10) {
    game.lowHpTimer += dt;

    if (game.lowHpTimer >= 10) {
      achieve("lowhp_10", "HP 10% 이하에서 10초 생존");
    }
  } else {
    game.lowHpTimer = 0;
  }

  if (game.time >= 60) achieve("survive_60", "60초 생존");
  if (game.time >= 120) achieve("survive_120", "120초 생존");
  if (game.time >= 300) achieve("survive_300", "300초 생존");

  if (game.time >= 540 && !game.survivorDone) {
    game.survivorDone = true;
    game.survivor = true;
    game.survivorTimer = 0;

    achieve("survivor", "SURVIVOR");

    sfx("survivor");
  }

  if (game.time >= 1000) achieve("survive_1000", "1000초 생존");

  if (game.stats.cards >= 5) achieve("card_5", "카드 5장 획득");
  if (game.stats.cards >= 10) achieve("card_10", "카드 10장 획득");
  if (game.stats.cards >= 20) achieve("card_20", "카드 20장 획득");

  if (game.stats.legendary >= 1) achieve("legend_first", "전설 카드 첫 획득");
  if (game.stats.legendary >= 3) achieve("legend_3", "전설 카드 3장 획득");

  if (game.stats.dodges >= 50) achieve("dodge_50", "회피 50회 성공");

  if (save.totalHits + game.stats.hits >= 100) {
    achieve("hit_100", "피격 100회 누적");
  }

  const totalTime = save.totalPlayTime + Math.floor(game.sessionTime);

  if (totalTime >= 5 * 60) achieve("play_5m", "첫 발걸음");
  if (totalTime >= 30 * 60) achieve("play_30m", "생존자");
  if (totalTime >= 2 * 3600) achieve("play_2h", "숙련자");
  if (totalTime >= 5 * 3600) achieve("play_5h", "베테랑");
  if (totalTime >= 10 * 3600) achieve("play_10h", "불굴");
  if (totalTime >= 15 * 3600) achieve("play_15h", "전설");
  if (totalTime >= 20 * 3600) achieve("play_20h", "끝없는 자");
}

function updateGame(dt) {
  if (!game.started || game.gameOver) {
    updateEffects(dt);
    return;
  }

  if (game.paused || game.tutorialOpen) {
    updateEffects(dt);
    return;
  }

  if (game.survivor) {
    game.survivorTimer += dt;
    updateEffects(dt);

    if (game.survivorTimer > 3.3) {
      game.survivor = false;
    }

    return;
  }

  if (game.cardOpen) {
    game.cardTimer += dt;
    game.cardAnim += dt;

    const timeLimit = Math.max(
      4,
      CFG.cardSelectTime -
      (game.ownedPenalties.has("P5") ? 2 : 0)
    );

    if (game.cardTimer >= timeLimit) {
      cardTimeout();
    }

    updateEffects(dt);
    return;
  }

  if (game.penaltyOpen) {
    game.penaltyTimer += dt;

    if (game.penaltyTimer >= CFG.penaltyShowTime) {
      game.penaltyOpen = false;
    }

    updateEffects(dt);
    return;
  }

  if (game.rewardOpen || game.comboOpen) {
    if (game.comboOpen) {
      game.comboTimer += dt;

      if (game.comboTimer > 2.0) {
        game.comboOpen = false;
      }
    }

    updateEffects(dt);
    return;
  }

  if (!game.showStart) {
    game.countTimer += dt;

    if (game.countTimer >= 1) {
      game.countTimer = 0;
      game.count--;

      if (game.count <= 0) {
        game.showStart = true;
        game.startTextTimer = 0.8;
      }
    }

    updateEffects(dt);
    return;
  }

  if (game.startTextTimer > 0) {
    game.startTextTimer -= dt;
    updateEffects(dt);
    return;
  }

  game.time += dt;
  game.sessionTime += dt;

  if (game.time >= game.nextCardTime) {
    openCardEvent();
  }

  updatePlayer(dt);
  updateBoss(dt);
  updateBossAttacks(dt);
  updateAttacks(dt);
  updateSpecials(dt);
  updateBullets(dt);
  updateObjects(dt);
  updateWarnings(dt);
  updateEffects(dt);
  updateAchievements(dt);
  updateBgm(dt);
}

function backgroundColor() {
  if ((game.bossActive || game.bossIntro) && game.currentBoss) {
    return game.currentBoss.bg;
  }

  const colors = [
    "#000000",
    "#001222",
    "#100016",
    "#160006",
    "#151000",
    "#1b1400",
    "#211800"
  ];

  const i = Math.min(
    colors.length - 1,
    Math.floor(game.time / 120)
  );

  return colors[i];
}

function drawBackground() {
  ctx.fillStyle = backgroundColor();
  ctx.fillRect(0, 0, W, H);

  if (game.bossScreenPulse > 0 && game.currentBoss) {
    ctx.save();
    ctx.globalAlpha = game.bossScreenPulse * 0.35;
    ctx.fillStyle = game.currentBoss.color;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  const g = ctx.createRadialGradient(
    W / 2,
    H / 2,
    20,
    W / 2,
    H / 2,
    520
  );

  g.addColorStop(0, "rgba(255,255,255,0.03)");
  g.addColorStop(1, "rgba(0,0,0,0.6)");

  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawArena() {
  ctx.save();

  ctx.strokeStyle = "#2299ff";
  ctx.lineWidth = 4;
  ctx.shadowColor = "#2299ff";
  ctx.shadowBlur = 15;

  ctx.strokeRect(left(), topY(), arena.w, arena.h);

  ctx.restore();
}

function drawWarnings() {
  for (const w of game.warnings) {
    const a = Math.max(0, w.life / w.max);

    ctx.save();
    ctx.globalAlpha = 0.25 + 0.45 * a;
    ctx.strokeStyle = w.color || "#ff3333";
    ctx.fillStyle = w.color || "#ff3333";
    ctx.shadowColor = w.color || "#ff3333";
    ctx.shadowBlur = 15;
    ctx.lineWidth = 4;

    if (w.type === "circle" || w.type === "meteor") {
      ctx.beginPath();
      ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
      ctx.stroke();
    }

    if (w.type === "ring") {
      ctx.beginPath();
      ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(w.x, w.y, w.r * 0.6, 0, Math.PI * 2);
      ctx.stroke();
    }

    if (w.type === "line") {
      ctx.translate(w.x, w.y);
      ctx.rotate(w.a || 0);
      ctx.fillRect(-arena.w, -6, arena.w * 2, 12);
    }

    if (w.type === "blackhole") {
      ctx.beginPath();
      ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(w.x, w.y, w.r * 0.55, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.restore();
  }
}

function drawObjects() {
  for (const o of game.objects) {
    ctx.save();

    ctx.globalAlpha = Math.min(1, o.life);
    ctx.strokeStyle = o.color || "#ff3333";
    ctx.fillStyle = o.color || "#ff3333";
    ctx.shadowColor = o.color || "#ff3333";
    ctx.shadowBlur = 18;

    if (o.type === "blackhole" || o.type === "softGravity") {
      ctx.beginPath();
      ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
      ctx.stroke();

      ctx.globalAlpha *= 0.25;
      ctx.beginPath();
      ctx.arc(o.x, o.y, o.r * 2.1, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.restore();
  }
}

function drawBossIconShape(icon, color) {
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;

  if (icon === "flame") {
    ctx.beginPath();
    ctx.moveTo(0, -34);
    ctx.bezierCurveTo(28, -8, 15, 35, 0, 38);
    ctx.bezierCurveTo(-20, 25, -26, 0, 0, -34);
    ctx.fill();
  } else if (icon === "bolt") {
    ctx.beginPath();
    ctx.moveTo(-8, -38);
    ctx.lineTo(18, -6);
    ctx.lineTo(2, -6);
    ctx.lineTo(12, 38);
    ctx.lineTo(-18, 2);
    ctx.lineTo(-2, 2);
    ctx.closePath();
    ctx.fill();
  } else if (icon === "venom") {
    ctx.beginPath();
    ctx.arc(0, 0, 33, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.arc(-10, -5, 6, 0, Math.PI * 2);
    ctx.arc(10, -5, 6, 0, Math.PI * 2);
    ctx.fill();
  } else if (icon === "moon") {
    ctx.beginPath();
    ctx.arc(0, 0, 34, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "rgba(0,0,0,0.85)";
    ctx.beginPath();
    ctx.arc(13, -3, 31, 0, Math.PI * 2);
    ctx.fill();
  } else if (icon === "crystal") {
    ctx.beginPath();
    ctx.moveTo(0, -40);
    ctx.lineTo(28, -10);
    ctx.lineTo(20, 34);
    ctx.lineTo(-20, 34);
    ctx.lineTo(-28, -10);
    ctx.closePath();
    ctx.fill();
  } else if (icon === "blade") {
    ctx.beginPath();
    ctx.moveTo(0, -42);
    ctx.lineTo(14, 12);
    ctx.lineTo(0, 40);
    ctx.lineTo(-14, 12);
    ctx.closePath();
    ctx.fill();
  } else if (icon === "gravity") {
    ctx.beginPath();
    ctx.arc(0, 0, 22, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(0, 0, 42, 0, Math.PI * 2);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(0, 0, 58, 0.2, Math.PI * 1.5);
    ctx.stroke();
  } else if (icon === "star") {
    ctx.beginPath();

    for (let i = 0; i < 10; i++) {
      const r = i % 2 === 0 ? 40 : 17;
      const a = -Math.PI / 2 + i * Math.PI / 5;

      const x = Math.cos(a) * r;
      const y = Math.sin(a) * r;

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    ctx.closePath();
    ctx.fill();
  } else if (icon === "void") {
    ctx.beginPath();
    ctx.arc(0, 0, 38, 0, Math.PI * 2);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(0, 0, 23, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.arc(0, 0, 12, 0, Math.PI * 2);
    ctx.fill();
  } else if (icon === "rose") {
    for (let i = 0; i < 8; i++) {
      ctx.save();
      ctx.rotate(Math.PI * 2 * i / 8);
      ctx.beginPath();
      ctx.ellipse(0, -20, 11, 24, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    ctx.beginPath();
    ctx.arc(0, 0, 15, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.arc(0, 0, 34, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBossSprite() {
  if (!game.bossActive && !game.bossIntro) return;

  const b = game.currentBoss || bossList[0];
  const t = performance.now() / 1000;

  const x = arena.x + Math.sin(t * 2.4) * 10;
  const y = topY() + 53 + Math.sin(t * 3.2) * 4;

  const flash = game.bossFlash > 0 ? 1 : 0;
  const scale = 1 + flash * 0.12 + Math.sin(t * 5) * 0.025;

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  ctx.shadowColor = b.color;
  ctx.shadowBlur = 26 + flash * 25;

  ctx.fillStyle = "rgba(0,0,0,0.78)";
  ctx.beginPath();
  ctx.arc(0, 0, 48, 0, Math.PI * 2);
  ctx.fill();

  drawBossIconShape(b.icon, b.color);

  ctx.fillStyle = "#ffffff";
  ctx.beginPath();
  ctx.arc(0, 0, 5 + flash * 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = b.color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(0, 0, 55 + Math.sin(t * 4) * 4, 0, Math.PI * 2);
  ctx.stroke();

  ctx.restore();

  ctx.save();
  ctx.fillStyle = b.color;
  ctx.shadowColor = b.color;
  ctx.shadowBlur = 10;
  ctx.font = "bold 20px Arial";
  ctx.textAlign = "center";
  ctx.fillText(b.name, W / 2, topY() + 120);
  ctx.restore();
}

function drawParticles() {

function drawPlayer() {
  const r = player.r * (1 + game.sizeBonus);

  for (const tr of game.trails) {
    ctx.save();

    ctx.globalAlpha = 0.25 * (tr.life / tr.max);
    ctx.strokeStyle = "#FFD700";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.arc(tr.x, tr.y, tr.r + 6, 0, Math.PI * 2);
    ctx.stroke();

    ctx.restore();
  }

  ctx.save();

  if (save.survivorUnlocked && save.survivorSkin) {
    const t = performance.now() / 1000;

    ctx.shadowColor = "#FFD700";
    ctx.shadowBlur = 25;

    ctx.strokeStyle = "#FFD700";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.arc(player.x, player.y, r + 10 + Math.sin(t * 5) * 2, 0, Math.PI * 2);
    ctx.stroke();

    ctx.font = "bold 14px Arial";
    ctx.textAlign = "center";
    ctx.fillStyle = "#FFD700";

    for (let i = 0; i < 4; i++) {
      const a = t * 1.7 + i * Math.PI / 2;
      const x = player.x + Math.cos(a) * 26;
      const y = player.y + Math.sin(a) * 26;

      ctx.fillText("∞", x, y + 5);
    }
  }

  if (game.invincible > 0) {
    ctx.globalAlpha = 0.45 + Math.sin(performance.now() / 60) * 0.25;
  }

  ctx.fillStyle = "white";
  ctx.shadowColor = game.dodgeFlash > 0 ? "#66ccff" : "white";
  ctx.shadowBlur = game.dodgeFlash > 0 ? 20 : 12;

  ctx.beginPath();
  ctx.arc(player.x, player.y, r, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  if (game.shield > 0) {
    ctx.save();

    ctx.strokeStyle = "#66ccff";
    ctx.shadowColor = "#66ccff";
    ctx.shadowBlur = 12;
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.arc(player.x, player.y, r + 9, 0, Math.PI * 2);
    ctx.stroke();

    ctx.restore();
  }
}function drawTexts() {

function drawPanel(x, y, w, h, title) {
  ctx.save();

  ctx.fillStyle = "rgba(0,0,0,0.88)";
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 2;
  ctx.shadowColor = "#ffffff";
  ctx.shadowBlur = 10;

  roundRect(x, y, w, h, 22, true, true);

  ctx.shadowBlur = 0;
  ctx.fillStyle = "white";
  ctx.font = "bold 28px Arial";
  ctx.textAlign = "center";
  ctx.fillText(title, x + w / 2, y + 48);

  ctx.restore();
}

function drawDim() {
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.72)";
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

function drawMultiline(text, x, y, maxWidth, lineHeight, color) {
  ctx.fillStyle = color;

  const lines = String(text).split("\n");

  for (const line of lines) {
    const words = line.split(" ");
    let cur = "";

    for (const word of words) {
      const test = cur ? cur + " " + word : word;

      if (ctx.measureText(test).width > maxWidth && cur) {
        ctx.fillText(cur, x, y);
        y += lineHeight;
        cur = word;
      } else {
        cur = test;
      }
    }

    ctx.fillText(cur, x, y);
    y += lineHeight;
  }
}

function roundRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();

  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

let buttons = [];

function addButton(x, y, w, h, text, fn, invisible = false) {
  buttons.push({ x, y, w, h, text, fn, invisible });

  if (invisible) return;

  ctx.save();

  ctx.fillStyle = "rgba(0,0,0,0.82)";

  roundRect(x, y, w, h, 14, true, true);

  ctx.shadowBlur = 0;
  ctx.fillStyle = "white";
  ctx.font = "bold 18px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(text, x + w / 2, y + h / 2);

  ctx.restore();
}

function menuButton(x, y, w, h, text, fn) {
  if (y + h < 120 || y > 825) {
    return;
  }

  addButton(x, y, w, h, text, fn);

let scrollData = {};
let scrollDrag = {
  active: false,
  key: "",
  lastY: 0
};

function resetScroll() {
  scrollData = {};
}

function currentScrollKey() {
  if (game.paused) return game.menu;
  return "";
}

function getScroll(key) {
  if (!scrollData[key]) {
    scrollData[key] = { y: 0, max: 0 };
  }

  return scrollData[key].y;
}

function setScrollLimit(key, contentH, viewH) {
  if (!scrollData[key]) {
    scrollData[key] = { y: 0, max: 0 };
  }

  scrollData[key].max = Math.max(0, contentH - viewH);
  scrollData[key].y = clamp(scrollData[key].y, 0, scrollData[key].max);
}

function scrollBy(key, amount) {
  if (!key) return;

  if (!scrollData[key]) {
    scrollData[key] = { y: 0, max: 0 };
  }

  scrollData[key].y = clamp(
    scrollData[key].y + amount,
    0,
    scrollData[key].max
  );
}

function drawScrollBar(key, x, y, h) {
  const data = scrollData[key];

  if (!data || data.max <= 0) return;

  const rate = data.y / data.max;
  const barH = Math.max(45, h * (h / (h + data.max)));

  ctx.save();

  ctx.fillStyle = "rgba(255,255,255,0.18)";
  ctx.fillRect(x, y, 5, h);

  ctx.fillStyle = "rgba(255,255,255,0.75)";
  ctx.fillRect(x, y + (h - barH) * rate, 5, barH);

  ctx.restore();
}

function render() {

  drawBackground();

  if (game.started) {
    drawWarnings();

    drawPlayer();
    drawTexts();
    drawHUD();
    drawNotices();
    drawStartState();
  } else {
    drawParticles();
    drawTitle();
  }

  if (game.tutorialOpen) {
    drawTutorial();
  }

  if (game.cardOpen) {
    drawCardOpen();
  }

  if (game.penaltyOpen) {
    drawPenaltyOpen();
  }

  if (game.rewardOpen) {
    drawRewardOpen();
  }

  if (game.comboOpen) {
    drawComboOpen();
  }

  if (game.survivor) {
    drawSurvivor();
  }

  if (game.gameOver) {
    drawGameOver();
  }

  drawPauseMenus();
}

const keys = {};

window.addEventListener("keydown", e => {
  keys[e.key] = true;

  if (e.key === "Escape" && game.started && !game.gameOver) {
    game.paused = !game.paused;
    game.menu = "main";
    resetScroll();
  }
});

window.addEventListener("keyup", e => {
  keys[e.key] = false;
});

let drag = {
  active: false,
  lastX: 0,
  lastY: 0
};

function stopDrag() {
  drag.active = false;
  scrollDrag.active = false;
}

function pointerPos(e) {
  const rect = canvas.getBoundingClientRect();

  let cx = e.clientX;
  let cy = e.clientY;

  if (e.touches && e.touches.length > 0) {
    cx = e.touches[0].clientX;
    cy = e.touches[0].clientY;
  }

  return {
    x: (cx - rect.left) * (canvas.width / rect.width),
    y: (cy - rect.top) * (canvas.height / rect.height)
  };
}

function hitButton(x, y) {
  for (let i = buttons.length - 1; i >= 0; i--) {
    const b = buttons[i];

    if (
      x >= b.x &&
      x <= b.x + b.w &&
      y >= b.y &&
      y <= b.y + b.h
    ) {
      b.fn();
      return true;
    }
  }

  return false;
}

function pointerDown(e) {
  e.preventDefault();

  getAudio();

  const p = pointerPos(e);

  if (hitButton(p.x, p.y)) {
    return;
  }

  const key = currentScrollKey();

  if (key) {
    scrollDrag.active = true;
    scrollDrag.key = key;
    scrollDrag.lastY = p.y;
    return;
  }

  if (
    game.started &&
    !game.paused &&
    !game.gameOver &&
    !game.cardOpen &&
    !game.penaltyOpen &&
    !game.rewardOpen &&
    !game.comboOpen &&
    !game.survivor &&
    !game.tutorialOpen
  ) {
    drag.active = true;
    drag.lastX = p.x;
    drag.lastY = p.y;
  }
}

function pointerMove(e) {
  e.preventDefault();

  const p = pointerPos(e);

  if (scrollDrag.active) {
    const dy = scrollDrag.lastY - p.y;
    scrollDrag.lastY = p.y;
    scrollBy(scrollDrag.key, dy);
    return;
  }

  if (drag.active) {
    const dx = (p.x - drag.lastX) * CFG.dragSensitivity;
    const dy = (p.y - drag.lastY) * CFG.dragSensitivity;

    drag.lastX = p.x;
    drag.lastY = p.y;

    player.x += dx;
    player.y += dy;
  }
}

function pointerUp(e) {
  e.preventDefault();

  drag.active = false;
  scrollDrag.active = false;
}

canvas.addEventListener("mousedown", pointerDown);
canvas.addEventListener("mousemove", pointerMove);
canvas.addEventListener("mouseup", pointerUp);
canvas.addEventListener("mouseleave", pointerUp);

canvas.addEventListener("touchstart", pointerDown, { passive: false });
canvas.addEventListener("touchmove", pointerMove, { passive: false });
canvas.addEventListener("touchend", pointerUp, { passive: false });
canvas.addEventListener("touchcancel", pointerUp, { passive: false });

canvas.addEventListener("wheel", e => {
  const key = currentScrollKey();

  if (key) {
    e.preventDefault();
    scrollBy(key, e.deltaY);
  }
}, { passive: false });

document.addEventListener("visibilitychange", () => {
  if (
    document.hidden &&
    save.autoPause &&
    game.started &&
    !game.gameOver &&
    !game.paused
  ) {
    game.paused = true;
    game.menu = "main";
    resetScroll();
    stopDrag();
  }
});

window.addEventListener("blur", () => {
  if (
    save.autoPause &&
    game.started &&
    !game.gameOver &&
    !game.paused
  ) {
    game.paused = true;
    game.menu = "main";
    resetScroll();
    stopDrag();
  }
});

function loop(ts) {
  if (!game.lastTs) {
    game.lastTs = ts;
  }

  const dt = Math.min(0.04, (ts - game.lastTs) / 1000);

  game.lastTs = ts;

  updateGame(dt);
  render();

  requestAnimationFrame(loop);
}

buildAttackBag();
requestAnimationFrame(loop);
