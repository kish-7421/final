<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>Ultimate Survival</title>
<style>

<body>
<canvas id="game"></canvas>
<div id="authBox"><div id="authPanel"></div></div>
<script>
"use strict";
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d");
canvas.width=450;canvas.height=900;
const W=450,H=900;
const CFG={startHp:160,playerR:10,playerSpeed:290,arenaW:300,arenaH:680,normalDamage:12,specialDamage:25,normalR:7,specialR:11,maxBullets:850,cardInterval:25,cardSelectTime:10,penaltyShowTime:5,specialBaseInterval:19,specialMinInterval:7,bossEvery:120,bossDuration:25,bossNormalSlow:1.15,invincibleTime:2,dragSensitivity:1.15};

function dailyKey(){
  const d=new Date();
  return"ultimate_survival_daily_"+d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function loadGlobal(){
  try{
    return JSON.parse(localStorage.getItem("ultimate_survival_global")||"{}");
  }catch(e){
    return{};
  }
}

const globalSave=Object.assign({
  totalPlays:0,
  totalDeaths:0,
  totalPlayTime:0,
  totalBossClears:0,
  totalCards:0,
  totalLegendary:0,
  totalPenalties:0,
  totalDodges:0,
  totalHits:0,
  soundOn:true,
  bgmOn:true,
  masterVolume:.8,
  sfxVolume:.9,
  bgmVolume:.55,
  vibration:true,
  survivorSkin:false,
  tutorialDone:false,
  cardTypes:[],
  penaltyTypes:[],
  bossSeen:{},
  bossClear:{},
  bossAttackSeen:{}
},loadGlobal());

function saveGlobal(){
  localStorage.setItem("ultimate_survival_global",JSON.stringify(globalSave));
  if(window.queueAccountSave)window.queueAccountSave();
}

const SERVER_URL="https://YOUR_WORKER_NAME.YOUR_ACCOUNT.workers.dev";

const authState={
  ready:false,
  guest:false,
  id:localStorage.getItem("us_auth_id")||"",
  token:localStorage.getItem("us_auth_token")||"",
  leaderboard:[],
  msg:"",
  screen:"choice"
};

if(!serverConfigured()){
  localStorage.removeItem("us_auth_id");
  localStorage.removeItem("us_auth_token");
  authState.id="";
  authState.token="";
}

let authSaveTimer=null;

function serverConfigured(){
  return SERVER_URL.indexOf("YOUR_WORKER_NAME")<0&&SERVER_URL.startsWith("https://");
}

function authPanel(){
  return document.getElementById("authPanel");
}

function authMsg(t,bad=true){
  const el=document.getElementById("authMsg");
  if(el){
    el.style.color=bad?"#ff7777":"#66ff66";
    el.textContent=t;
  }
}

function renderAuth(msg=""){
  const p=authPanel();
  if(!p)return;

  if(authState.screen==="choice"){
    p.innerHTML='<h1>Ultimate Survival</h1><button onclick="showSignupScreen()">회원가입</button><button onclick="showLoginScreen()">로그인</button><button onclick="usGuest()">게스트 플레이</button><div id="authMsg">친구끼리 간단 로그인 / 게스트 가능</div>';
    if(msg)authMsg(msg,false);
    return;
  }

  const title=authState.screen==="signup"?"회원가입":"로그인";
  const action=authState.screen==="signup"?"usSignup()":"usLogin()";
  const btn=authState.screen==="signup"?"회원가입 완료":"로그인";

  p.innerHTML='<h1>'+title+'</h1><input id="authId" autocomplete="username" placeholder="아이디"><input id="authPw" type="password" autocomplete="current-password" placeholder="비밀번호"><button onclick="'+action+'">'+btn+'</button><button onclick="showChoiceScreen()">뒤로</button><div id="authMsg">아이디/비밀번호 입력</div>';

  if(msg)authMsg(msg,true);
}

window.showChoiceScreen=function(){
  authState.screen="choice";
  renderAuth();
};

window.showSignupScreen=function(){
  authState.screen="signup";
  renderAuth();
};

window.showLoginScreen=function(){
  authState.screen="login";
  renderAuth();
};

function hideAuth(){
  const e=document.getElementById("authBox");
  if(e)e.style.display="none";
}

function showAuth(){
  const e=document.getElementById("authBox");
  if(e)e.style.display="flex";
  renderAuth();
}

function guestMergeId(){
  let id=localStorage.getItem("us_guest_merge_id");

  if(!id){
    id="g_"+Math.random().toString(36).slice(2)+Date.now().toString(36);
    localStorage.setItem("us_guest_merge_id",id);
  }

  return id;
}

function unique(a){
  return [...new Set((a||[]).filter(Boolean))];
}

function saveSnapshot(){
  bankPlayTime&&game&&game.started&&bankPlayTime();

  return{
    todayKey:dailyKey(),
    best:Math.max(Number(localStorage.getItem("ultimate_survival_best")||0),game?game.best||0:0),
    todayBest:Math.max(Number(localStorage.getItem(dailyKey())||0),game?game.todayBest||0:0),
    totalPlays:globalSave.totalPlays||0,
    totalDeaths:globalSave.totalDeaths||0,
    totalPlayTime:globalSave.totalPlayTime||0,
    totalBossClears:globalSave.totalBossClears||0,
    totalCards:globalSave.totalCards||0,
    totalLegendary:globalSave.totalLegendary||0,
    totalPenalties:globalSave.totalPenalties||0,
    totalDodges:globalSave.totalDodges||0,
    totalHits:globalSave.totalHits||0,
    cardTypes:unique(globalSave.cardTypes),
    penaltyTypes:unique(globalSave.penaltyTypes),
    achievements:unique(JSON.parse(localStorage.getItem("ultimate_survival_achievements")||"[]")),
    survivorSkin:!!globalSave.survivorSkin,
    tutorialDone:!!globalSave.tutorialDone,
    bossSeen:globalSave.bossSeen||{},
    bossClear:globalSave.bossClear||{},
    bossAttackSeen:globalSave.bossAttackSeen||{}
  };
}

function applyAccountSave(d){
  if(!d)return;

  globalSave.totalPlays=d.totalPlays||0;
  globalSave.totalDeaths=d.totalDeaths||0;
  globalSave.totalPlayTime=d.totalPlayTime||0;
  globalSave.totalBossClears=d.totalBossClears||0;
  globalSave.totalCards=d.totalCards||0;
  globalSave.totalLegendary=d.totalLegendary||0;
  globalSave.totalPenalties=d.totalPenalties||0;
  globalSave.totalDodges=d.totalDodges||0;
  globalSave.totalHits=d.totalHits||0;
  globalSave.cardTypes=unique(d.cardTypes);
  globalSave.penaltyTypes=unique(d.penaltyTypes);
  globalSave.survivorSkin=!!d.survivorSkin;
  globalSave.tutorialDone=!!d.tutorialDone;
  globalSave.bossSeen=d.bossSeen||{};
  globalSave.bossClear=d.bossClear||{};
  globalSave.bossAttackSeen=d.bossAttackSeen||{};

  localStorage.setItem("ultimate_survival_global",JSON.stringify(globalSave));
  localStorage.setItem("ultimate_survival_best",String(d.best||0));

  if(d.todayKey===dailyKey()){
    localStorage.setItem(dailyKey(),String(d.todayBest||0));
  }

  localStorage.setItem("ultimate_survival_achievements",JSON.stringify(unique(d.achievements)));

  if(game){
    game.best=Number(localStorage.getItem("ultimate_survival_best")||0);
    game.todayBest=Number(localStorage.getItem(dailyKey())||0);
    game.achievements=new Set(unique(d.achievements));
  }
}

async function authApi(path,body){
  if(!serverConfigured())throw new Error("SERVER_URL에 Cloudflare Worker 주소를 먼저 넣어야 함");

  const r=await fetch(SERVER_URL.replace(/\/$/,"")+"/"+path,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body||{})
  });

  const j=await r.json().catch(()=>({ok:false,error:"서버 응답 오류"}));

  if(!r.ok||!j.ok)throw new Error(j.error||"요청 실패");

  return j;
}

async function finishAuth(j,id){
  authState.ready=true;
  authState.guest=false;
  authState.id=id;
  authState.token=j.token;

  localStorage.setItem("us_auth_id",id);
  localStorage.setItem("us_auth_token",j.token);

  applyAccountSave(j.save);
  hideAuth();

  if(game)resetGame();

  await loadLeaderboard();
}

window.usLogin=async function(){
  const id=document.getElementById("authId").value.trim();
  const password=document.getElementById("authPw").value;

  if(!id||!password)return authMsg("아이디와 비밀번호를 입력해줘");

  try{
    authMsg("로그인 중...",false);
    const j=await authApi("login",{id,password,guest:saveSnapshot(),mergeId:guestMergeId()});
    await finishAuth(j,id);
  }catch(e){
    authMsg(e.message);
  }
};

window.usSignup=async function(){
  const id=document.getElementById("authId").value.trim();
  const password=document.getElementById("authPw").value;

  if(!/^[a-zA-Z0-9_]{3,16}$/.test(id))return authMsg("아이디는 영문/숫자/_ 3~16자");
  if(password.length<4)return authMsg("비밀번호는 4자 이상");

  try{
    authMsg("회원가입 중...",false);
    const j=await authApi("signup",{id,password,guest:saveSnapshot(),mergeId:guestMergeId()});
    await finishAuth(j,id);
  }catch(e){
    authMsg(e.message);
  }
};

window.usGuest=function(){
  authState.ready=true;
  authState.guest=true;
  authState.id="";
  authState.token="";

  localStorage.removeItem("us_auth_id");
  localStorage.removeItem("us_auth_token");

  hideAuth();

  if(game){
    game.paused=false;
    game.tutorialOpen=false;
    game.started=false;
    game.gameOver=false;

    game.countdown=3;
    game.countdownTimer=0;
    game.showStart=false;
    game.startTimer=0;

    game.time=0;
    game.sessionPlayTime=0;
    game.savedSessionSeconds=0;
    game.last=performance.now();

    stopDrag();
  }
};

window.usLogout=function(){
  localStorage.removeItem("us_auth_id");
  localStorage.removeItem("us_auth_token");

  authState.ready=false;
  authState.guest=false;
  authState.id="";
  authState.token="";
  authState.screen="choice";

  showAuth();

  if(game){
    game.paused=true;
    closeSubMenus&&closeSubMenus();
  }
};

window.queueAccountSave=function(){
  if(!authState.token||authState.guest)return;

  clearTimeout(authSaveTimer);
  authSaveTimer=setTimeout(submitAccountSave,1200);
};

async function submitAccountSave(){
  if(!authState.token||authState.guest)return;

  try{
    await authApi("submit",{token:authState.token,save:saveSnapshot()});
    await loadLeaderboard();
  }catch(e){
    console.warn(e.message);
  }
}

async function loadLeaderboard(){
  if(!serverConfigured())return;

  try{
    const j=await authApi("top10",{});
    authState.leaderboard=j.rows||[];
  }catch(e){
    authState.leaderboard=[];
  }
}

if(authState.token&&authState.id){
  authState.ready=true;
  hideAuth();
  loadLeaderboard();
}else{
  showAuth();
}

function left(){return arena.x-arena.w/2}
function right(){return arena.x+arena.w/2}
function topY(){return arena.y-arena.h/2}
function bottom(){return arena.y+arena.h/2}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function dist(x1,y1,x2,y2){return Math.hypot(x1-x2,y1-y2)}
function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}

function fmt(t){
  t=Math.floor(t);
  return String(Math.floor(t/60)).padStart(2,"0")+":"+String(t%60).padStart(2,"0");
}

function fmtLong(t){
  t=Math.floor(t);
  const h=Math.floor(t/3600);
  const m=Math.floor(t%3600/60);
  const s=t%60;

  if(h>0)return h+"시간 "+m+"분";
  if(m>0)return m+"분 "+s+"초";
  return s+"초";
}

function stopDrag(){
  drag.active=false;
  drag.touchId=null;
  scroll.active=false;
  input.dx=0;
  input.dy=0;
}

function clampPlayer(){
  player.r=CFG.playerR*(1+game.playerSizeBonus);
  player.x=clamp(player.x,left()+player.r,right()-player.r);
  player.y=clamp(player.y,topY()+player.r,bottom()-player.r);
}

function addText(text,x,y,color="white",life=.9){
  game.texts.push({text,x,y,color,life,max:life});
}

function addNotice(lines,color="#fff"){

function saveAchievements(){

function unlockAchievement(id,text){
  if(game.achievements.has(id))return;

  game.achievements.add(id);
  saveAchievements();
  addNotice(["업적 달성",text],"#FFD700");
  sfx("achievement");

  if(id==="survivor"){
    globalSave.survivorSkin=true;
    saveGlobal();
    fanfare("survivor");
  }
}

function bankPlayTime(){
  const now=Math.floor(game.sessionPlayTime);
  const delta=now-game.savedSessionSeconds;

  if(delta>0){
    globalSave.totalPlayTime+=delta;
    game.savedSessionSeconds=now;
    saveGlobal();
  }
}function getAudio(){try{if(!audioCtx){const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return null;audioCtx=new AC()}if(audioCtx.state==="suspended")audioCtx.resume();return audioCtx}catch(e){return null}}
function playTone(freq,startTime,duration,type,volume){const ac=getAudio();if(!ac)return;const osc=ac.createOscillator(),gain=ac.createGain();osc.type=type||"sine";osc.frequency.setValueAtTime(freq,startTime);const attack=.015,release=Math.max(.04,duration-attack);gain.gain.setValueAtTime(.001,startTime);gain.gain.linearRampToValueAtTime(volume,startTime+attack);gain.gain.exponentialRampToValueAtTime(.001,startTime+attack+release);osc.connect(gain);gain.connect(ac.destination);osc.start(startTime);osc.stop(startTime+duration+.03)}
function sfx(type){if(!globalSave.soundOn)return;const ac=getAudio();if(!ac)return;const v=.06*globalSave.masterVolume*globalSave.sfxVolume,now=ac.currentTime;if(type==="hit")playTone(130,now,.1,"square",v);else if(type==="dodge")playTone(920,now,.09,"sine",v*.7);else if(type==="card"){playTone(660,now,.12,"triangle",v*.8);playTone(880,now+.05,.1,"triangle",v*.5)}else if(type==="legend"){playTone(660,now,.18,"triangle",v);playTone(990,now+.08,.22,"triangle",v*.85);playTone(1320,now+.18,.25,"triangle",v*.65)}else if(type==="penalty"){playTone(120,now,.25,"sawtooth",v);playTone(80,now+.08,.3,"sawtooth",v*.7)}else if(type==="boss"){playTone(110,now,.22,"sawtooth",v);playTone(82,now+.16,.22,"sawtooth",v)}else if(type==="revive"){playTone(520,now,.2,"triangle",v);playTone(760,now+.08,.25,"triangle",v*.8)}else if(type==="achievement"){playTone(740,now,.16,"triangle",v);playTone(980,now+.08,.16,"triangle",v*.8)}else if(type==="shield")playTone(810,now,.12,"sine",v*.75);else playTone(500,now,.08,"sine",v*.7)}
const BGM_PATTERNS={early:{interval:420,bass:[110,110,130,147],lead:[220,330,262,330,294,392,330,262],type:"triangle",bassType:"sine"},danger:{interval:360,bass:[98,98,123,147],lead:[294,392,330,440,392,330,294,247],type:"triangle",bassType:"sawtooth"},survive:{interval:300,bass:[87,98,110,130],lead:[349,440,392,523,440,392,349,294],type:"square",bassType:"sawtooth"},veteran:{interval:260,bass:[65,87,98,130],lead:[392,523,440,659,523,440,392,330],type:"square",bassType:"sawtooth"},boss:{interval:210,bass:[55,55,73,82],lead:[220,277,330,277,220,196,220,330],type:"sawtooth",bassType:"sawtooth"},gold:{interval:340,bass:[123,147,196,247],lead:[494,740,659,988,740,659,494,370],type:"triangle",bassType:"sine"}};
function stopBgm(){if(bgmTimer!==null){clearInterval(bgmTimer);bgmTimer=null}currentBgmMode="";bgmStep=0}
function playBgmStep(mode){const ac=getAudio();if(!ac)return;const p=BGM_PATTERNS[mode];if(!p)return;const now=ac.currentTime,vol=.025*globalSave.masterVolume*globalSave.bgmVolume,lead=p.lead[bgmStep%p.lead.length],bass=p.bass[Math.floor(bgmStep/2)%p.bass.length];if(bgmStep%2===0)playTone(bass,now,.2,p.bassType,vol*.85);playTone(lead,now+.02,.16,p.type,vol*.75);if(mode==="boss"&&bgmStep%4===0)playTone(55,now+.04,.09,"square",vol*1.1);if(mode==="gold"&&bgmStep%4===0)playTone(lead*2,now+.08,.2,"triangle",vol*.45);bgmStep++}
function startBgm(mode){if(!globalSave.bgmOn||currentBgmMode===mode)return;stopBgm();const p=BGM_PATTERNS[mode];if(!p)return;currentBgmMode=mode;bgmStep=0;playBgmStep(mode);bgmTimer=setInterval(function(){if(!globalSave.bgmOn){stopBgm();return}if(game.paused||game.gameOver||game.cardOpen||game.penaltyOpen||game.bossRewardOpen||game.comboOpen||game.survivorOpen||game.tutorialOpen){stopBgm();return}playBgmStep(mode)},p.interval)}

function addMaxHp(v){game.maxHp=Math.max(50,game.maxHp+v);if(v>0)game.hp+=v;game.hp=Math.min(game.hp,game.maxHp);game.displayHp=Math.min(game.displayHp,game.maxHp)}
function addCappedStat(stat,amount,cap){const after=game[stat]+amount;if(after<=cap){game[stat]=Math.max(0,after);return}game[stat]=cap;const excess=after-cap;addMaxHp(Math.round(excess*100)*3)}

function totalDodge(){let v=game.dodge;if(game.hp/game.maxHp<=.3)v+=game.lowHpDodge;if(game.unyielding&&game.hp/game.maxHp<=.25)v+=.08;return Math.min(.45,v)}

function currentNormalDamage(){return CFG.normalDamage+game.normalDamageBonus+(game.bossActive?3:0)}function bossDamageBonus(){if(!game.bossActive)return 0;const stage=Math.floor(game.time/120);return 3+Math.min(8,stage*2)}function currentSpecialDamage(){return CFG.specialDamage+game.specialDamageBonus+bossDamageBonus()}
function bulletSpeedMultiplier(){let timeBonus=0;if(game.time>=480)timeBonus=.25;else if(game.time>=360)timeBonus=.2;else if(game.time>=240)timeBonus=.15;else if(game.time>=120)timeBonus=.1;else if(game.time>=60)timeBonus=.05;let extraSlow=0;if(game.tempBulletSlowTimer>0)extraSlow+=game.tempBulletSlowValue;if(game.afterSpecialSlowTimer>0)extraSlow+=.15;return Math.max(.25,1+game.bulletBonus-game.bulletSlow-extraSlow+timeBonus)}

function damagePlayer(amount,ignoreReduction=false,isSpecial=false){if(game.gameOver||game.invincible>0||game.hitCooldown>0||(isSpecial&&game.specialHitCooldown>0))return;if(game.shield>0){game.shield--;sfx("shield");unlockAchievement("shield","보호막으로 탄 막기");addText("보호막!",player.x,player.y-22,"#66ccff");return}if(!ignoreReduction){if(Math.random()<totalDodge()){game.dodgeFlash=.15;game.stats.dodges++;globalSave.totalDodges++;saveGlobal();sfx("dodge");addText("회피",player.x+18,player.y-18,"white");return}amount*=1-totalDamageReduce();if(!isSpecial){if(game.normalDRTimer>0)amount*=1-game.normalDRValue;if(game.hp/game.maxHp<=.4)amount*=1-game.lowHpNormalReduce}if(isSpecial)amount*=1-Math.min(.55,game.specialReduce)}if(isSpecial&&game.specialNoHitTrack>0)game.specialNoHitFailed=true;game.hitCooldown=.2;if(isSpecial)game.specialHitCooldown=.2;game.hp-=amount;game.stats.damageTaken+=amount;game.stats.hits++;globalSave.totalHits++;if(game.bossActive)game.bossNoHit=false;sfx("hit");if(game.hp<0)game.hp=0;if(game.hp<=0)handleDeath()}

function getSpecialInterval(){if(game.time<60)return 14;if(game.time<110)return 10;return 8}
function chooseWeighted(obj,last){let total=0;for(const k in obj)total+=obj[k];let r=Math.random()*total;for(const k in obj){r-=obj[k];if(r<=0)return k}return Object.keys(obj)[0]}
function updateSpecials(dt){
  if(game.bossActive||game.bossIntro)return;
  game.specialTimer+=dt;
  if(game.specialTimer>=getSpecialInterval()){
    game.specialTimer=0;
    const id=chooseWeighted(game.specialWeights,game.lastSpecial);
    game.lastSpecial=id;
    game.specialWeights[id]=Math.max(30,game.specialWeights[id]-30);
    for(const k in game.specialWeights)if(k!==id)game.specialWeights[k]=Math.min(150,game.specialWeights[k]+10);
    game.specialNoHitTrack=4;
    game.specialNoHitFailed=false;
    specials[id]();
  }

canvas.addEventListener("touchstart",function(e){
  const p=getPointer(e);
  if(handlePointerDown(p.x,p.y)){
    e.preventDefault();
    return;
  }
  if(game.penaltyOpen||game.bossRewardOpen||game.comboOpen||game.bossIntro||game.survivorOpen){
    e.preventDefault();
    return;
  }
  const t=e.changedTouches[0];
  drag.active=true;
  drag.touchId=t.identifier;
  drag.lastX=p.x;
  drag.lastY=p.y;
  e.preventDefault();
},{passive:false});

canvas.addEventListener("touchmove",function(e){
  if(scroll.active){
    const p=getPointer(e);
    setScrollY(scroll.page,getScrollY(scroll.page)+scroll.lastY-p.y);
    scroll.lastY=p.y;
    e.preventDefault();
    return;
  }

  if(!drag.active)return;

  if(game.paused||game.cardOpen||game.penaltyOpen||game.bossRewardOpen||game.comboOpen||game.bossIntro||game.survivorOpen||game.resumeCountdown){
    stopDrag();
    e.preventDefault();
    return;
  }

  for(const t of e.changedTouches){
    if(t.identifier===drag.touchId){
      const p=getPointerFromClient(t.clientX,t.clientY);
      player.x+=(p.x-drag.lastX)*CFG.dragSensitivity;
      player.y+=(p.y-drag.lastY)*CFG.dragSensitivity;
      clampPlayer();
      drag.lastX=p.x;
      drag.lastY=p.y;
    }
  }

  e.preventDefault();
},{passive:false});

  for(const t of e.changedTouches){
    if(t.identifier===drag.touchId)stopDrag();
  }
  scroll.active=false;
  e.preventDefault();
},{passive:false});

function updateInput(){
  if(drag.active){
    input.dx=0;
    input.dy=0;
    return;
  }

  let x=0,y=0;
  if(keys.left)x--;
  if(keys.right)x++;
  if(keys.up)y--;
  if(keys.down)y++;

  const d=Math.hypot(x,y);
  if(d>1){
    x/=d;
    y/=d;
  }

  input.dx=x;
  input.dy=y;
}

function updatePlayer(dt){
  player.x+=input.dx*player.speed*dt;
  player.y+=input.dy*player.speed*dt;
  clampPlayer();

  if(game.achievements.has("survivor")&&globalSave.survivorSkin){
    game.trail.push({x:player.x,y:player.y,life:.35,max:.35});
    if(game.trail.length>18)game.trail.shift();
  }
}

function updateBullets(dt){
  const mul=bulletSpeedMultiplier();

  for(let i=game.bullets.length-1;i>=0;i--){
    const b=game.bullets[i];
    b.age+=dt;

    if(b.life!==null){
      b.life-=dt;
      if(b.life<=0){
        game.bullets.splice(i,1);
        continue;
      }
    }

    if(b.homing&&b.age<3){
      const dx=player.x-b.x;
      const dy=player.y-b.y;
      const d=Math.hypot(dx,dy)||1;
      const tvx=dx/d*(b.speed||220);
      const tvy=dy/d*(b.speed||220);
      b.vx+=(tvx-b.vx)*b.turn*dt;
      b.vy+=(tvy-b.vy)*b.turn*dt;
    }

    if(b.wave){
      b.waveA+=dt*7;
      b.x=b.baseX+Math.sin(b.waveA)*35;
    }

    b.x+=b.vx*dt*mul;
    b.y+=b.vy*dt*mul;

    if(b.split&&!b.splitDone&&b.y>arena.y){
      b.splitDone=true;
      createBullet({x:b.x,y:b.y,vx:-170,vy:85,r:CFG.normalR});
      createBullet({x:b.x,y:b.y,vx:170,vy:85,r:CFG.normalR});
    }

    if(b.bounce>0){
      let hit=false;

      if(b.x-b.r<=left()||b.x+b.r>=right()){
        b.vx*=-1;
        hit=true;
      }

      if(b.y-b.r<=topY()||b.y+b.r>=bottom()){
        b.vy*=-1;
        hit=true;
      }

      if(hit){
        b.bounce--;
        b.x=clamp(b.x,left()+b.r,right()-b.r);
        b.y=clamp(b.y,topY()+b.r,bottom()-b.r);
      }
    }

    if(b.x<-150||b.x>W+150||b.y<-150||b.y>H+150){
      game.bullets.splice(i,1);
      continue;
    }

    if(dist(b.x,b.y,player.x,player.y)<=b.r+player.r){
      damagePlayer(b.damage,false,b.type==="special");
      game.bullets.splice(i,1);
    }
  }
}

function pointLineDistance(px,py,x,y,a){
  const nx=-Math.sin(a),ny=Math.cos(a);
  return Math.abs((px-x)*nx+(py-y)*ny);
}

function updateSpecialObjects(dt){
  for(let i=game.specialObjects.length-1;i>=0;i--){
    const o=game.specialObjects[i];
    o.life-=dt;

    if(o.type==="blackhole"||o.type==="softGravity"){
      const dx=o.x-player.x;
      const dy=o.y-player.y;
      const d=Math.hypot(dx,dy)||1;
      const pull=o.pull||35;
      player.x+=dx/d*pull*dt;
      player.y+=dy/d*pull*dt;
      clampPlayer();

      if(d<o.r+player.r){
        damagePlayer(currentSpecialDamage()*.8*dt,true,true);
      }
    }

    if(o.type==="movingWall"){
      o.pos+=o.speed*dt;
      const p=o.pos;
      if(player.x<left()+p||player.x>right()-p||player.y<topY()+p||player.y>bottom()-p){
        damagePlayer(currentSpecialDamage()*dt,true,true);
      }
    }

    if(o.life<=0){
      game.specialObjects.splice(i,1);
    }
  }
}

function updateEffects(dt){
  game.displayHp+=(game.hp-game.displayHp)*Math.min(1,dt*6);

  for(let i=game.trail.length-1;i>=0;i--){
    game.trail[i].life-=dt;
    if(game.trail[i].life<=0)game.trail.splice(i,1);
  }

  for(let i=game.texts.length-1;i>=0;i--){
    const f=game.texts[i];
    f.life-=dt;
    f.y-=20*dt;
    if(f.life<=0)game.texts.splice(i,1);
  }

  for(let i=game.warnings.length-1;i>=0;i--){
    const w=game.warnings[i];
    w.life-=dt;
    if(w.life<=0)game.warnings.splice(i,1);
  }

  for(let i=game.delayed.length-1;i>=0;i--){
    const ev=game.delayed[i];
    ev.time-=dt;
    if(ev.time<=0){
      ev.fn();
      game.delayed.splice(i,1);
    }
  }

  for(let i=game.notices.length-1;i>=0;i--){
    const n=game.notices[i];
    n.life-=dt;
    if(n.life<=0)game.notices.splice(i,1);
  }

  for(const p of game.particles){
    p.x+=p.vx*dt;
    p.y+=p.vy*dt;
    if(p.fade)p.a-=dt*p.fade;
    if(p.y>H+20)p.y=-20;
    if(p.x<-20)p.x=W+20;
    if(p.x>W+20)p.x=-20;
  }

  game.particles=game.particles.filter(p=>p.a>0);

  if(game.invincible>0)game.invincible=Math.max(0,game.invincible-dt);
  if(game.dodgeFlash>0)game.dodgeFlash=Math.max(0,game.dodgeFlash-dt);
  if(game.hitCooldown>0)game.hitCooldown=Math.max(0,game.hitCooldown-dt);
  if(game.specialHitCooldown>0)game.specialHitCooldown=Math.max(0,game.specialHitCooldown-dt);
  if(game.specialLock>0)game.specialLock=Math.max(0,game.specialLock-dt);
  if(game.normalDRTimer>0)game.normalDRTimer=Math.max(0,game.normalDRTimer-dt);
  if(game.tempBulletSlowTimer>0)game.tempBulletSlowTimer=Math.max(0,game.tempBulletSlowTimer-dt);
  if(game.afterSpecialSlowTimer>0)game.afterSpecialSlowTimer=Math.max(0,game.afterSpecialSlowTimer-dt);
  if(game.specialSuccessDefenseTimer>0)game.specialSuccessDefenseTimer=Math.max(0,game.specialSuccessDefenseTimer-dt);

  if(game.specialNoHitTrack>0){
    game.specialNoHitTrack=Math.max(0,game.specialNoHitTrack-dt);
    if(game.specialNoHitTrack===0&&game.specialNoHitBuff&&!game.specialNoHitFailed){
      game.specialSuccessDefenseTimer=6;
      addText("방어 전환",player.x,player.y-28,"#66ffcc",1);
    }
  }
}

function chooseBoss(){
  let total=0;
  for(const b of bossList)total+=game.bossWeights[b.id]||100;

  let roll=Math.random()*total;

  for(const b of bossList){
    const w=game.bossWeights[b.id]||100;

    if(roll<w){
      for(const q of bossList){
        game.bossWeights[q.id]=Math.min(150,(game.bossWeights[q.id]||100)+10);
      }

      game.bossWeights[b.id]=Math.max(30,(game.bossWeights[b.id]||100)-30);
      return b;
    }

    roll-=w;
  }

  return bossList[0];
}

function updateBoss(dt){
  if(!game.bossActive&&!game.bossIntro&&!game.cardOpen&&!game.penaltyOpen&&!game.bossRewardOpen&&game.time>=game.nextBossTime){
    game.currentBoss=chooseBoss();
    game.bossIntro=true;
    game.bossIntroTimer=0;
    stopDrag();
    sfx("boss");
    globalSave.bossSeen[game.currentBoss.id]=true;
    saveGlobal();
    unlockAchievement("bossFirst","첫 보스 조우");
  }

  if(game.bossActive){
    game.bossTimer+=dt;
    game.bossAttackTimer+=dt;

    const need=game.bossAttackIndex===0?game.currentBoss.first:game.currentBoss.interval;

    if(game.bossAttackTimer>=need){
      game.bossAttackTimer=0;
      bossSpecialAttack();
    }

    if(game.bossTimer>=CFG.bossDuration){
      finishBoss();
    }
  }
}

function startBoss(){
  game.bossIntro=false;
  game.bossActive=true;
  game.bossTimer=0;
  game.specialTimer=0;
  game.bossAttackTimer=0;
  game.bossAttackIndex=0;
  game.bossNoHit=true;

  if(game.bossStartBlessing){
    game.hp=Math.min(game.maxHp,game.hp+game.maxHp*.2);
    game.shield++;
    addText("생존자의 축복",player.x,player.y-32,"#FFD700",1.1);
  }

  addText((game.currentBoss?game.currentBoss.name:"BOSS")+" PHASE",W/2,170,(game.currentBoss&&game.currentBoss.color)||"#ff3333",1.3);
}

function updateBossIntro(dt){
  game.bossIntroTimer+=dt;

  if(game.bossIntroTimer>=2.2){
    startBoss();
  }
}

function finishBoss(){
  const b=game.currentBoss;

  game.bossActive=false;
  game.nextBossTime+=CFG.bossEvery;
  game.bossClears++;
  game.stats.bossClears++;
  globalSave.totalBossClears++;

  if(b){
    globalSave.bossClear[b.id]=(globalSave.bossClear[b.id]||0)+1;

    if(globalSave.bossClear[b.id]>=3){
      unlockAchievement("sameBoss3","같은 보스 3회 클리어");
    }
  }

  saveGlobal();

  unlockAchievement("bossClear1","첫 보스 클리어");

  if(globalSave.totalBossClears>=3)unlockAchievement("bossClear3","보스 3회 클리어");
  if(globalSave.totalBossClears>=10)unlockAchievement("bossClear10","보스 10회 클리어");
  if(globalSave.totalBossClears>=30)unlockAchievement("bossClear30","보스 30회 클리어");
  if(game.bossNoHit)unlockAchievement("bossNoHit","보스전 중 피격 없이 생존");

  if(game.bossEndRefresh){
    game.hp=Math.min(game.maxHp,game.hp+game.maxHp*.2);
    addText("재정비 +20%",player.x,player.y-32,"#66ff66",1.1);
  }

  openBossReward();
}

function bossSpecialAttack(){
  const b=game.currentBoss||bossList[0];
  const key=b.attacks[game.bossAttackIndex%b.attacks.length];

  game.bossAttackIndex++;

  if(!globalSave.bossAttackSeen[b.id]){
    globalSave.bossAttackSeen[b.id]=[];
  }

  if(!globalSave.bossAttackSeen[b.id].includes(key)){
    globalSave.bossAttackSeen[b.id].push(key);
    saveGlobal();
  }

  runBossPattern(b,key);
}

function patternGate(color,mode,speed){
  const life=1.8;

  if(mode==="vertical"||mode==="mixed"){
    const lanes=6;
    const gap=Math.floor(Math.random()*lanes);

    for(let i=0;i<lanes;i++){
      if(Math.abs(i-gap)<=1)continue;

      const x=left()+35+i*((arena.w-70)/(lanes-1));
      warnLine(x,arena.y,Math.PI/2,life,color);

      game.delayed.push({
        time:life,
        fn(){
          spawnVLane(x,speed,color,8);
        }
      });
    }
  }

  if(mode==="horizontal"||mode==="mixed"){
    const rows=6;
    const gap=Math.floor(Math.random()*rows);
    const fromLeft=Math.random()<.5;

    for(let i=0;i<rows;i++){
      if(Math.abs(i-gap)<=1)continue;

      const y=topY()+65+i*((arena.h-130)/(rows-1));
      warnLine(arena.x,y,0,life,color);

      game.delayed.push({
        time:life+.2,
        fn(){
          spawnHLane(y,fromLeft,speed,color,8);
        }
      });
    }
  }
}

function addAttacks(count){
  for(let i=0;i<count;i++){
    if(game.attackBag.length===0)resetAttackBag();

    const options=game.attackBag.filter(id=>!game.activeAttacks.includes(id));

    if(options.length===0){
      resetAttackBag();
      continue;
    }

    const id=rand(options);

    game.attackBag.splice(game.attackBag.indexOf(id),1);
    game.activeAttacks.push(id);
    attackTimer[id]=0;

    if(game.activeAttacks.length>5){
      const removed=game.activeAttacks.shift();
      attackTimer[removed]=0;

      game.attackSwapCount++;

      const step=Math.floor((game.attackSwapCount-1)/5);
      const nInc=2+step*2;
      const sInc=4+step*2;

      game.normalDamageBonus+=nInc;
      game.specialDamageBonus+=sInc;

      addMaxHp(10);

      const reduction=Math.floor(game.attackSwapCount/2);
      game.specialInterval=Math.max(CFG.specialMinInterval,CFG.specialBaseInterval-reduction);

      addNotice([
        "일반 공격 데미지 +"+nInc,
        "특수 공격 데미지 +"+sInc,
        "최대 HP +10"
      ],"#66ff66");
    }
  }
}

function updateAttacks(dt){
  while(game.attackScheduleIndex<attackSchedule.length&&game.time>=game.attackSchedule[game.attackScheduleIndex]?.time){
    addAttacks(game.attackSchedule[game.attackScheduleIndex].count);
    game.attackScheduleIndex++;
  }

  for(const id of game.activeAttacks){
    attackTimer[id]+=dt;

    const cd=attackCooldown[id]*(game.bossActive?CFG.bossNormalSlow:1);

    if(attackTimer[id]>=cd){
      attackTimer[id]=0;
      attacks[id]();
    }
  }
}

function removeAllPenalties(){
  for(const p of game.activePenalties.slice().reverse()){
    p.undo();
  }

  game.activePenalties=[];
  game.ownedPenalties.clear();

  addNotice(["정화","모든 패널티 제거"],"#FFD700");
}

function removeOnePenalty(){
  if(game.activePenalties.length===0){
    addNotice(["정화 조각","제거할 패널티 없음"],"#aaaaff");
    return;
  }

  const p=game.activePenalties.pop();

  p.undo();
  game.ownedPenalties.delete(p.id);

  addNotice(["정화 조각","패널티 1개 제거"],"#aaaaff");
}

function remainingCards(){
  return cardData.filter(c=>!game.ownedCards.has(c.id));
}

function remainingPenalties(){
  return penaltyData.filter(p=>!game.ownedPenalties.has(p.id));
}

function pickCardByWeights(pool,weights){
  const available=weights.filter(([r])=>pool.some(c=>c.rarity===r));
  let total=available.reduce((a,b)=>a+b[1],0);
  let roll=Math.random()*total;

  for(const [rarity,weight] of available){
    if(roll<weight){
      return rand(pool.filter(c=>c.rarity===rarity));
    }

    roll-=weight;
  }

  return rand(pool);
}

function pickCard(pool){
  return pickCardByWeights(pool,[
    ["common",65],
    ["rare",20],
    ["epic",12],
    ["legendary",3]
  ]);
}

function pickBossRewardCard(){
  const pool=remainingCards();

  if(pool.length===0)return null;

  const purifier=pool.find(c=>c.id==="L5");

  if(purifier&&Math.random()<.18)return purifier;

  return pickCardByWeights(pool,[
    ["common",40],
    ["rare",30],
    ["epic",20],
    ["legendary",10]
  ]);
}

function pickPenalty(pool){
  const weights=[
    ["weak",65],
    ["mid",25],
    ["strong",10]
  ].filter(([g])=>pool.some(p=>p.grade===g));

  let total=weights.reduce((a,b)=>a+b[1],0);
  let roll=Math.random()*total;

  for(const [grade,weight] of weights){
    if(roll<weight){
      return rand(pool.filter(p=>p.grade===grade));
    }

    roll-=weight;
  }

  return rand(pool);
}

function rememberType(listName,id){
  if(!globalSave[listName].includes(id)){
    globalSave[listName].push(id);
  }
}

function applyCard(c){
  if(!c){
    addMaxHp(30);
    game.hp=Math.min(game.maxHp,game.hp+game.maxHp*.5);
    addNotice(["카드 풀 소진!","최대 HP +30","HP 50% 회복"],"#66ff66");
    return;
  }

  game.ownedCards.add(c.id);
  game.runCards.push(c);
  game.stats.cards++;

  globalSave.totalCards++;
  rememberType("cardTypes",c.id);

  if(c.rarity==="legendary"){
    game.stats.legendary++;
    globalSave.totalLegendary++;
    sfx("legend");
  }else{
    sfx("card");
  }

  saveGlobal();

  c.apply();
  checkCombos();
}

function applyPenaltyDirect(p){
  game.ownedPenalties.add(p.id);
  game.runPenalties.push(p);
  game.stats.penalties++;

  globalSave.totalPenalties++;
  rememberType("penaltyTypes",p.id);
  saveGlobal();

  const undo=p.apply();

  game.activePenalties.push({id:p.id,undo});
  game.penaltyCooldown=2;
  game.penaltyText=penaltyGradeName(p.grade)+"\n"+p.name+"\n"+p.desc;
  game.penaltyOpen=true;
  game.penaltyTimer=0;

  sfx("penalty");
}

function openCardEvent(){
  stopDrag();

  const penaltiesLeft=remainingPenalties();
  const canPenalty=game.penaltyCooldown<=0;

  if(canPenalty&&penaltiesLeft.length>0&&Math.random()<.03){
    const p=pickPenalty(penaltiesLeft);
    game.nextCardTime+=CFG.cardInterval;
    applyPenaltyDirect(p);
    return;
  }

  if(game.penaltyCooldown>0)game.penaltyCooldown--;

  const pool=remainingCards();

  if(pool.length===0){
    applyCard(null);
    game.nextCardTime+=CFG.cardInterval;
    return;
  }

  const temp=[...pool];

  game.cardChoices=[];

  for(let i=0;i<Math.min(3,temp.length);i++){
    const c=pickCard(temp);

    game.cardChoices.push(c);
    temp.splice(temp.indexOf(c),1);
  }

  game.cardOpen=true;
  game.cardTimer=0;
  game.cardAnimTimer=0;
}

function checkCombos(){
  if(game.ownedCards.has("E2")&&game.ownedCards.has("L2")&&!game.ownedCards.has("COMBO_REGEN")){
    game.ownedCards.add("COMBO_REGEN");
    game.regen+=.0035;
    openCombo("재생+");
  }

  if(game.ownedCards.has("E4")&&game.ownedCards.has("L4")&&!game.ownedCards.has("COMBO_DEF")){
    game.ownedCards.add("COMBO_DEF");
    addDamageReduce(.04);
    openCombo("방어+");
  }

  if(game.ownedCards.has("E3")&&game.ownedCards.has("E7")&&!game.ownedCards.has("COMBO_DODGE")){
    game.ownedCards.add("COMBO_DODGE");
    addDodge(.04);
    openCombo("회피+");
  }

  if(game.ownedCards.has("E5")&&game.ownedCards.has("L3")&&!game.ownedCards.has("COMBO_SDEF")){
    game.ownedCards.add("COMBO_SDEF");
    addSpecialReduce(.04);
    openCombo("특방+");
  }
}

function openCombo(name){
  game.comboOpen=true;
  game.comboTimer=0;
  game.comboName=name;
  stopDrag();
}

function updateCombo(dt){
  game.comboTimer+=dt;

  if(game.comboTimer>=.5){
    game.comboOpen=false;
    addNotice([game.comboName,"활성화"],"#FFD700");
  }
}

function openBossReward(){
  stopDrag();

  game.bossRewardCard=pickBossRewardCard();
  game.bossRewardOpen=true;
  game.bossRewardTimer=0;
}

function updateBossReward(dt){
  game.bossRewardTimer+=dt;

  if(game.bossRewardTimer>=3){
    applyCard(game.bossRewardCard);

    if(game.bossRewardCard){
      addText("보스 보상: "+game.bossRewardCard.name,W/2,180,"#FFD700",1.2);
    }else{
      addText("보스 보상: 회복 + 최대 HP",W/2,180,"lime",1.2);
    }

    if(game.bossEndRefresh){
      game.normalDRTimer=5;
      game.normalDRValue=Math.max(game.normalDRValue,.20);
    }

    game.bossRewardOpen=false;
    game.bossRewardCard=null;
    game.bossRewardTimer=0;
  }
}

function updateCards(dt){
  if(game.penaltyOpen){
    game.penaltyTimer+=dt;

    if(game.penaltyTimer>=CFG.penaltyShowTime){
      game.penaltyOpen=false;
      game.penaltyText="";
    }

    return;
  }

  if(game.cardOpen){
    game.cardTimer+=dt;
    game.cardAnimTimer+=dt;

    if(game.cardTimer>=CFG.cardSelectTime){
      game.stats.cardTimeouts++;
      unlockAchievement("cardTimeout","카드 선택 시간 초과");
      selectCard(Math.floor(Math.random()*game.cardChoices.length));
    }

    return;
  }

  if(game.time>=game.nextCardTime){
    openCardEvent();
  }
}

function selectCard(index){
  const c=game.cardChoices[index];

  if(!c)return;

  applyCard(c);

  game.cardOpen=false;
  game.cardChoices=[];
  game.nextCardTime+=CFG.cardInterval;
}

function handleCardClick(x,y){
  if(!game.cardOpen)return;

  const n=game.cardChoices.length;
  const cardW=120;
  const cardH=220;
  const gap=15;
  const total=n*cardW+(n-1)*gap;
  const start=(W-total)/2;
  const y0=310;

  for(let i=0;i<n;i++){
    const cx=start+i*(cardW+gap);

    if(x>=cx&&x<=cx+cardW&&y>=y0&&y<=y0+cardH){
      selectCard(i);
      return;
    }
  }
}

function initParticles(){
  game.particles=[];

  for(let i=0;i<70;i++){
    game.particles.push({
      x:Math.random()*W,
      y:Math.random()*H,
      vx:(Math.random()-.5)*8,
      vy:8+Math.random()*18,
      a:.15+Math.random()*.35,
      fade:0,
      r:1+Math.random()*2,
      color:"#88ccff"
    });
  }
}

pe==="rect"){const flash=.16+Math.sin(performance.now()/80)*.08;ctx.fillStyle="rgba(255,0,0,"+flash+")";ctx.fillRect(w.x,w.y,w.w,w.h);ctx.strokeStyle="#ff3333";ctx.lineWidth=5;ctx.strokeRect(w.x,w.y,w.w,w.h)}if(w.type==="rectBlast"){ctx.fillStyle="rgba(255,0,0,0.45)";ctx.fillRect(w.x,w.y,w.w,w.h);ctx.shadowColor="#ff3333";ctx.shadowBlur=30;ctx.strokeStyle="#ff7777";ctx.lineWidth=8;ctx.strokeRect(w.x,w.y,w.w,w.h)}if(["line","trackingLine"].includes(w.type)){ctx.beginPath();ctx.moveTo(w.x-Math.cos(w.a)*600,w.y-Math.sin(w.a)*600);ctx.lineTo(w.x+Math.cos(w.a)*600,w.y+Math.sin(w.a)*600);ctx.stroke()}if(w.type==="rotLaser"){ctx.beginPath();ctx.moveTo(w.x-Math.cos(w.a)*600,w.y-Math.sin(w.a)*600);ctx.lineTo(w.x+Math.cos(w.a)*600,w.y+Math.sin(w.a)*600);ctx.moveTo(w.x-Math.cos(w.a+Math.PI/2)*600,w.y-Math.sin(w.a+Math.PI/2)*600);ctx.lineTo(w.x+Math.cos(w.a+Math.PI/2)*600,w.y+Math.sin(w.a+Math.PI/2)*600);ctx.stroke()}if(["cross","eight","goldCross"].includes(w.type)){ctx.lineWidth=w.type==="goldCross"?10:5;ctx.beginPath();ctx.moveTo(w.x-600,w.y);ctx.lineTo(w.x+600,w.y);ctx.moveTo(w.x,w.y-600);ctx.lineTo(w.x,w.y+600);if(w.type==="eight"){ctx.moveTo(w.x-600,w.y-600);ctx.lineTo(w.x+600,w.y+600);ctx.moveTo(w.x-600,w.y+600);ctx.lineTo(w.x+600,w.y-600)}ctx.stroke()}ctx.restore()}}

function wrapText(text,x,y,maxChars,lineH){const lines=String(text).split("\n");let yy=y;for(const part of lines){const words=part.split(" ");let line="";for(const word of words){if((line+word).length>maxChars){ctx.fillText(line,x,yy);yy+=lineH;line=word+" "}else line+=word+" "}ctx.fillText(line,x,yy);yy+=lineH}}

function drawCards(){
  if(game.penaltyOpen){
    ctx.fillStyle="rgba(0,0,0,0.88)";
    ctx.fillRect(0,0,W,H);

    ctx.save();
    ctx.shadowColor="#aa0000";
    ctx.shadowBlur=26;
    ctx.fillStyle="#360000";
    ctx.fillRect(W/2-115,290,230,220);
    ctx.strokeStyle="#aa0000";
    ctx.lineWidth=4;
    ctx.strokeRect(W/2-115,290,230,220);

    ctx.fillStyle="#ff2222";
    ctx.font="42px Arial";
    ctx.textAlign="center";
    ctx.fillText("패널티!",W/2,340);

    ctx.fillStyle="white";
    ctx.font="20px Arial";

    const lines=game.penaltyText.split("\n");

    for(let i=0;i<lines.length;i++){
      ctx.fillText(lines[i],W/2,390+i*32);
    }

    ctx.restore();
  }

  if(game.cardOpen){
    ctx.fillStyle="rgba(0,0,0,0.82)";
    ctx.fillRect(0,0,W,H);

    ctx.save();
    ctx.shadowColor="white";
    ctx.shadowBlur=10;
    ctx.fillStyle="white";
    ctx.font="34px Arial";
    ctx.textAlign="center";
    ctx.fillText("카드 선택",W/2,190);

    ctx.font="22px Arial";
    ctx.fillText(Math.ceil(CFG.cardSelectTime-game.cardTimer)+"초",W/2,235);
    ctx.restore();

    const n=game.cardChoices.length;
    const cardW=120;
    const cardH=220;
    const gap=15;
    const total=n*cardW+(n-1)*gap;
    const start=(W-total)/2;
    const y=310;
    const anim=Math.min(1,game.cardAnimTimer/.35);
    const bounce=1.04-Math.abs(anim-.8)*.05;

    for(let i=0;i<n;i++){
      const c=game.cardChoices[i];
      const x=start+i*(cardW+gap);
      const color=rarityColor(c.rarity);

      ctx.save();
      ctx.translate(x+cardW/2,y+cardH/2);
      ctx.scale(anim*bounce,anim*bounce);
      ctx.rotate((1-anim)*(i-1)*.25);

      ctx.shadowColor=color;
      ctx.shadowBlur=rarityGlow(c.rarity);
      ctx.fillStyle=color;
      ctx.fillRect(-cardW/2,-cardH/2,cardW,cardH);

      ctx.strokeStyle="white";
      ctx.lineWidth=c.rarity==="legendary"?4:3;
      ctx.strokeRect(-cardW/2,-cardH/2,cardW,cardH);

      ctx.fillStyle="black";
      ctx.textAlign="center";
      ctx.font="14px Arial";
      ctx.fillText(c.rarity.toUpperCase(),0,-80);

      ctx.font="17px Arial";
      ctx.fillText(c.name,0,-38);

      ctx.font="12px Arial";
      wrapText(c.desc,0,0,11,17);

      ctx.restore();
    }
  }

  if(game.gameOver&&!game.paused){
    ctx.fillStyle="rgba(0,0,0,0.87)";
    ctx.fillRect(0,0,W,H);

    ctx.save();
    ctx.shadowColor="red";
    ctx.shadowBlur=18;
    ctx.fillStyle="red";
    ctx.font="52px Arial";
    ctx.textAlign="center";
    ctx.fillText("GAME OVER",W/2,105);
    ctx.restore();

    if(game.newRecord||game.newDaily){
      ctx.save();
      ctx.shadowColor=game.newRecord?"#FFD700":"#87CEEB";
      ctx.shadowBlur=18;
      ctx.fillStyle=game.newRecord?"#FFD700":"#87CEEB";
      ctx.font="28px Arial";
      ctx.textAlign="center";
      ctx.fillText(game.newRecord?"NEW RECORD!":"TODAY BEST!",W/2,145);
      ctx.restore();
    }

    ctx.fillStyle="white";
    ctx.font="17px Arial";
    ctx.textAlign="left";

    let y=185;

    const rows=[
      ["생존 시간",fmt(game.time)],
      ["최고 기록",fmt(game.best)],
      ["오늘 기록",fmt(game.todayBest)],
      ["획득 카드",game.stats.cards+"장"],
      ["전설 카드",game.stats.legendary+"장"],
      ["패널티",game.stats.penalties+"개"],
      ["보스 클리어",game.stats.bossClears+"회"],
      ["회피 성공",game.stats.dodges+"회"],
      ["받은 피해",Math.round(game.stats.damageTaken)],
      ["패턴 교체",game.attackSwapCount+"회"]
    ];

    for(const [a,b] of rows){
      ctx.fillText(a,90,y);
      ctx.textAlign="right";
      ctx.fillText(String(b),360,y);
      ctx.textAlign="left";
      y+=27;
    }

    drawButton({x:125,y:H/2+215,w:200,h:44},"이번 판 카드 보기");
    drawButton({x:125,y:H/2+270,w:200,h:44},"다시 시작");
  }
}

function drawBossReward(){
  if(!game.bossRewardOpen)return;

  ctx.fillStyle="rgba(0,0,0,0.88)";
  ctx.fillRect(0,0,W,H);

  const t=game.bossRewardTimer;
  const c=game.bossRewardCard;

  let color="#D9D9D9";

  if(t<2){
    const colors=["#D9D9D9","#87CEEB","#C8A2FF","#FFD700"];
    color=colors[Math.floor(t*15)%colors.length];
  }else if(c){
    color=rarityColor(c.rarity);
  }

  const cardW=170;
  const cardH=250;

  let sx=1;

  if(t>=2&&t<2.6){
    sx=Math.abs(Math.cos((t-2)*Math.PI*2));
  }

  ctx.save();
  ctx.translate(W/2,H/2);
  ctx.scale(sx,1);

  ctx.shadowColor=color;
  ctx.shadowBlur=t<2?30:rarityGlow(c?c.rarity:"common");
  ctx.fillStyle=color;
  ctx.fillRect(-cardW/2,-cardH/2,cardW,cardH);

  ctx.strokeStyle="white";
  ctx.lineWidth=4;
  ctx.strokeRect(-cardW/2,-cardH/2,cardW,cardH);

  ctx.textAlign="center";
  ctx.fillStyle="black";

  if(t<2.3){
    ctx.font="52px Arial";
    ctx.fillText("?",0,18);
  }else if(c){
    ctx.font="16px Arial";
    ctx.fillText(c.rarity.toUpperCase(),0,-82);

    ctx.font="24px Arial";
    ctx.fillText(c.name,0,-35);

    ctx.font="14px Arial";
    wrapText(c.desc,0,10,16,19);
  }else{
    ctx.font="24px Arial";
    ctx.fillText("회복 + 최대 HP",0,0);
  }

  ctx.restore();

  ctx.fillStyle="white";
  ctx.font="28px Arial";
  ctx.textAlign="center";
  ctx.fillText("보스 보상",W/2,210);
}

function drawBossIntro(){
  if(!game.bossIntro)return;

  const t=game.bossIntroTimer;
  const b=game.currentBoss;

  ctx.fillStyle="rgba(80,0,0,0.35)";
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.shadowColor=b?b.color:"#ff3333";
  ctx.shadowBlur=30;
  ctx.fillStyle=b?b.color:"#ff3333";
  ctx.textAlign="center";

  if(t<.5){
    ctx.font="80px Arial";
    ctx.fillText("3",W/2,H/2);
  }else if(t<1){
    ctx.font="80px Arial";
    ctx.fillText("2",W/2,H/2);
  }else if(t<1.5){
    ctx.font="80px Arial";
    ctx.fillText("1",W/2,H/2);
  }else{

function update(dt){
  if(!authState.ready)return;

  if(game.tutorialOpen)return;
  if(game.paused)return;

  if(game.resumeCountdown){
    game.resumeTimer+=dt;

    if(game.resumeTimer>=.8){
      game.resumeTimer=0;
      game.resumeCount--;

      if(game.resumeCount<0){
        game.resumeCountdown=false;
        game.last=performance.now();
      }
    }

    return;
  }

  if(!game.started){
    game.countdownTimer+=dt;

    if(!game.showStart){
      if(game.countdownTimer>=1){
        game.countdownTimer=0;
        game.countdown--;

        if(game.countdown<=0){
          game.showStart=true;
          game.startTimer=0;
        }
      }
    }else{
      game.startTimer+=dt;

      if(game.startTimer>=.7){
        game.started=true;
        game.showStart=false;

        game.time=0;
        game.sessionPlayTime=0;
        game.savedSessionSeconds=0;
        game.last=performance.now();

        globalSave.totalPlays++;
        saveGlobal();

        stopDrag();
      }
    }

    return;
  }

  if(game.gameOver)return;

  if(game.bossIntro){
    updateBossIntro(dt);
    updateEffects(dt);
    return;
  }

  if(game.survivorOpen){
    game.survivorTimer+=dt;
    updateEffects(dt);

    if(game.survivorTimer>=2){
      game.survivorOpen=false;
    }

    return;
  }

  if(game.comboOpen){
    updateCombo(dt);
    updateEffects(dt);
    return;
  }

  if(game.bossRewardOpen){
    updateBossReward(dt);
    updateEffects(dt);
    return;
  }

  if(game.cardOpen||game.penaltyOpen){
    updateCards(dt);
    updateEffects(dt);
    return;
  }

  game.time+=dt;
  game.sessionPlayTime+=dt;

  updateCards(dt);

  if(game.cardOpen||game.penaltyOpen){
    updateEffects(dt);
    return;
  }

  updateInput();
  updatePlayer(dt);
  updateBoss(dt);
  updateAttacks(dt);
  updateSpecials(dt);
  updateBullets(dt);
  updateSpecialObjects(dt);
  updateRules(dt);
  updateEffects(dt);
}

function render(){
  drawBackground();
  drawArena();
  drawBullets();
  drawSpecialObjects();
  drawWarnings();
  drawPlayer();
  drawUI();
  drawTexts();
  drawCards();
  drawBossReward();
  drawBossIntro();
  drawCombo();
  drawSurvivor();
  drawPauseMenu();
  drawResumeCountdown();
  drawTutorial();

  if(!game.started&&!game.tutorialOpen){
    ctx.save();
    ctx.shadowColor="white";
    ctx.shadowBlur=18;
    ctx.fillStyle="white";
    ctx.textAlign="center";

    if(game.showStart){
      ctx.font="60px Arial";
      ctx.fillText("START!",W/2,H/2);
    }else{
      ctx.font="90px Arial";
      ctx.fillText(game.countdown,W/2,H/2);
    }

    ctx.restore();
  }
}

function loop(timestamp){
  if(!game.last)game.last=timestamp;

  const dt=Math.min((timestamp-game.last)/1000,.05);
  game.last=timestamp;

  update(dt);
  updateBgm();
  render();

  requestAnimationFrame(loop);
}

game=makeGame();
resetAttackBag();
initParticles();
requestAnimationFrame(loop);
</script>
