function achList(){return[['survive60','60초 생존'],['survive120','120초 생존'],['survive300','300초 생존'],['survivor','SURVIVOR'],['survive1000','1000초 생존'],['bossFirst','첫 보스 조우'],['bossClear1','첫 보스 클리어'],['bossClear3','보스 3회 클리어'],['bossClear10','보스 10회 클리어'],['bossClear30','보스 30회 클리어'],['sameBoss3','같은 보스 3회 클리어'],['bossNoHit','보스전 노히트'],['card5','카드 5장 획득'],['card10','카드 10장 획득'],['card20','카드 20장 획득'],['legend','전설 카드 첫 획득'],['legend3','전설 카드 3장 획득'],['lowhp','저체력 생존'],['shield','보호막으로 탄 막기'],['revive','부활 사용'],['dodge50','회피 50회 성공'],['hit100','피격 100회 누적'],['cardTimeout','카드 선택 시간 초과'],['play5m','첫 발걸음'],['play30m','생존자'],['play2h','숙련자'],['play5h','베테랑'],['play10h','불굴'],['play15h','전설'],['play20h','끝없는 자']]}
function drawAch(){ctx.fillStyle="rgba(0,0,0,.92)";ctx.fillRect(0,0,W,H);ctx.fillStyle="#FFD700";ctx.font="30px Arial";ctx.textAlign="center";ctx.fillText("업적 도감",W/2,70);let y=120-gy();ctx.font="17px Arial";ctx.textAlign="left";for(let a of achList()){ctx.fillStyle=G.ach.has(a[0])?"#66ff66":"#777";if(lineShow(y))ctx.fillText((G.ach.has(a[0])?"■ ":"□ ")+a[1],60,y);y+=32}setScr(y+gy()-120);back()}
function drawStats(){ctx.fillStyle="rgba(0,0,0,.92)";ctx.fillRect(0,0,W,H);ctx.fillStyle="#FFD700";ctx.font="30px Arial";ctx.textAlign="center";ctx.fillText("현재 게임 통계",W/2,75);let rows=[["생존 시간",fm(G.time)],["현재 HP",Math.round(G.hp)+"/"+Math.round(G.max)],["회피율",Math.round(G.dodge*100)+"%"],["피해 감소",Math.round(G.red*100)+"%"],["특수 피해 감소",Math.round(G.sred*100)+"%"],["재생량",(G.reg*100).toFixed(2)+"%/초"],["일반탄 데미지",12+G.ndb],["특수탄 데미지",25+G.sdb],["보스 클리어",G.stats.b+"회"],["획득 카드",G.stats.c+"장"],["획득 패널티",G.stats.p+"개"]];ctx.font="18px Arial";ctx.textAlign="left";let y=130;for(let r of rows){ctx.fillStyle="white";ctx.fillText(r[0],80,y);ctx.textAlign="right";ctx.fillText(String(r[1]),360,y);ctx.textAlign="left";y+=38}back()}
function fl(t){t=Math.floor(t);let h=Math.floor(t/3600),m=Math.floor(t%3600/60),s=Math.floor(t%60);return h?h+"시간 "+m+"분":m?m+"분 "+s+"초":s+"초"}
function drawRecords(){ctx.fillStyle="rgba(0,0,0,.92)";ctx.fillRect(0,0,W,H);ctx.fillStyle="#FFD700";ctx.font="30px Arial";ctx.textAlign="center";ctx.fillText("플레이 기록",W/2,75);let rows=[["총 플레이 시간",fl(S.total||0)],["총 플레이 횟수",(S.plays||0)+"회"],["최고 생존 시간",fm(S.best||0)],["총 사망 횟수",(S.deaths||0)+"회"],["보스 클리어",(S.totalBossClears||0)+"회"],["총 획득 카드",(S.totalCards||0)+"장"],["총 획득 패널티",(S.totalPens||0)+"개"],["총 회피 성공",(S.totalDodges||0)+"회"],["총 피격",(S.totalHits||0)+"회"],["카드 종류",S.cards.length+"/"+cards.length],["패널티 종류",S.pens.length+"/"+pens.length],["SURVIVOR 외형",G.ach.has('survivor')?"해금됨":"잠김"]];ctx.font="18px Arial";ctx.textAlign="left";let y=130;for(let r of rows){ctx.fillStyle="white";ctx.fillText(r[0],75,y);ctx.textAlign="right";ctx.fillText(String(r[1]),370,y);ctx.textAlign="left";y+=36}back()}
function drawRun(){ctx.fillStyle="rgba(0,0,0,.92)";ctx.fillRect(0,0,W,H);ctx.fillStyle="#FFD700";ctx.font="28px Arial";ctx.textAlign="center";ctx.fillText("이번 판 카드",W/2,70);let y=115-gy();ctx.textAlign="left";ctx.font="16px Arial";for(let c of G.runC){ctx.fillStyle=rCol(c.r);if(lineShow(y))ctx.fillText(c.n,70,y);y+=25}if(G.runP.length){y+=15;ctx.fillStyle="#ff5555";if(lineShow(y))ctx.fillText("패널티",70,y);y+=28;for(let p of G.runP){ctx.fillStyle="white";if(lineShow(y))ctx.fillText(p.n,85,y);y+=25}}if(!G.runC.length&&!G.runP.length){ctx.fillStyle="white";ctx.textAlign="center";ctx.fillText("아직 획득한 카드가 없음",W/2,180)}setScr(y+gy()-115);back()}
function drawPause(){if(!G.pause)return;ctx.fillStyle="rgba(0,0,0,.86)";ctx.fillRect(0,0,W,H);if(G.menu==='codex')return drawCodex();if(G.menu==='boss')return drawBossCodex();if(G.menu==='ach')return drawAch();if(G.menu==='stats')return drawStats();if(G.menu==='records')return drawRecords();if(G.menu==='run')return drawRun();if(G.menu==='settings'){ctx.fillStyle="white";ctx.font="34px Arial";ctx.textAlign="center";ctx.fillText("설정",W/2,190);db({x:95,y:260,w:260,h:44},"효과음: "+(S.sound?"ON":"OFF"),()=>{S.sound=!S.sound;save()});db({x:95,y:315,w:260,h:44},"BGM: "+(S.bgm?"ON":"OFF"),()=>{S.bgm=!S.bgm;save()});if(G.ach.has('survivor'))db({x:95,y:370,w:260,h:44},"SURVIVOR 외형: "+(S.survivorSkin?"ON":"OFF"),()=>{S.survivorSkin=!S.survivorSkin;save()});back();return}ctx.fillStyle="white";ctx.font="38px Arial";ctx.textAlign="center";ctx.fillText("일시정지",W/2,145);let y=185;for(let [t,f] of [["계속하기",()=>G.pause=0],["다시 시작",reset],["설정",()=>G.menu='settings'],["카드 도감",()=>G.menu='codex'],["보스 도감",()=>G.menu='boss'],["업적 도감",()=>G.menu='ach'],["현재 통계",()=>G.menu='stats'],["이번 판 카드",()=>G.menu='run'],["플레이 기록",()=>G.menu='records']]){db({x:135,y,w:180,h:42},t,f);y+=52}}
function drawTutorial(){if(!G.tut)return;ctx.fillStyle="rgba(0,0,0,.94)";ctx.fillRect(0,0,W,H);ctx.fillStyle="#FFD700";ctx.font="34px Arial";ctx.textAlign="center";ctx.fillText("튜토리얼",W/2,170);ctx.fillStyle="white";ctx.font="22px Arial";["드래그로 하얀 원을 이동","25초마다 카드 선택","120초마다 보스전"].forEach((l,i)=>ctx.fillText(l,W/2,270+i*65));db({x:125,y:620,w:200,h:48},"확인",()=>{G.tut=0;S.tut=1;save()})}
function drawIntro(){if(!G.started&&!G.tut){ctx.save();ctx.shadowColor="white";ctx.shadowBlur=18;ctx.fillStyle="white";ctx.textAlign="center";ctx.font="90px Arial";ctx.fillText(Math.max(1,G.count),W/2,H/2);ctx.restore()}}
function drawBossIntro(){if(!G.bossIntro)return;ctx.fillStyle="rgba(80,0,0,.35)";ctx.fillRect(0,0,W,H);let t=G.bossT;ctx.save();ctx.shadowColor=G.bossObj.c;ctx.shadowBlur=30;ctx.fillStyle=G.bossObj.c;ctx.textAlign="center";ctx.font=t<1.5?"80px Arial":"54px Arial";ctx.fillText(t<.5?"3":t<1?"2":t<1.5?"1":"WARNING",W/2,H/2);ctx.restore()}
function drawSurv(){if(!G.surv)return;let t=G.survT;ctx.fillStyle="rgba(0,0,0,.62)";ctx.fillRect(0,0,W,H);for(let i=0;i<4;i++){ctx.save();ctx.globalAlpha=Math.max(0,1-t/2)*.5;ctx.strokeStyle="#FFD700";ctx.shadowColor="#FFD700";ctx.shadowBlur=35;ctx.lineWidth=3;ctx.beginPath();ctx.arc(W/2,H/2,80+t*160+i*35,0,Math.PI*2);ctx.stroke();ctx.restore()}ctx.save();ctx.shadowColor="#FFD700";ctx.shadowBlur=45;ctx.fillStyle="#FFD700";ctx.textAlign="center";ctx.font="64px Arial";ctx.fillText("SURVIVOR",W/2,H/2-20);ctx.font="30px Arial";ctx.fillText("외형 해금",W/2,H/2+38);ctx.restore()}
function render(){btn=[];drawBg();drawArena();drawBul();drawWarn();drawPlayer();drawUI();drawTexts();drawCards();drawReward();drawBossIntro();drawSurv();drawOver();drawPause();drawIntro();drawTutorial()}
function reset(){G=newG();G.tut=!S.tut;P.x=W/2;P.y=H/2;P.r=C.r;initPart();stopDrag();scr.y={};scr.max={}}
function pos(e){let r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*W/r.width,y:(e.clientY-r.top)*H/r.height}}
function hit(x,y){for(let i=btn.length-1;i>=0;i--){let b=btn[i].b;if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h){btn[i].f();return 1}}return 0}
function playable(){return G.started&&!G.pause&&!G.over&&!G.cardOpen&&!G.penOpen&&!G.reward&&!G.bossIntro&&!G.surv&&!G.tut}
canvas.addEventListener("pointerdown",e=>{let p=pos(e);if(hit(p.x,p.y)){e.preventDefault();return}if(G.pause&&G.menu&&['codex','ach','run'].includes(G.menu)){scr.on=1;scr.ly=p.y;e.preventDefault();return}if(playable()){drag.on=1;drag.x=p.x;drag.y=p.y}e.preventDefault()});
canvas.addEventListener("pointermove",e=>{let p=pos(e);if(scr.on){sy(scr.ly-p.y);scr.ly=p.y;e.preventDefault();return}if(drag.on&&playable()){P.x+=(p.x-drag.x)*1.15;P.y+=(p.y-drag.y)*1.15;P.x=cl(P.x,L()+P.r,R()-P.r);P.y=cl(P.y,T()+P.r,B()-P.r);drag.x=p.x;drag.y=p.y}e.preventDefault()});
canvas.addEventListener("pointerup",e=>{stopDrag();scr.on=0;e.preventDefault()});
canvas.addEventListener("pointercancel",e=>{stopDrag();scr.on=0;e.preventDefault()});
canvas.addEventListener("wheel",e=>{if(G.pause&&G.menu){sy(e.deltaY);e.preventDefault()}},{passive:false});
window.addEventListener("keydown",e=>{keys[e.key]=1;keys[e.key.toLowerCase()]=1;if(e.key==="Escape"&&G.started&&!G.over){G.pause=!G.pause;G.menu=''}});
window.addEventListener("keyup",e=>{keys[e.key]=0;keys[e.key.toLowerCase()]=0});
window.addEventListener("blur",()=>{if(playable())G.pause=1});
document.addEventListener("visibilitychange",()=>{if(document.hidden&&playable())G.pause=1});
function loop(t){if(!G.last)G.last=t;let dt=Math.min((t-G.last)/1000,.05);G.last=t;upd(dt);render();requestAnimationFrame(loop)}
reset();requestAnimationFrame(loop);
