<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Ultimate Survival</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  touch-action: none;
  font-family: Arial, sans-serif;
}

canvas {
  display: block;
  margin: auto;
  background: #000;
  touch-action: none;
  width: 450px;
  height: 900px;
  max-width: 100vw;
  max-height: 100vh;
}
</style>
</head>

<body>
<canvas id="game"></canvas>

<script>
"use strict";

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 450;
canvas.height = 900;

const W = 450;
const H = 900;

const CFG = {
  startHp: 160,
  playerR: 10,
  playerSpeed: 290,

  arenaW: 300,
  arenaH: 680,

  normalDamage: 12,
  specialDamage: 25,

  normalR: 7,
  specialR: 11,
  maxBullets: 850,

  cardInterval: 25,
  cardSelectTime: 10,
  penaltyShowTime: 5,

  specialBaseInterval: 19,
  specialMinInterval: 7,
  bossSpecialInterval: 5,

  bossEvery: 120,
  bossDuration: 20,

  invincibleTime: 2,
  dragSensitivity: 1.15
};

function dailyKey() {
  const d = new Date();

  return "ultimate_survival_daily_" +
    d.getFullYear() + "-" +
    String(d.getMonth() + 1).padStart(2, "0") + "-" +
    String(d.getDate()).padStart(2, "0");
}

function loadGlobal() {
  try {
    return JSON.parse(localStorage.getItem("ultimate_survival_global") || "{}");
  } catch (e) {
    return {};
  }
}

const globalSave = Object.assign({
  totalPlays: 0,
  totalDeaths: 0,
  totalPlayTime: 0,
  totalBossClears: 0,
  totalCards: 0,
  totalLegendary: 0,
  totalPenalties: 0,
  totalDodges: 0,
  totalHits: 0,

  soundOn: true,
  bgmOn: true,
  masterVolume: 0.8,
  sfxVolume: 0.9,
  bgmVolume: 0.55,
  vibration: true,
  endlessSkin: true,

  tutorialDone: false,

  cardTypes: [],
  penaltyTypes: []
}, loadGlobal());

function saveGlobal() {
  localStorage.setItem("ultimate_survival_global", JSON.stringify(globalSave));
}

const player = {
  x: W / 2,
  y: H / 2,
  r: CFG.playerR,
  speed: CFG.playerSpeed
};

const arena = {
  x: W / 2,
  y: H / 2,
  w: CFG.arenaW,
  h: CFG.arenaH
};

const keys = {
  up: false,
  down: false,
  left: false,
  right: false
};

const input = {
  dx: 0,
  dy: 0
};

const drag = {
  active: false,
  touchId: null,
  lastX: 0,
  lastY: 0
};

let game;

let audioCtx = null;
let bgmTimer = null;
let currentBgmMode = "";
let bgmStep = 0;

function makeGame() {
  const weights = {};
  for (let i = 1; i <= 20; i++) {
    weights["S" + i] = 100;
  }

  return {
    started: false,
    gameOver: false,
    paused: false,

    settingsOpen: false,
    codexOpen: false,
    achievementsOpen: false,
    statsOpen: false,
    recordsOpen: false,
    runCardsOpen: false,

    tutorialOpen: !globalSave.tutorialDone,
    confirmRestart: false,

    resumeCountdown: false,
    resumeCount: 3,
    resumeTimer: 0,

    countdown: 3,
    countdownTimer: 0,
    showStart: false,
    startTimer: 0,

    time: 0,
    last: 0,
    sessionPlayTime: 0,
    savedSessionSeconds: 0,

    hp: CFG.startHp,
    maxHp: CFG.startHp,
    displayHp: CFG.startHp,

    regen: 0,
    dodge: 0,
    lowHpDodge: 0,
    damageReduce: 0,
    specialReduce: 0,
    bulletBonus: 0,
    bulletSlow: 0,

    unyielding: false,
    shield: 0,
    playerSizeBonus: 0,

    hasRevive: false,
    reviveUsed: false,
    invincible: 0,
    dodgeFlash: 0,
    hitCooldown: 0,
    specialHitCooldown: 0,
    specialLock: 0,

    normalDamageBonus: 0,
    specialDamageBonus: 0,
    attackSwapCount: 0,
    specialInterval: CFG.specialBaseInterval,

    bullets: [],
    texts: [],
    warnings: [],
    delayed: [],
    specialObjects: [],
    particles: [],
    notices: [],
    trail: [],

    activeAttacks: [],
    attackBag: [],
    attackScheduleIndex: 0,

    specialTimer: 0,
    lastSpecial: null,
    specialWeights: weights,

    bossActive: false,
    bossTimer: 0,
    nextBossTime: CFG.bossEvery,
    bossIntro: false,
    bossIntroTimer: 0,
    bossClears: 0,

    nextCardTime: CFG.cardInterval,
    cardOpen: false,
    cardTimer: 0,
    cardChoices: [],
    cardAnimTimer: 0,

    penaltyCooldown: 0,
    penaltyOpen: false,
    penaltyTimer: 0,
    penaltyText: "",

    bossRewardOpen: false,
    bossRewardTimer: 0,
    bossRewardCard: null,

    comboOpen: false,
    comboTimer: 0,
    comboName: "",

    survivorOpen: false,
    survivorTimer: 0,
    survivorDone: false,

    endlessOpen: false,
    endlessTimer: 0,

    ownedCards: new Set(),
    ownedPenalties: new Set(),
    activePenalties: [],

    runCards: [],
    runPenalties: [],

    stats: {
      cards: 0,
      legendary: 0,
      penalties: 0,
      bossClears: 0,
      dodges: 0,
      damageTaken: 0,
      hits: 0
    },

    achievements: new Set(JSON.parse(localStorage.getItem("ultimate_survival_achievements") || "[]")),

    best: Number(localStorage.getItem("ultimate_survival_best") || 0),
    todayBest: Number(localStorage.getItem(dailyKey()) || 0),

    newRecord: false,
    newDaily: false,
    savedDeath: false
  };
}

game = makeGame();

function left() {
  return arena.x - arena.w / 2;
}

function right() {
  return arena.x + arena.w / 2;
}

function topY() {
  return arena.y - arena.h / 2;
}

function bottom() {
  return arena.y + arena.h / 2;
}

function clamp(v, a, b) {
  return Math.max(a, Math.min(b, v));
}

function dist(x1, y1, x2, y2) {
  return Math.hypot(x1 - x2, y1 - y2);
}

function rand(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function fmt(t) {
  t = Math.floor(t);
  return String(Math.floor(t / 60)).padStart(2, "0") + ":" +
         String(t % 60).padStart(2, "0");
}

function fmtLong(t) {
  t = Math.floor(t);

  const h = Math.floor(t / 3600);
  const m = Math.floor((t % 3600) / 60);
  const s = t % 60;

  if (h > 0) return h + "시간 " + m + "분";
  if (m > 0) return m + "분 " + s + "초";
  return s + "초";
}

function stopDrag() {
  drag.active = false;
  drag.touchId = null;
  input.dx = 0;
  input.dy = 0;
}

function clampPlayer() {
  player.r = CFG.playerR * (1 + game.playerSizeBonus);
  player.x = clamp(player.x, left() + player.r, right() - player.r);
  player.y = clamp(player.y, topY() + player.r, bottom() - player.r);
}

function addText(text, x, y, color = "white", life = 0.9) {
  game.texts.push({
    text,
    x,
    y,
    color,
    life,
    max: life
  });
}

function addNotice(lines, color = "#ffffff") {
  game.notices.push({
    lines,
    life: 2,
    max: 2,
    color
  });
}

function saveAchievements() {
  localStorage.setItem("ultimate_survival_achievements", JSON.stringify([...game.achievements]));
}

function unlockAchievement(id, text) {
  if (game.achievements.has(id)) return;

  game.achievements.add(id);
  saveAchievements();

  addNotice(["업적 달성", text], "#FFD700");
  sfx("achievement");

  if (id === "survivor") {
    fanfare("survivor");
  }

  if (id === "play20h") {
    game.endlessOpen = true;
    game.endlessTimer = 0;
    stopDrag();
    stopBgm();
    fanfare("endless");
  }
}

function bankPlayTime() {
  const now = Math.floor(game.sessionPlayTime);
  const delta = now - game.savedSessionSeconds;

  if (delta > 0) {
    globalSave.totalPlayTime += delta;
    game.savedSessionSeconds = now;
    saveGlobal();
  }
}

/* =========================
   SOUND / BGM SYSTEM
   ========================= */

function getAudio() {
  try {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      audioCtx = new AC();
    }

    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }

    return audioCtx;
  } catch (e) {
    return null;
  }
}

function playTone(freq, startTime, duration, type, volume) {
  const ac = getAudio();
  if (!ac) return;

  const osc = ac.createOscillator();
  const gain = ac.createGain();

  osc.type = type || "sine";
  osc.frequency.setValueAtTime(freq, startTime);

  const attack = 0.015;
  const release = Math.max(0.04, duration - attack);

  gain.gain.setValueAtTime(0.001, startTime);
  gain.gain.linearRampToValueAtTime(volume, startTime + attack);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + attack + release);

  osc.connect(gain);
  gain.connect(ac.destination);

  osc.start(startTime);
  osc.stop(startTime + duration + 0.03);
}

function sfx(type) {
  if (!globalSave.soundOn) return;

  const ac = getAudio();
  if (!ac) return;

  const baseVol = 0.06 * globalSave.masterVolume * globalSave.sfxVolume;
  const now = ac.currentTime;

  if (type === "hit") {
    playTone(130, now, 0.10, "square", baseVol);
  } else if (type === "dodge") {
    playTone(920, now, 0.09, "sine", baseVol * 0.7);
  } else if (type === "card") {
    playTone(660, now, 0.12, "triangle", baseVol * 0.8);
    playTone(880, now + 0.05, 0.10, "triangle", baseVol * 0.5);
  } else if (type === "legend") {
    playTone(660, now, 0.18, "triangle", baseVol);
    playTone(990, now + 0.08, 0.22, "triangle", baseVol * 0.85);
    playTone(1320, now + 0.18, 0.25, "triangle", baseVol * 0.65);
  } else if (type === "penalty") {
    playTone(120, now, 0.25, "sawtooth", baseVol);
    playTone(80, now + 0.08, 0.30, "sawtooth", baseVol * 0.7);
  } else if (type === "boss") {
    playTone(110, now, 0.22, "sawtooth", baseVol);
    playTone(82, now + 0.16, 0.22, "sawtooth", baseVol);
  } else if (type === "revive") {
    playTone(520, now, 0.20, "triangle", baseVol);
    playTone(760, now + 0.08, 0.25, "triangle", baseVol * 0.8);
  } else if (type === "achievement") {
    playTone(740, now, 0.16, "triangle", baseVol);
    playTone(980, now + 0.08, 0.16, "triangle", baseVol * 0.8);
  } else if (type === "shield") {
    playTone(810, now, 0.12, "sine", baseVol * 0.75);
  } else {
    playTone(500, now, 0.08, "sine", baseVol * 0.7);
  }
}

const BGM_PATTERNS = {
  early: {
    interval: 420,
    bass: [110, 110, 130, 147],
    lead: [220, 330, 262, 330, 294, 392, 330, 262],
    type: "triangle",
    bassType: "sine"
  },
  danger: {
    interval: 360,
    bass: [98, 98, 123, 147],
    lead: [294, 392, 330, 440, 392, 330, 294, 247],
    type: "triangle",
    bassType: "sawtooth"
  },
  survive: {
    interval: 300,
    bass: [87, 98, 110, 130],
    lead: [349, 440, 392, 523, 440, 392, 349, 294],
    type: "square",
    bassType: "sawtooth"
  },
  veteran: {
    interval: 260,
    bass: [65, 87, 98, 130],
    lead: [392, 523, 440, 659, 523, 440, 392, 330],
    type: "square",
    bassType: "sawtooth"
  },
  boss: {
    interval: 210,
    bass: [55, 55, 73, 82],
    lead: [220, 277, 330, 277, 220, 196, 220, 330],
    type: "sawtooth",
    bassType: "sawtooth"
  },
  gold: {
    interval: 340,
    bass: [123, 147, 196, 247],
    lead: [494, 740, 659, 988, 740, 659, 494, 370],
    type: "triangle",
    bassType: "sine"
  }
};

function stopBgm() {
  if (bgmTimer !== null) {
    clearInterval(bgmTimer);
    bgmTimer = null;
  }

  currentBgmMode = "";
  bgmStep = 0;
}

function playBgmStep(mode) {
  const ac = getAudio();
  if (!ac) return;

  const p = BGM_PATTERNS[mode];
  if (!p) return;

  const now = ac.currentTime;
  const vol = 0.025 * globalSave.masterVolume * globalSave.bgmVolume;

  const lead = p.lead[bgmStep % p.lead.length];
  const bass = p.bass[Math.floor(bgmStep / 2) % p.bass.length];

  if (bgmStep % 2 === 0) {
    playTone(bass, now, 0.20, p.bassType, vol * 0.85);
  }

  playTone(lead, now + 0.02, 0.16, p.type, vol * 0.75);

  if (mode === "boss" && bgmStep % 4 === 0) {
    playTone(55, now + 0.04, 0.09, "square", vol * 1.1);
  }

  if (mode === "gold" && bgmStep % 4 === 0) {
    playTone(lead * 2, now + 0.08, 0.20, "triangle", vol * 0.45);
  }

  bgmStep++;
}

function startBgm(mode) {
  if (!globalSave.bgmOn) return;
  if (currentBgmMode === mode) return;

  stopBgm();

  const p = BGM_PATTERNS[mode];
  if (!p) return;

  currentBgmMode = mode;
  bgmStep = 0;

  playBgmStep(mode);

  bgmTimer = setInterval(function () {
    if (!globalSave.bgmOn) {
      stopBgm();
      return;
    }

    if (
      game.paused ||
      game.gameOver ||
      game.cardOpen ||
      game.penaltyOpen ||
      game.bossRewardOpen ||
      game.comboOpen ||
      game.survivorOpen ||
      game.endlessOpen ||
      game.tutorialOpen
    ) {
      stopBgm();
      return;
    }

    playBgmStep(mode);
  }, p.interval);
}

function updateBgm() {
  if (
    !globalSave.bgmOn ||
    game.paused ||
    game.gameOver ||
    game.cardOpen ||
    game.penaltyOpen ||
    game.bossRewardOpen ||
    game.comboOpen ||
    game.survivorOpen ||
    game.endlessOpen ||
    game.tutorialOpen
  ) {
    stopBgm();
    return;
  }

  if (!game.started) return;

  if (game.bossActive || game.bossIntro) {
    startBgm("boss");
  } else if (game.time >= 540) {
    startBgm("gold");
  } else if (game.time >= 300) {
    startBgm("veteran");
  } else if (game.time >= 120) {
    startBgm("survive");
  } else if (game.time >= 60) {
    startBgm("danger");
  } else {
    startBgm("early");
  }
}

function fanfare(type) {
  const ac = getAudio();
  if (!ac) return;

  const baseVol = 0.07 * globalSave.masterVolume * globalSave.sfxVolume;

  const notes = type === "endless"
    ? [392, 523, 659, 784, 1046, 1318, 1568]
    : [523, 659, 784, 1046];

  for (let i = 0; i < notes.length; i++) {
    playTone(notes[i], ac.currentTime + i * 0.12, 0.34, "triangle", baseVol * (1 - i * 0.06));
  }
}

/* =========================
   STATS
   ========================= */

function addMaxHp(v) {
  game.maxHp = Math.max(50, game.maxHp + v);

  if (v > 0) game.hp += v;

  game.hp = Math.min(game.hp, game.maxHp);
  game.displayHp = Math.min(game.displayHp, game.maxHp);
}

function addCappedStat(stat, amount, cap) {
  const after = game[stat] + amount;

  if (after <= cap) {
    game[stat] = Math.max(0, after);
    return;
  }

  game[stat] = cap;

  const excess = after - cap;
  addMaxHp(Math.round(excess * 100) * 3);
}

function addDodge(v) {
  addCappedStat("dodge", v, 0.45);
}

function addDamageReduce(v) {
  addCappedStat("damageReduce", v, 0.45);
}

function addSpecialReduce(v) {
  addCappedStat("specialReduce", v, 0.55);
}

function totalDodge() {
  let v = game.dodge;

  if (game.hp / game.maxHp <= 0.30) v += game.lowHpDodge;
  if (game.unyielding && game.hp / game.maxHp <= 0.25) v += 0.08;

  return Math.min(0.45, v);
}

function totalDamageReduce() {
  let v = game.damageReduce;

  if (game.unyielding && game.hp / game.maxHp <= 0.25) v += 0.08;

  return Math.min(0.45, v);
}

function currentNormalDamage() {
  return CFG.normalDamage + game.normalDamageBonus + (game.bossActive ? 3 : 0);
}

function bossDamageBonus() {
  if (!game.bossActive) return 0;

  const stage = Math.floor(game.time / 120);
  return 3 + Math.min(8, stage * 2);
}

function currentSpecialDamage() {
  return CFG.specialDamage + game.specialDamageBonus + bossDamageBonus();
}

function bulletSpeedMultiplier() {
  let timeBonus = 0;

  if (game.time >= 480) timeBonus = 0.25;
  else if (game.time >= 360) timeBonus = 0.20;
  else if (game.time >= 240) timeBonus = 0.15;
  else if (game.time >= 120) timeBonus = 0.10;
  else if (game.time >= 60) timeBonus = 0.05;

  return Math.max(0.25, 1 + game.bulletBonus - game.bulletSlow + timeBonus);
}

function randomNearPlayer(minD, maxD, marginX = 40, marginY = 50) {
  for (let i = 0; i < 80; i++) {
    const a = Math.random() * Math.PI * 2;
    const d = minD + Math.random() * (maxD - minD);

    const x = clamp(player.x + Math.cos(a) * d, left() + marginX, right() - marginX);
    const y = clamp(player.y + Math.sin(a) * d, topY() + marginY, bottom() - marginY);

    if (dist(x, y, player.x, player.y) >= minD * 0.8) {
      return { x, y };
    }
  }

  return {
    x: clamp(player.x, left() + marginX, right() - marginX),
    y: clamp(player.y, topY() + marginY, bottom() - marginY)
  };
}

/* =========================
   BULLETS / DAMAGE
   ========================= */

function createBullet(o) {
  const type = o.type || "normal";

  game.bullets.push({
    x: o.x,
    y: o.y,
    vx: o.vx,
    vy: o.vy,
    r: o.r || (type === "special" ? CFG.specialR : CFG.normalR),
    damage: o.damage || (type === "special" ? currentSpecialDamage() : currentNormalDamage()),
    type: type,
    color: o.color || (type === "special" ? "#ff3333" : "#ffcc33"),
    life: o.life ?? null,
    age: 0,
    bounce: o.bounce || 0,
    homing: o.homing || false,
    turn: o.turn || 0,
    speed: o.speed || null,
    split: o.split || false,
    splitDone: false,
    wave: o.wave || false,
    baseX: o.x,
    waveA: o.waveA || 0
  });

  while (game.bullets.length > CFG.maxBullets) {
    game.bullets.shift();
  }
}

function addWarning(type, data) {
  game.warnings.push({
    type,
    ...data,
    life: data.life || 1.5,
    max: data.life || 1.5
  });
}

function addSpecialObject(o) {
  game.specialObjects.push(o);
}

function damagePlayer(amount, ignoreReduction = false, isSpecial = false) {
  if (game.gameOver || game.invincible > 0) return;
  if (game.hitCooldown > 0) return;
  if (isSpecial && game.specialHitCooldown > 0) return;

  if (game.shield > 0) {
    game.shield--;
    sfx("shield");
    addText("보호막!", player.x, player.y - 22, "#66ccff");
    return;
  }

  if (!ignoreReduction) {
    if (Math.random() < totalDodge()) {
      game.dodgeFlash = 0.15;
      game.stats.dodges++;
      globalSave.totalDodges++;
      saveGlobal();
      sfx("dodge");
      addText("회피", player.x + 18, player.y - 18, "white");
      return;
    }

    amount *= 1 - totalDamageReduce();

    if (isSpecial) {
      amount *= 1 - Math.min(0.55, game.specialReduce);
    }
  }

  game.hitCooldown = 0.2;
  if (isSpecial) game.specialHitCooldown = 0.2;

  game.hp -= amount;
  game.stats.damageTaken += amount;
  game.stats.hits++;
  globalSave.totalHits++;

  sfx("hit");

  if (game.hp < 0) game.hp = 0;
  if (game.hp <= 0) handleDeath();
}

function saveDeathStats() {
  if (game.savedDeath) return;

  game.savedDeath = true;
  bankPlayTime();

  globalSave.totalDeaths++;
  saveGlobal();
}

function handleDeath() {
  if (game.hasRevive && !game.reviveUsed) {
    game.reviveUsed = true;
    game.hasRevive = false;
    game.hp = game.maxHp * 0.5;
    game.invincible = CFG.invincibleTime;

    unlockAchievement("revive", "부활 사용");
    sfx("revive");
    addText("부활!", player.x, player.y - 25, "#FFD700", 1.2);
    return;
  }

  game.gameOver = true;
  saveDeathStats();
  stopBgm();

  if (game.time > game.best) {
    game.best = game.time;
    game.newRecord = true;
    localStorage.setItem("ultimate_survival_best", String(game.best));
  }

  if (game.time > game.todayBest) {
    game.todayBest = game.time;
    game.newDaily = true;
    localStorage.setItem(dailyKey(), String(game.todayBest));
  }
}

/* =========================
   INPUT
   ========================= */

function getPointerFromClient(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();

  return {
    x: (clientX - rect.left) * canvas.width / rect.width,
    y: (clientY - rect.top) * canvas.height / rect.height
  };
}

function getPointer(e) {
  const p = e.changedTouches ? e.changedTouches[0] : e;
  return getPointerFromClient(p.clientX, p.clientY);
}

window.addEventListener("keydown", function (e) {

function handlePointerDown(x, y) {
  getAudio();

  if (game.tutorialOpen) {
    if (buttonHit(x, y, menuButtons.tutorialOk)) {
      game.tutorialOpen = false;
      globalSave.tutorialDone = true;
      saveGlobal();
      sfx("click");
      return true;
    }

    return true;
  }

  if (game.resumeCountdown) return true;

  if (
    game.started &&
    !game.gameOver &&
    !game.cardOpen &&
    !game.penaltyOpen &&
    !game.bossRewardOpen &&
    !game.comboOpen &&
    !game.bossIntro &&
    !game.survivorOpen &&
    !game.endlessOpen
  ) {
    if (buttonHit(x, y, pauseBtn)) {
      game.paused = !game.paused;

      game.settingsOpen = false;
      game.codexOpen = false;
      game.achievementsOpen = false;
      game.statsOpen = false;
      game.recordsOpen = false;
      game.runCardsOpen = false;
      game.confirmRestart = false;

      stopDrag();
      bankPlayTime();
      stopBgm();
      sfx("click");

      return true;
    }
  }

  if (game.paused) {
    if (game.confirmRestart) {
      if (buttonHit(x, y, menuButtons.confirmNo)) {
        game.confirmRestart = false;
        sfx("click");
        return true;
      }

      if (buttonHit(x, y, menuButtons.confirmYes)) {
        resetGame();
        sfx("click");
        return true;
      }

      return true;
    }

    if (game.settingsOpen) {
      if (buttonHit(x, y, menuButtons.sound)) {
        globalSave.soundOn = !globalSave.soundOn;
        saveGlobal();
        sfx("click");
        return true;
      }

      if (buttonHit(x, y, menuButtons.bgm)) {
        globalSave.bgmOn = !globalSave.bgmOn;
        saveGlobal();
        stopBgm();
        sfx("click");
        return true;
      }

      if (buttonHit(x, y, menuButtons.master)) {
        globalSave.masterVolume = cycleVol(globalSave.masterVolume);
        saveGlobal();
        stopBgm();
        sfx("click");
        return true;
      }

      if (buttonHit(x, y, menuButtons.sfxVol)) {
        globalSave.sfxVolume = cycleVol(globalSave.sfxVolume);
        saveGlobal();
        sfx("click");
        return true;
      }

      if (buttonHit(x, y, menuButtons.bgmVol)) {
        globalSave.bgmVolume = cycleVol(globalSave.bgmVolume);
        saveGlobal();
        stopBgm();
        sfx("click");
        return true;
      }

      if (buttonHit(x, y, menuButtons.vibration)) {
        globalSave.vibration = !globalSave.vibration;
        saveGlobal();
        sfx("click");
        return true;
      }

      if (game.achievements.has("play20h") && buttonHit(x, y, menuButtons.endlessSkin)) {
        globalSave.endlessSkin = !globalSave.endlessSkin;
        saveGlobal();
        sfx("click");
        return true;
      }

      if (buttonHit(x, y, menuButtons.back)) {
        game.settingsOpen = false;
        sfx("click");
        return true;
      }

      return true;
    }

    if (
      game.codexOpen ||
      game.achievementsOpen ||
      game.statsOpen ||
      game.recordsOpen ||
      game.runCardsOpen
    ) {
      if (buttonHit(x, y, menuButtons.back)) {
        game.codexOpen = false;
        game.achievementsOpen = false;
        game.statsOpen = false;
        game.recordsOpen = false;
        game.runCardsOpen = false;

        sfx("click");
        return true;
      }

      return true;
    }

    if (buttonHit(x, y, menuButtons.resume)) {
      startResumeCountdown();
      sfx("click");
      return true;
    }

    if (buttonHit(x, y, menuButtons.restart)) {
      game.confirmRestart = true;
      sfx("click");
      return true;
    }

    if (buttonHit(x, y, menuButtons.settings)) {
      game.settingsOpen = true;
      sfx("click");
      return true;
    }

    if (buttonHit(x, y, menuButtons.codex)) {
      game.codexOpen = true;
      sfx("click");
      return true;
    }

    if (buttonHit(x, y, menuButtons.achievements)) {
      game.achievementsOpen = true;
      sfx("click");
      return true;
    }

    if (buttonHit(x, y, menuButtons.stats)) {
      game.statsOpen = true;
      sfx("click");
      return true;
    }

    if (buttonHit(x, y, menuButtons.runCards)) {

      sfx("click");
      return true;
    }

    if (buttonHit(x, y, menuButtons.records)) {

    return true;

    return true;

  return false;

canvas.addEventListener("touchstart", function (e) {
  const p = getPointer(e);

  if (handlePointerDown(p.x, p.y)) {
    e.preventDefault();
    return;
  }

  if (
    game.penaltyOpen ||
    game.bossRewardOpen ||
    game.comboOpen ||
    game.bossIntro ||
    game.survivorOpen ||
    game.endlessOpen
  ) {
    e.preventDefault();
    return;
  }

  const t = e.changedTouches[0];

  drag.active = true;
  drag.touchId = t.identifier;
  drag.lastX = p.x;
  drag.lastY = p.y;

  e.preventDefault();
}, { passive: false });

canvas.addEventListener("touchmove", function (e) {
  if (!drag.active) return;

  if (
    game.paused ||
    game.cardOpen ||
    game.penaltyOpen ||
    game.bossRewardOpen ||
    game.comboOpen ||
    game.bossIntro ||
    game.survivorOpen ||
    game.endlessOpen ||
    game.resumeCountdown
  ) {
    stopDrag();
    e.preventDefault();
    return;
  }

  for (const t of e.changedTouches) {
    if (t.identifier === drag.touchId) {
      const p = getPointerFromClient(t.clientX, t.clientY);

      player.x += (p.x - drag.lastX) * CFG.dragSensitivity;
      player.y += (p.y - drag.lastY) * CFG.dragSensitivity;

      clampPlayer();

      drag.lastX = p.x;
      drag.lastY = p.y;
    }
  }

  e.preventDefault();
}, { passive: false });

canvas.addEventListener("touchend", function (e) {
  for (const t of e.changedTouches) {
    if (t.identifier === drag.touchId) stopDrag();
  }

  e.preventDefault();
}, { passive: false });

canvas.addEventListener("touchcancel", function (e) {
  stopDrag();
  e.preventDefault();
}, { passive: false });

canvas.addEventListener("click", function (e) {

});

/* =========================
   UPDATE LOGIC
   ========================= */

function updateInput() {
  if (drag.active) {
    input.dx = 0;
    input.dy = 0;
    return;
  }

  let x = 0;
  let y = 0;

  if (keys.left) x--;
  if (keys.right) x++;
  if (keys.up) y--;
  if (keys.down) y++;

  const d = Math.hypot(x, y);

  if (d > 1) {
    x /= d;
    y /= d;
  }

  input.dx = x;
  input.dy = y;
}

function updatePlayer(dt) {
  player.x += input.dx * player.speed * dt;
  player.y += input.dy * player.speed * dt;

  clampPlayer();

  if (game.achievements.has("play20h") && globalSave.endlessSkin) {
    game.trail.push({
      x: player.x,
      y: player.y,
      life: 0.35,
      max: 0.35
    });

    if (game.trail.length > 18) game.trail.shift();
  }
}

function updateBullets(dt) {
  const mul = bulletSpeedMultiplier();

  for (let i = game.bullets.length - 1; i >= 0; i--) {
    const b = game.bullets[i];

    b.age += dt;

    if (b.life !== null) {
      b.life -= dt;

      if (b.life <= 0) {
        game.bullets.splice(i, 1);
        continue;
      }
    }

    if (b.homing && b.age < 3) {
      const dx = player.x - b.x;
      const dy = player.y - b.y;
      const d = Math.hypot(dx, dy) || 1;

      const tvx = dx / d * (b.speed || 220);
      const tvy = dy / d * (b.speed || 220);

      b.vx += (tvx - b.vx) * b.turn * dt;
      b.vy += (tvy - b.vy) * b.turn * dt;
    }

    if (b.wave) {
      b.waveA += dt * 7;
      b.x = b.baseX + Math.sin(b.waveA) * 35;
    }

    b.x += b.vx * dt * mul;
    b.y += b.vy * dt * mul;

    if (b.split && !b.splitDone && b.y > arena.y) {
      b.splitDone = true;

      createBullet({
        x: b.x,
        y: b.y,
        vx: -170,
        vy: 85,
        r: CFG.normalR
      });

      createBullet({
        x: b.x,
        y: b.y,
        vx: 170,
        vy: 85,
        r: CFG.normalR
      });
    }

    if (b.bounce > 0) {
      let hit = false;

      if (b.x - b.r <= left() || b.x + b.r >= right()) {
        b.vx *= -1;
        hit = true;
      }

      if (b.y - b.r <= topY() || b.y + b.r >= bottom()) {
        b.vy *= -1;
        hit = true;
      }

      if (hit) {
        b.bounce--;
        b.x = clamp(b.x, left() + b.r, right() - b.r);
        b.y = clamp(b.y, topY() + b.r, bottom() - b.r);
      }
    }

    if (b.x < -150 || b.x > W + 150 || b.y < -150 || b.y > H + 150) {
      game.bullets.splice(i, 1);
      continue;
    }

    if (dist(b.x, b.y, player.x, player.y) <= b.r + player.r) {
      damagePlayer(b.damage, false, b.type === "special");
      game.bullets.splice(i, 1);
    }
  }
}

function pointLineDistance(px, py, x, y, a) {
  const nx = -Math.sin(a);
  const ny = Math.cos(a);

  return Math.abs((px - x) * nx + (py - y) * ny);
}

function updateSpecialObjects(dt) {
  for (let i = game.specialObjects.length - 1; i >= 0; i--) {
    const o = game.specialObjects[i];

    o.life -= dt;

    if (o.type === "rotLaser") {
      o.a += o.speed * dt;

      const d1 = pointLineDistance(player.x, player.y, o.x, o.y, o.a);
      const d2 = pointLineDistance(player.x, player.y, o.x, o.y, o.a + Math.PI / 2);

      if (d1 < player.r + 6 || d2 < player.r + 6) {
        damagePlayer(currentSpecialDamage() * 0.9 * dt, true, true);
      }
    }

    if (o.type === "blackhole") {
      const dx = o.x - player.x;
      const dy = o.y - player.y;
      const d = Math.hypot(dx, dy) || 1;

      player.x += dx / d * 35 * dt;
      player.y += dy / d * 35 * dt;

      clampPlayer();

      if (d < o.r + player.r) {
        damagePlayer(currentSpecialDamage() * 0.8 * dt, true, true);
      }
    }

    if (o.type === "movingWall") {
      o.pos += o.speed * dt;

      const p = o.pos;

      if (
        player.x < left() + p ||
        player.x > right() - p ||
        player.y < topY() + p ||
        player.y > bottom() - p
      ) {
        damagePlayer(currentSpecialDamage() * dt, true, true);
      }
    }

    if (o.life <= 0) {
      game.specialObjects.splice(i, 1);
    }
  }
}

function updateEffects(dt) {
  game.displayHp += (game.hp - game.displayHp) * Math.min(1, dt * 6);

  for (let i = game.trail.length - 1; i >= 0; i--) {
    game.trail[i].life -= dt;
    if (game.trail[i].life <= 0) game.trail.splice(i, 1);
  }

  for (let i = game.texts.length - 1; i >= 0; i--) {
    const f = game.texts[i];

    f.life -= dt;
    f.y -= 20 * dt;

    if (f.life <= 0) game.texts.splice(i, 1);
  }

  for (let i = game.warnings.length - 1; i >= 0; i--) {
    const w = game.warnings[i];

    w.life -= dt;

    if (w.life <= 0) game.warnings.splice(i, 1);
  }

  for (let i = game.delayed.length - 1; i >= 0; i--) {
    const ev = game.delayed[i];

    ev.time -= dt;

    if (ev.time <= 0) {
      ev.fn();
      game.delayed.splice(i, 1);
    }
  }

  for (let i = game.notices.length - 1; i >= 0; i--) {
    const n = game.notices[i];

    n.life -= dt;

    if (n.life <= 0) game.notices.splice(i, 1);
  }

  for (const p of game.particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;

    if (p.fade) p.a -= dt * p.fade;

    if (p.y > H + 20) p.y = -20;
    if (p.x < -20) p.x = W + 20;
    if (p.x > W + 20) p.x = -20;
  }

  game.particles = game.particles.filter(p => p.a > 0);

  if (game.invincible > 0) game.invincible = Math.max(0, game.invincible - dt);
  if (game.dodgeFlash > 0) game.dodgeFlash = Math.max(0, game.dodgeFlash - dt);
  if (game.hitCooldown > 0) game.hitCooldown = Math.max(0, game.hitCooldown - dt);
  if (game.specialHitCooldown > 0) game.specialHitCooldown = Math.max(0, game.specialHitCooldown - dt);
  if (game.specialLock > 0) game.specialLock = Math.max(0, game.specialLock - dt);
}

function updateRules(dt) {
  if (game.regen > 0) {
    game.hp = Math.min(game.maxHp, game.hp + game.maxHp * game.regen * dt);
  }

  if (game.time >= 60) unlockAchievement("survive60", "60초 생존");
  if (game.time >= 120) unlockAchievement("survive120", "120초 생존");
  if (game.time >= 300) unlockAchievement("survive300", "300초 생존");

  const total = globalSave.totalPlayTime + Math.floor(game.sessionPlayTime - game.savedSessionSeconds);

  if (total >= 300) unlockAchievement("play5m", "첫 발걸음");
  if (total >= 1800) unlockAchievement("play30m", "생존자");
  if (total >= 7200) unlockAchievement("play2h", "숙련자");
  if (total >= 18000) unlockAchievement("play5h", "베테랑");
  if (total >= 36000) unlockAchievement("play10h", "불굴");
  if (total >= 54000) unlockAchievement("play15h", "전설");
  if (total >= 72000) unlockAchievement("play20h", "끝없는 자");

  if (game.time >= 540 && !game.survivorDone) {
    game.survivorDone = true;
    game.survivorOpen = true;
    game.survivorTimer = 0;

    stopDrag();
    unlockAchievement("survivor", "SURVIVOR");
    sfx("survivor");

    for (let i = 0; i < 80; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 60 + Math.random() * 180;

      game.particles.push({
        x: W / 2,
        y: H / 2,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        a: 1,
        fade: 0.4,
        r: 2 + Math.random() * 3,
        color: "#FFD700"
      });
    }
  }

  if (Math.floor(game.sessionPlayTime) % 5 === 0) {
    bankPlayTime();
  }
}

function updateBoss(dt) {
  if (
    !game.bossActive &&
    !game.bossIntro &&
    !game.cardOpen &&
    !game.penaltyOpen &&
    game.time >= game.nextBossTime
  ) {
    game.bossIntro = true;
    game.bossIntroTimer = 0;

    stopDrag();
    sfx("boss");
  }

  if (game.bossActive) {
    game.bossTimer += dt;

    if (game.bossTimer >= CFG.bossDuration) {
      game.bossActive = false;
      game.nextBossTime += CFG.bossEvery;
      game.bossClears++;
      game.stats.bossClears++;
      globalSave.totalBossClears++;

      saveGlobal();

      unlockAchievement("boss", "보스 페이즈 생존");
      openBossReward();
    }
  }
}

function shootAngle(x, y, a, s, type = "normal", r = null) {
  createBullet({
    x,
    y,
    vx: Math.cos(a) * s,
    vy: Math.sin(a) * s,
    type,
    r
  });
}

function shootAt(x, y, tx, ty, s, type = "normal", r = null) {
  const dx = tx - x;
  const dy = ty - y;
  const d = Math.hypot(dx, dy) || 1;

  createBullet({
    x,
    y,
    vx: dx / d * s,
    vy: dy / d * s,
    type,
    r
  });
}

function addAttacks(count) {
  for (let i = 0; i < count; i++) {
    if (game.attackBag.length === 0) resetAttackBag();

    const options = game.attackBag.filter(id => !game.activeAttacks.includes(id));

    if (options.length === 0) {
      resetAttackBag();
      continue;
    }

    const id = rand(options);

    game.attackBag.splice(game.attackBag.indexOf(id), 1);
    game.activeAttacks.push(id);
    attackTimer[id] = 0;

    if (game.activeAttacks.length > 5) {
      const removed = game.activeAttacks.shift();
      attackTimer[removed] = 0;

      game.attackSwapCount++;

      const step = Math.floor((game.attackSwapCount - 1) / 5);
      const nInc = 2 + step * 2;
      const sInc = 4 + step * 2;

      game.normalDamageBonus += nInc;
      game.specialDamageBonus += sInc;

      addMaxHp(10);

      const reduction = Math.floor(game.attackSwapCount / 2);
      game.specialInterval = Math.max(CFG.specialMinInterval, CFG.specialBaseInterval - reduction);

      addNotice([
        "일반 공격 데미지 +" + nInc,
        "특수 공격 데미지 +" + sInc,
        "최대 HP +10"
      ], "#66ff66");
    }
  }
}

function updateAttacks(dt) {
  while (
    game.attackScheduleIndex < attackSchedule.length &&
    game.time >= attackSchedule[game.attackScheduleIndex].time
  ) {
    addAttacks(attackSchedule[game.attackScheduleIndex].count);
    game.attackScheduleIndex++;
  }

  for (const id of game.activeAttacks) {
    attackTimer[id] += dt;

    if (attackTimer[id] >= attackCooldown[id]) {
      attackTimer[id] = 0;
      attacks[id]();
    }
  }
}

function pickSpecial(ids) {
  let total = 0;

  for (const id of ids) {
    total += game.specialWeights[id] || 30;
  }

  let roll = Math.random() * total;

  for (const id of ids) {
    const w = game.specialWeights[id] || 30;

    if (roll < w) return id;

    roll -= w;
  }

  return ids[0];
}

function updateSpecials(dt) {
  if (game.specialLock > 0) return;

  game.specialTimer += dt;

  const interval = game.bossActive ? CFG.bossSpecialInterval : game.specialInterval;

  if (game.specialTimer < interval) return;

  game.specialTimer = 0;

  const ids = Object.keys(specials).filter(id => id !== game.lastSpecial);
  const id = pickSpecial(ids);

  game.lastSpecial = id;

function removeAllPenalties() {
  for (const p of game.activePenalties.slice().reverse()) {
    p.undo();
  }

  game.activePenalties = [];
  game.ownedPenalties.clear();

  addNotice(["정화", "모든 패널티 제거"], "#FFD700");
}

function remainingCards() {
  return cardData.filter(c => !game.ownedCards.has(c.id));
}

function remainingPenalties() {
  return penaltyData.filter(p => !game.ownedPenalties.has(p.id));
}

function pickCardByWeights(pool, weights) {
  const available = weights.filter(([r]) => pool.some(c => c.rarity === r));

  let total = available.reduce((a, b) => a + b[1], 0);
  let roll = Math.random() * total;

  for (const [rarity, weight] of available) {
    if (roll < weight) return rand(pool.filter(c => c.rarity === rarity));
    roll -= weight;
  }

  return rand(pool);
}

function pickCard(pool) {
  return pickCardByWeights(pool, [
    ["common", 55],
    ["rare", 27],
    ["epic", 12],
    ["legendary", 6]
  ]);
}

function pickBossRewardCard() {
  const pool = remainingCards();

  if (pool.length === 0) return null;

  const purifier = pool.find(c => c.id === "L5");

  if (purifier && Math.random() < 0.18) return purifier;

  return pickCardByWeights(pool, [
    ["common", 40],
    ["rare", 30],
    ["epic", 20],
    ["legendary", 10]
  ]);
}

function pickPenalty(pool) {
  const weights = [
    ["weak", 65],
    ["mid", 25],
    ["strong", 10]
  ].filter(([g]) => pool.some(p => p.grade === g));

  let total = weights.reduce((a, b) => a + b[1], 0);
  let roll = Math.random() * total;

  for (const [grade, weight] of weights) {
    if (roll < weight) return rand(pool.filter(p => p.grade === grade));
    roll -= weight;
  }

  return rand(pool);
}

function rememberType(listName, id) {
  if (!globalSave[listName].includes(id)) {
    globalSave[listName].push(id);
  }
}

function applyCard(c) {
  if (!c) {
    addMaxHp(30);
    game.hp = Math.min(game.maxHp, game.hp + game.maxHp * 0.5);
    addNotice(["카드 풀 소진!", "최대 HP +30", "HP 50% 회복"], "#66ff66");
    return;
  }

  game.ownedCards.add(c.id);
  game.runCards.push(c);

  game.stats.cards++;
  globalSave.totalCards++;

  rememberType("cardTypes", c.id);

  if (c.rarity === "legendary") {
    game.stats.legendary++;
    globalSave.totalLegendary++;
    sfx("legend");
  } else {
    sfx("card");
  }

  saveGlobal();

  c.apply();

  if (c.rarity === "legendary") {
    unlockAchievement("legendary", "전설 카드 획득");
  }

  checkCombos();
}

function openCardEvent() {
  stopDrag();

  const penaltiesLeft = remainingPenalties();
  const canPenalty = game.penaltyCooldown <= 0;

  if (canPenalty && penaltiesLeft.length > 0 && Math.random() < 0.07) {
    const p = pickPenalty(penaltiesLeft);

    game.ownedPenalties.add(p.id);
    game.runPenalties.push(p);

    game.stats.penalties++;
    globalSave.totalPenalties++;

    rememberType("penaltyTypes", p.id);

    saveGlobal();

    const undo = p.apply();

    game.activePenalties.push({
      id: p.id,
      undo
    });

    game.penaltyCooldown = 2;
    game.penaltyText = p.name + "\n" + p.desc;
    game.penaltyOpen = true;
    game.penaltyTimer = 0;

    sfx("penalty");
    return;
  }

  if (game.penaltyCooldown > 0) {
    game.penaltyCooldown--;
  }

  const pool = remainingCards();

  if (pool.length === 0) {
    applyCard(null);
    return;
  }

  const temp = [...pool];

  game.cardChoices = [];

  for (let i = 0; i < Math.min(3, temp.length); i++) {
    const c = pickCard(temp);
    game.cardChoices.push(c);
    temp.splice(temp.indexOf(c), 1);
  }

  game.cardOpen = true;
  game.cardTimer = 0;
  game.cardAnimTimer = 0;
}

  if (

  ) {
    game.ownedCards.add("COMBO_DODGE");

function updateCards(dt) {
  if (game.penaltyOpen) {
    game.penaltyTimer += dt;

    if (game.penaltyTimer >= CFG.penaltyShowTime) {
      game.penaltyOpen = false;
      game.penaltyText = "";
    }

    return;
  }

  if (game.cardOpen) {
    game.cardTimer += dt;
    game.cardAnimTimer += dt;

    if (game.cardTimer >= CFG.cardSelectTime) {
      selectCard(Math.floor(Math.random() * game.cardChoices.length));
    }

    return;
  }

  if (game.time >= game.nextCardTime) {
    game.nextCardTime += CFG.cardInterval;
    openCardEvent();
  }
}

function selectCard(index) {
  const c = game.cardChoices[index];

  if (!c) return;

  applyCard(c);

  game.cardOpen = false;
  game.cardChoices = [];
}

function handleCardClick(x, y) {
  if (!game.cardOpen) return;

  const n = game.cardChoices.length;
  const cardW = 120;
  const cardH = 220;
  const gap = 15;
  const total = n * cardW + (n - 1) * gap;
  const start = (W - total) / 2;
  const y0 = 310;

  for (let i = 0; i < n; i++) {
    const cx = start + i * (cardW + gap);

    if (x >= cx && x <= cx + cardW && y >= y0 && y <= y0 + cardH) {
      selectCard(i);
      return;
    }
  }
}

      vx: (Math.random() - 0.5) * 8,

      a: 0.15 + Math.random() * 0.35,
      fade: 0,
      r: 1 + Math.random() * 2,
      color: "#88ccff"
    });
  }
}

function bgLevel() {
  if (game.time < 60) return 0;
  if (game.time < 120) return 1;
  if (game.time < 180) return 2;
  if (game.time < 240) return 3;

  return 4 + Math.min(4, Math.floor((game.time - 240) / 60));
}

function backgroundColor() {
  const colors = [
    "#000000",
    "#001222",
    "#100016",
    "#160006",
    "#151000",
    "#1b1400",
    "#211800",
    "#281e00",
    "#302400"
  ];

  return colors[Math.min(colors.length - 1, bgLevel())];
}

function drawBackground() {
  ctx.fillStyle = backgroundColor();
  ctx.fillRect(0, 0, W, H);

  const gold = Math.max(0, bgLevel() - 3);

  for (const p of game.particles) {
    const isBoss = game.bossActive || game.bossIntro;

    ctx.save();
    ctx.globalAlpha = p.a;
    ctx.shadowBlur = 8 + gold * 2;
    ctx.shadowColor = isBoss ? "#ff3333" : (gold > 0 ? "#FFD700" : p.color);
    ctx.fillStyle = isBoss ? "#ff3333" : (gold > 0 ? "#FFD700" : p.color);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r + gold * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  if (gold > 0) {
    ctx.save();
    ctx.globalAlpha = 0.05 + gold * 0.015;
    ctx.strokeStyle = "#FFD700";
    ctx.shadowColor = "#FFD700";
    ctx.shadowBlur = 18 + gold * 3;
    ctx.lineWidth = 8;
    ctx.strokeRect(8, 8, W - 16, H - 16);
    ctx.restore();
  }
}

function drawArena() {
  ctx.save();
  ctx.shadowColor = game.bossActive || game.bossIntro ? "#ff3333" : "#00aaff";
  ctx.shadowBlur = game.bossActive || game.bossIntro ? 28 : 18;
  ctx.strokeStyle = game.bossActive || game.bossIntro ? "#ff3333" : "#33ccff";
  ctx.lineWidth = 5;
  ctx.strokeRect(left(), topY(), arena.w, arena.h);
  ctx.restore();
}

function drawBullets() {
  for (const b of game.bullets) {
    ctx.save();
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 14;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawSpecialObjects() {
  for (const o of game.specialObjects) {
    ctx.save();

    if (o.type === "rotLaser") {
      ctx.globalAlpha = Math.max(o.life / 5, 0.25);
      ctx.shadowColor = "#ff3333";
      ctx.shadowBlur = 22;
      ctx.strokeStyle = "#ff3333";
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.moveTo(o.x - Math.cos(o.a) * 600, o.y - Math.sin(o.a) * 600);
      ctx.lineTo(o.x + Math.cos(o.a) * 600, o.y + Math.sin(o.a) * 600);
      ctx.moveTo(o.x - Math.cos(o.a + Math.PI / 2) * 600, o.y - Math.sin(o.a + Math.PI / 2) * 600);
      ctx.lineTo(o.x + Math.cos(o.a + Math.PI / 2) * 600, o.y + Math.sin(o.a + Math.PI / 2) * 600);
      ctx.stroke();
    }

    if (o.type === "blackhole") {
      ctx.globalAlpha = Math.max(o.life / 3.2, 0.25);
      ctx.shadowColor = "#aa00ff";
      ctx.shadowBlur = 30;
      ctx.fillStyle = "#220033";
      ctx.beginPath();
      ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#cc66ff";
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    if (o.type === "movingWall") {
      const p = o.pos;

      ctx.globalAlpha = Math.max(o.life / 3, 0.25);
      ctx.fillStyle = "rgba(255,0,0,0.18)";
      ctx.fillRect(left(), topY(), arena.w, p);
      ctx.fillRect(left(), bottom() - p, arena.w, p);
      ctx.fillRect(left(), topY(), p, arena.h);
      ctx.fillRect(right() - p, topY(), p, arena.h);
    }

    ctx.restore();
  }
}

function drawPlayer() {
  if (game.achievements.has("play20h") && globalSave.endlessSkin) {
    for (const t of game.trail) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, t.life / t.max) * 0.4;
      ctx.shadowColor = "#FFD700";
      ctx.shadowBlur = 18;
      ctx.fillStyle = "#FFD700";
      ctx.beginPath();
      ctx.arc(t.x, t.y, player.r + 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  ctx.save();
  ctx.globalAlpha = game.dodgeFlash > 0 ? 0.45 : 1;
  ctx.shadowColor = game.achievements.has("play20h") && globalSave.endlessSkin ? "#FFD700" : "white";
  ctx.shadowBlur = game.achievements.has("play20h") && globalSave.endlessSkin ? 28 : 18;
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  if (game.achievements.has("play20h") && globalSave.endlessSkin) {
    const t = performance.now() / 1000;

    ctx.save();
    ctx.shadowColor = "#FFD700";
    ctx.shadowBlur = 18;
    ctx.strokeStyle = "#FFD700";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r + 14 + Math.sin(t * 4) * 2, 0, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = "#FFD700";
    ctx.font = "16px Arial";
    ctx.textAlign = "center";

    for (let i = 0; i < 4; i++) {
      const a = t * 1.6 + i * Math.PI / 2;
      ctx.fillText("∞", player.x + Math.cos(a) * 28, player.y + Math.sin(a) * 28 + 5);
    }

    ctx.restore();
  }

  if (game.invincible > 0 || game.shield > 0) {
    ctx.save();
    ctx.shadowColor = game.shield > 0 ? "#66ccff" : "white";
    ctx.shadowBlur = 15;
    ctx.strokeStyle = game.shield > 0 ? "#66ccff" : "white";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r + 8, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

function drawWarnings() {
  for (const w of game.warnings) {
    const ratio = 1 - Math.max(w.life / w.max, 0);
    const alpha = 0.3 + ratio * 0.7;
    const glow = 14 + ratio * 20 + Math.sin(performance.now() / 80) * 4;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = glow;

    if (w.type === "dangerSafe") {
      ctx.fillStyle = "rgba(255,0,0,0.18)";
      ctx.fillRect(left(), topY(), arena.w, arena.h);
    }

    if (w.type === "safeZoneBlast") {
      ctx.save();

      const pulse = Math.sin(performance.now() / 45) * 0.08 + 0.22;

      ctx.fillStyle = "rgba(255,0,0," + pulse + ")";
      ctx.fillRect(left(), topY(), arena.w, arena.h);

      ctx.globalCompositeOperation = "destination-out";
      ctx.beginPath();
      ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalCompositeOperation = "source-over";

      ctx.shadowColor = "#00ff99";
      ctx.shadowBlur = 28;
      ctx.strokeStyle = "#00ff99";
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = "#00ff99";
      ctx.font = "22px Arial";
      ctx.textAlign = "center";
      ctx.fillText("SAFE", w.x, w.y + 7);

      ctx.restore();
    }

    if (w.type === "edgeIn" || w.type === "edgeCollapse") {
      ctx.shadowColor = "#ff3333";
      ctx.strokeStyle = "#ff3333";
      ctx.lineWidth = 8;
      ctx.strokeRect(left(), topY(), arena.w, arena.h);

      ctx.lineWidth = 2;
      ctx.strokeStyle = "#ff9999";
      ctx.strokeRect(left() + 12, topY() + 12, arena.w - 24, arena.h - 24);

      ctx.restore();
      continue;
    }

    ctx.shadowColor =
      w.type === "blackhole" ? "#aa00ff" :
      w.type === "dangerSafe" ? "#00ff99" :
      w.type === "goldCross" ? "#FFD700" :
      "#ff2222";

    ctx.strokeStyle =
      w.type === "blackhole" ? "#bb66ff" :
      w.type === "dangerSafe" ? "#00ff99" :
      w.type === "goldCross" ? "#FFD700" :
      "#ff3333";

    ctx.lineWidth = 5;

    if (["circle", "doubleCircle", "meteor", "dangerSafe", "blackhole", "missile", "smallBoom", "circleArrow"].includes(w.type)) {
      ctx.beginPath();
      ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
      ctx.stroke();

      if (w.type === "doubleCircle") {
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.r + 35, 0, Math.PI * 2);
        ctx.stroke();
      }

      if (w.type === "circleArrow") {
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.r + 18, 0.2 + ratio * 4, 1.3 + ratio * 4);
        ctx.stroke();
      }

      if (w.type === "missile") {
        for (let i = 0; i < 8; i++) {
          const a = Math.PI * 2 / 8 * i;
          ctx.beginPath();
          ctx.arc(w.x + Math.cos(a) * w.r, w.y + Math.sin(a) * w.r, 8, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
    }

    if (w.type === "rect") {
      const flash = 0.16 + Math.sin(performance.now() / 80) * 0.08;

      ctx.fillStyle = "rgba(255,0,0," + flash + ")";
      ctx.fillRect(w.x, w.y, w.w, w.h);

      ctx.strokeStyle = "#ff3333";
      ctx.lineWidth = 5;
      ctx.strokeRect(w.x, w.y, w.w, w.h);
    }

    if (w.type === "rectBlast") {
      ctx.fillStyle = "rgba(255,0,0,0.45)";
      ctx.fillRect(w.x, w.y, w.w, w.h);

      ctx.shadowColor = "#ff3333";
      ctx.shadowBlur = 30;
      ctx.strokeStyle = "#ff7777";
      ctx.lineWidth = 8;
      ctx.strokeRect(w.x, w.y, w.w, w.h);
    }

    if (["line", "trackingLine"].includes(w.type)) {
      ctx.beginPath();
      ctx.moveTo(w.x - Math.cos(w.a) * 600, w.y - Math.sin(w.a) * 600);
      ctx.lineTo(w.x + Math.cos(w.a) * 600, w.y + Math.sin(w.a) * 600);
      ctx.stroke();
    }

    if (w.type === "rotLaser") {
      ctx.beginPath();
      ctx.moveTo(w.x - Math.cos(w.a) * 600, w.y - Math.sin(w.a) * 600);
      ctx.lineTo(w.x + Math.cos(w.a) * 600, w.y + Math.sin(w.a) * 600);

      ctx.moveTo(w.x - Math.cos(w.a + Math.PI / 2) * 600, w.y - Math.sin(w.a + Math.PI / 2) * 600);
      ctx.lineTo(w.x + Math.cos(w.a + Math.PI / 2) * 600, w.y + Math.sin(w.a + Math.PI / 2) * 600);

      ctx.stroke();
    }

    if (["cross", "eight", "goldCross"].includes(w.type)) {
      ctx.lineWidth = w.type === "goldCross" ? 10 : 5;

      ctx.beginPath();
      ctx.moveTo(w.x - 600, w.y);
      ctx.lineTo(w.x + 600, w.y);
      ctx.moveTo(w.x, w.y - 600);
      ctx.lineTo(w.x, w.y + 600);

      if (w.type === "eight") {
        ctx.moveTo(w.x - 600, w.y - 600);
        ctx.lineTo(w.x + 600, w.y + 600);
        ctx.moveTo(w.x - 600, w.y + 600);
        ctx.lineTo(w.x + 600, w.y - 600);
      }

      ctx.stroke();
    }

    ctx.restore();
  }
}

function rarityColor(r) {
  if (r === "common") return "#D9D9D9";
  if (r === "rare") return "#87CEEB";
  if (r === "epic") return "#C8A2FF";
  if (r === "legendary") return "#FFD700";
  return "#aa0000";
}

function rarityGlow(r) {
  if (r === "common") return 10;
  if (r === "rare") return 18;
  if (r === "epic") return 28;
  if (r === "legendary") return 42;
  return 18;
}

function wrapText(text, x, y, maxChars, lineH) {
  const lines = String(text).split("\n");
  let yy = y;

  for (const part of lines) {
    const words = part.split(" ");
    let line = "";

    for (const word of words) {
      if ((line + word).length > maxChars) {
        ctx.fillText(line, x, yy);
        yy += lineH;
        line = word + " ";
      } else {
        line += word + " ";
      }
    }

    ctx.fillText(line, x, yy);
    yy += lineH;
  }
}

function drawButton(b, text) {
  ctx.save();
  ctx.shadowColor = "white";
  ctx.shadowBlur = 8;
  ctx.strokeStyle = "white";

  ctx.strokeRect(b.x, b.y, b.w, b.h);
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.textAlign = "center";
  ctx.fillText(text, b.x + b.w / 2, b.y + 28);
  ctx.restore();
}

function drawRunCardList(x, y, maxLines = 5) {
  ctx.fillStyle = "white";
  ctx.font = "14px Arial";
  ctx.textAlign = "left";
  ctx.fillText("이번 판 카드: " + game.runCards.length + "장", x, y);

  const names = game.runCards.map(c => c.name);

  let line = "";
  let yy = y + 24;
  let count = 0;

  for (const name of names) {
    if ((line + name + " · ").length > 24) {
      ctx.fillText(line, x, yy);
      yy += 20;
      line = name + " · ";
      count++;

      if (count >= maxLines) return;
    } else {
      line += name + " · ";
    }
  }

  if (line) ctx.fillText(line, x, yy);
}

  drawButton(menuButtons.back, "뒤로");
}

function drawTutorial() {
  if (!game.tutorialOpen) return;

  ctx.fillStyle = "rgba(0,0,0,0.94)";
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = "#FFD700";
  ctx.font = "34px Arial";
  ctx.textAlign = "center";
  ctx.fillText("튜토리얼", W / 2, 170);

  ctx.fillStyle = "white";
  ctx.font = "22px Arial";

  const lines = [
    "드래그로 하얀 원을 이동",
    "25초마다 카드 선택",
    "120초마다 보스전"
  ];

  let y = 270;

  for (const l of lines) {
    ctx.fillText(l, W / 2, y);
    y += 65;
  }

  drawButton(menuButtons.tutorialOk, "확인");
}

function drawPauseMenu() {
  if (!game.paused) return;

  ctx.fillStyle = "rgba(0,0,0,0.86)";
  ctx.fillRect(0, 0, W, H);

  if (game.confirmRestart) {
    ctx.fillStyle = "white";
    ctx.font = "28px Arial";
    ctx.textAlign = "center";
    ctx.fillText("정말 다시 시작?", W / 2, 380);

    ctx.font = "18px Arial";
    ctx.fillText("현재 진행 상황이 사라짐", W / 2, 425);

    drawButton(menuButtons.confirmNo, "취소");
    drawButton(menuButtons.confirmYes, "다시 시작");
    return;
  }

  if (game.codexOpen) {
    drawCodex();
    return;
  }

  if (game.achievementsOpen) {
    drawAchievements();
    return;
  }

  if (game.statsOpen) {
    drawCurrentStats();
    return;
  }

  if (game.recordsOpen) {
    drawRecords();
    return;
  }

  if (game.runCardsOpen) {
    drawRunCardsFull();
    return;
  }

  if (game.settingsOpen) {
    ctx.fillStyle = "white";
    ctx.font = "34px Arial";
    ctx.textAlign = "center";
    ctx.fillText("설정", W / 2, 190);

    drawButton(menuButtons.sound, "효과음: " + (globalSave.soundOn ? "ON" : "OFF"));
    drawButton(menuButtons.bgm, "BGM: " + (globalSave.bgmOn ? "ON" : "OFF"));
    drawButton(menuButtons.master, "전체 볼륨: " + Math.round(globalSave.masterVolume * 100) + "%");
    drawButton(menuButtons.sfxVol, "효과음 볼륨: " + Math.round(globalSave.sfxVolume * 100) + "%");
    drawButton(menuButtons.bgmVol, "BGM 볼륨: " + Math.round(globalSave.bgmVolume * 100) + "%");
    drawButton(menuButtons.vibration, "진동: " + (globalSave.vibration ? "ON" : "OFF"));

    if (game.achievements.has("play20h")) {
      drawButton(menuButtons.endlessSkin, "끝없는 자 외형: " + (globalSave.endlessSkin ? "ON" : "OFF"));
    }

    drawButton(menuButtons.back, "뒤로");
    return;
  }

  ctx.fillStyle = "white";
  ctx.font = "38px Arial";
  ctx.textAlign = "center";
  ctx.fillText("일시정지", W / 2, 145);

  drawButton(menuButtons.resume, "계속하기");
  drawButton(menuButtons.restart, "다시 시작");
  drawButton(menuButtons.settings, "설정");
  drawButton(menuButtons.codex, "카드 도감");
  drawButton(menuButtons.achievements, "업적 도감");
  drawButton(menuButtons.stats, "현재 통계");
  drawButton(menuButtons.runCards, "이번 판 카드");
  drawButton(menuButtons.records, "플레이 기록");

  drawRunCardList(60, 630, 5);
}

function drawCards() {
  if (game.penaltyOpen) {
    ctx.fillStyle = "rgba(0,0,0,0.88)";
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.shadowColor = "#aa0000";
    ctx.shadowBlur = 26;
    ctx.fillStyle = "#360000";
    ctx.fillRect(W / 2 - 105, 300, 210, 190);

    ctx.strokeStyle = "#aa0000";
    ctx.lineWidth = 4;
    ctx.strokeRect(W / 2 - 105, 300, 210, 190);

    ctx.fillStyle = "#ff2222";
    ctx.font = "42px Arial";
    ctx.textAlign = "center";
    ctx.fillText("패널티!", W / 2, 350);

    ctx.fillStyle = "white";
    ctx.font = "22px Arial";

    const lines = game.penaltyText.split("\n");

    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], W / 2, 410 + i * 34);
    }

    ctx.restore();
  }

  if (game.cardOpen) {
    ctx.fillStyle = "rgba(0,0,0,0.82)";
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.shadowColor = "white";
    ctx.shadowBlur = 10;
    ctx.fillStyle = "white";
    ctx.font = "34px Arial";
    ctx.textAlign = "center";
    ctx.fillText("카드 선택", W / 2, 190);

    ctx.font = "22px Arial";
    ctx.fillText(Math.ceil(CFG.cardSelectTime - game.cardTimer) + "초", W / 2, 235);
    ctx.restore();

    const n = game.cardChoices.length;
    const cardW = 120;
    const cardH = 220;
    const gap = 15;
    const total = n * cardW + (n - 1) * gap;
    const start = (W - total) / 2;
    const y = 310;
    const anim = Math.min(1, game.cardAnimTimer / 0.35);
    const bounce = 1.04 - Math.abs(anim - 0.8) * 0.05;

    for (let i = 0; i < n; i++) {
      const c = game.cardChoices[i];
      const x = start + i * (cardW + gap);
      const color = rarityColor(c.rarity);

      ctx.save();
      ctx.translate(x + cardW / 2, y + cardH / 2);
      ctx.scale(anim * bounce, anim * bounce);
      ctx.rotate((1 - anim) * (i - 1) * 0.25);

      ctx.shadowColor = color;
      ctx.shadowBlur = rarityGlow(c.rarity);
      ctx.fillStyle = color;
      ctx.fillRect(-cardW / 2, -cardH / 2, cardW, cardH);

      ctx.strokeStyle = "white";
      ctx.lineWidth = c.rarity === "legendary" ? 4 : 3;
      ctx.strokeRect(-cardW / 2, -cardH / 2, cardW, cardH);

      ctx.fillStyle = "black";
      ctx.textAlign = "center";
      ctx.font = "14px Arial";
      ctx.fillText(c.rarity.toUpperCase(), 0, -80);

      ctx.font = "17px Arial";
      ctx.fillText(c.name, 0, -38);

      ctx.font = "12px Arial";
      wrapText(c.desc, 0, 0, 11, 17);

      ctx.restore();
    }
  }

  if (game.gameOver && !game.paused) {
    ctx.fillStyle = "rgba(0,0,0,0.87)";
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.shadowColor = "red";
    ctx.shadowBlur = 18;
    ctx.fillStyle = "red";
    ctx.font = "52px Arial";
    ctx.textAlign = "center";
    ctx.fillText("GAME OVER", W / 2, 105);
    ctx.restore();

    if (game.newRecord || game.newDaily) {
      ctx.save();
      ctx.shadowColor = game.newRecord ? "#FFD700" : "#87CEEB";
      ctx.shadowBlur = 18;
      ctx.fillStyle = game.newRecord ? "#FFD700" : "#87CEEB";
      ctx.font = "28px Arial";
      ctx.textAlign = "center";
      ctx.fillText(game.newRecord ? "NEW RECORD!" : "TODAY BEST!", W / 2, 145);
      ctx.restore();
    }

    ctx.fillStyle = "white";
    ctx.font = "17px Arial";
    ctx.textAlign = "left";

    let y = 185;

    const rows = [
      ["생존 시간", fmt(game.time)],
      ["최고 기록", fmt(game.best)],
      ["오늘 기록", fmt(game.todayBest)],
      ["획득 카드", game.stats.cards + "장"],
      ["전설 카드", game.stats.legendary + "장"],
      ["패널티", game.stats.penalties + "개"],
      ["보스 클리어", game.stats.bossClears + "회"],
      ["회피 성공", game.stats.dodges + "회"],
      ["받은 피해", Math.round(game.stats.damageTaken)],
      ["패턴 교체", game.attackSwapCount + "회"]
    ];

    for (const [a, b] of rows) {
      ctx.fillText(a, 90, y);

      ctx.textAlign = "right";
      ctx.fillText(String(b), 360, y);

      ctx.textAlign = "left";
      y += 27;
    }

    drawButton({ x: 125, y: H / 2 + 215, w: 200, h: 44 }, "이번 판 카드 보기");
    drawButton({ x: 125, y: H / 2 + 270, w: 200, h: 44 }, "다시 시작");
  }
}

function drawBossReward() {
  if (!game.bossRewardOpen) return;

  ctx.fillStyle = "rgba(0,0,0,0.88)";
  ctx.fillRect(0, 0, W, H);

  const t = game.bossRewardTimer;
  const c = game.bossRewardCard;
  let color = "#D9D9D9";

  if (t < 2) {
    const colors = ["#D9D9D9", "#87CEEB", "#C8A2FF", "#FFD700"];
    color = colors[Math.floor(t * 15) % colors.length];
  } else if (c) {
    color = rarityColor(c.rarity);
  }

  const cardW = 170;
  const cardH = 250;
  let sx = 1;

  if (t >= 2 && t < 2.6) {
    sx = Math.abs(Math.cos((t - 2) * Math.PI * 2));
  }

  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(sx, 1);

  ctx.shadowColor = color;
  ctx.shadowBlur = t < 2 ? 30 : rarityGlow(c ? c.rarity : "common");
  ctx.fillStyle = color;
  ctx.fillRect(-cardW / 2, -cardH / 2, cardW, cardH);

  ctx.strokeStyle = "white";
  ctx.lineWidth = 4;
  ctx.strokeRect(-cardW / 2, -cardH / 2, cardW, cardH);

  ctx.textAlign = "center";
  ctx.fillStyle = "black";

  if (t < 2.3) {
    ctx.font = "52px Arial";
    ctx.fillText("?", 0, 18);
  } else if (c) {
    ctx.font = "16px Arial";
    ctx.fillText(c.rarity.toUpperCase(), 0, -82);

    ctx.font = "24px Arial";
    ctx.fillText(c.name, 0, -35);

    ctx.font = "14px Arial";
    wrapText(c.desc, 0, 10, 16, 19);
  } else {
    ctx.font = "24px Arial";
    ctx.fillText("회복 + 최대 HP", 0, 0);
  }

  ctx.restore();

  ctx.fillStyle = "white";
  ctx.font = "28px Arial";
  ctx.textAlign = "center";
  ctx.fillText("보스 보상", W / 2, 210);
}

function drawBossIntro() {
  if (!game.bossIntro) return;

  const t = game.bossIntroTimer;

  ctx.fillStyle = "rgba(80,0,0,0.35)";
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.shadowColor = "#ff3333";
  ctx.shadowBlur = 30;
  ctx.fillStyle = "#ff3333";
  ctx.textAlign = "center";

  if (t < 0.5) {
    ctx.font = "80px Arial";
    ctx.fillText("3", W / 2, H / 2);
  } else if (t < 1.0) {
    ctx.font = "80px Arial";
    ctx.fillText("2", W / 2, H / 2);
  } else if (t < 1.5) {
    ctx.font = "80px Arial";
    ctx.fillText("1", W / 2, H / 2);
  } else {
    ctx.font = "54px Arial";
    ctx.fillText("WARNING", W / 2, H / 2);
  }

  ctx.restore();
}

function drawCombo() {
  if (!game.comboOpen) return;

  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.fillRect(0, 0, W, H);

  const t = game.comboTimer;
  const scale = 1 + Math.sin(t * 12) * 0.04;

  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(scale, scale);

  ctx.shadowColor = "#FFD700";
  ctx.shadowBlur = 36;
  ctx.fillStyle = "#FFD700";
  ctx.font = "56px Arial";
  ctx.textAlign = "center";
  ctx.fillText(game.comboName, 0, 0);

  ctx.font = "24px Arial";
  ctx.fillText("조합 활성화", 0, 42);

  ctx.restore();
}

function drawSurvivor() {
  if (!game.survivorOpen) return;

  const t = game.survivorTimer;

  ctx.fillStyle = "rgba(0,0,0,0.62)";
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < 4; i++) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - t / 2) * 0.5;
    ctx.strokeStyle = "#FFD700";
    ctx.shadowColor = "#FFD700";
    ctx.shadowBlur = 35;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(W / 2, H / 2, 80 + t * 160 + i * 35, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  ctx.save();
  ctx.shadowColor = "#FFD700";
  ctx.shadowBlur = 45;
  ctx.fillStyle = "#FFD700";
  ctx.textAlign = "center";
  ctx.font = "64px Arial";
  ctx.fillText("SURVIVOR", W / 2, H / 2 - 20);
  ctx.font = "30px Arial";
  ctx.fillText("업적 달성", W / 2, H / 2 + 38);
  ctx.restore();
}

function drawEndless() {
  if (!game.endlessOpen) return;

  const t = game.endlessTimer;

  ctx.fillStyle = "rgba(0,0,0," + Math.min(0.92, 0.4 + t * 0.3) + ")";
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < 10; i++) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - t / 4) * 0.7;
    ctx.strokeStyle = i % 2 === 0 ? "#FFD700" : "#ffffff";
    ctx.shadowColor = "#FFD700";
    ctx.shadowBlur = 40;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(W / 2, H / 2, 40 + t * 120 + i * 25, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  for (let i = 0; i < 18; i++) {
    const a = i * Math.PI * 2 / 18 + t * 2;

    ctx.save();
    ctx.globalAlpha = 0.7;
    ctx.strokeStyle = "#FFD700";
    ctx.shadowColor = "#FFD700";
    ctx.shadowBlur = 25;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W / 2, H / 2);
    ctx.lineTo(W / 2 + Math.cos(a) * (120 + t * 40), H / 2 + Math.sin(a) * (120 + t * 40));
    ctx.stroke();
    ctx.restore();
  }

  ctx.save();
  ctx.textAlign = "center";
  ctx.shadowColor = "#FFD700";
  ctx.shadowBlur = 55;
  ctx.fillStyle = "#ffffff";
  ctx.font = "86px Arial";
  ctx.fillText("∞", W / 2, H / 2 - 80);

  ctx.fillStyle = "#FFD700";
  ctx.font = "24px Arial";
  ctx.fillText("LEGENDARY ACHIEVEMENT", W / 2, H / 2 - 25);

  ctx.font = "58px Arial";
  ctx.fillText("끝없는 자", W / 2, H / 2 + 40);

  ctx.fillStyle = "white";
  ctx.font = "22px Arial";
  ctx.fillText("총 플레이 시간 20시간 달성", W / 2, H / 2 + 85);
  ctx.restore();
}

function drawResumeCountdown() {
  if (!game.resumeCountdown) return;

  ctx.fillStyle = "rgba(0,0,0,0.62)";
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.shadowColor = "white";
  ctx.shadowBlur = 20;
  ctx.fillStyle = "white";
  ctx.textAlign = "center";

  if (game.resumeCount > 0) {
    ctx.font = "90px Arial";
    ctx.fillText(game.resumeCount, W / 2, H / 2);
  } else {
    ctx.font = "58px Arial";
    ctx.fillText("START!", W / 2, H / 2);
  }

  ctx.restore();
}

/* =========================
   MAIN UPDATE / RENDER
   ========================= */

function update(dt) {
  if (game.tutorialOpen) return;

  if (game.paused) return;

  if (game.resumeCountdown) {
    game.resumeTimer += dt;

    if (game.resumeTimer >= 0.8) {
      game.resumeTimer = 0;
      game.resumeCount--;

      if (game.resumeCount < 0) {
        game.resumeCountdown = false;
      }
    }

    return;
  }

  if (!game.started) {
    game.countdownTimer += dt;

    if (!game.showStart && game.countdownTimer >= 1) {
      game.countdownTimer = 0;
      game.countdown--;

      if (game.countdown <= 0) {
        game.showStart = true;
        game.startTimer = 0;
      }
    }

    if (game.showStart) {
      game.startTimer += dt;

      if (game.startTimer >= 0.7) {
        game.started = true;
        globalSave.totalPlays++;
        saveGlobal();
      }
    }

    return;
  }

  if (game.gameOver) return;

  if (game.endlessOpen) {
    game.endlessTimer += dt;
    updateEffects(dt);

    if (game.endlessTimer >= 4.5) {
      game.endlessOpen = false;
    }

    return;
  }

  if (game.bossIntro) {
    updateBossIntro(dt);
    updateEffects(dt);
    return;
  }

  if (game.survivorOpen) {
    game.survivorTimer += dt;
    updateEffects(dt);

    if (game.survivorTimer >= 2) {
      game.survivorOpen = false;
    }

    return;
  }

  if (game.comboOpen) {
    updateCombo(dt);
    updateEffects(dt);
    return;
  }

  if (game.bossRewardOpen) {
    updateBossReward(dt);
    updateEffects(dt);
    return;
  }

  if (game.cardOpen || game.penaltyOpen) {
    updateCards(dt);
    updateEffects(dt);
    return;
  }

  game.time += dt;
  game.sessionPlayTime += dt;

  updateCards(dt);

  if (game.cardOpen || game.penaltyOpen) {
    updateEffects(dt);
    return;
  }

  updateInput();
  updatePlayer(dt);
  updateBoss(dt);
  updateAttacks(dt);
  updateSpecials(dt);
  updateBullets(dt);
  updateSpecialObjects(dt);
  updateRules(dt);
  updateEffects(dt);
}

function render() {
  drawBackground();
  drawArena();
  drawBullets();
  drawSpecialObjects();
  drawWarnings();
  drawPlayer();
  drawUI();
  drawTexts();
  drawCards();
  drawBossReward();
  drawBossIntro();
  drawCombo();
  drawSurvivor();
  drawEndless();
  drawPauseMenu();
  drawResumeCountdown();
  drawTutorial();

  if (!game.started && !game.tutorialOpen) {
    ctx.save();
    ctx.shadowColor = "white";
    ctx.shadowBlur = 18;
    ctx.fillStyle = "white";
    ctx.textAlign = "center";

    if (game.showStart) {
      ctx.font = "60px Arial";
      ctx.fillText("START!", W / 2, H / 2);
    } else {
      ctx.font = "90px Arial";
      ctx.fillText(game.countdown, W / 2, H / 2);
    }

    ctx.restore();
  }
}

function loop(timestamp) {
  if (!game.last) game.last = timestamp;

  const dt = Math.min((timestamp - game.last) / 1000, 0.05);

  game.last = timestamp;

  update(dt);
  updateBgm();
  render();

  requestAnimationFrame(loop);
}

resetAttackBag();
initParticles();
requestAnimationFrame(loop);
</script>
